<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI CORE</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#001522;
  color:white;
  overflow:hidden;
}

/* 上画像 */
.header{
  height:25%;
}
.header img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* チャット */
#chat{
  height:50%;
  overflow-y:auto;
  padding:10px;
}

/* 吹き出し */
.msg{
  max-width:75%;
  padding:10px;
  margin:6px;
  border-radius:15px;
}
.user{
  background:#ff4f7a;
  margin-left:auto;
}
.ai{
  background:#444;
}

/* 入力 */
.inputArea{
  position:fixed;
  bottom:50px;
  width:100%;
  display:flex;
  gap:5px;
  padding:5px;
  background:#001522;
}
.inputArea input{
  flex:1;
  padding:10px;
  border-radius:10px;
}
.inputArea button{
  width:60px;
}

/* タブ */
.tabs{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}
.tab{
  flex:1;
  text-align:center;
  padding:10px;
}
</style>
</head>

<body>

<div class="header">
<img id="face" src="girl-normal.jpg">
</div>

<div id="chat"></div>

<div class="inputArea">
<button onclick="startVoice()">🎤</button>
<input id="text">
<button onclick="send()">送信</button>
</div>

<div class="tabs">
<div class="tab">会話</div>
<div class="tab">分析</div>
<div class="tab">未来</div>
<div class="tab">設定</div>
</div>

<script>

/* ===== メッセージ ===== */
function addMsg(t, type){
  const d=document.createElement("div");
  d.className="msg "+type;
  d.innerText=t;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

/* ===== 送信 ===== */
async function send(){
  const text=document.getElementById("text").value;
  if(!text) return;

  addMsg(text,"user");
  document.getElementById("text").value="";

  const reply = await replyAI(text);

  addMsg(reply,"ai");
}

/* ===== AI ===== */
async function replyAI(text){
  return "ちゃんと聞いてるよ";
}

/* ===== 音声入力 ===== */
function startVoice(){
  try{
    const rec=new webkitSpeechRecognition();
    rec.lang="ja-JP";
    rec.onresult=e=>{
      document.getElementById("text").value=e.results[0][0].transcript;
      send();
    };
    rec.start();
  }catch{
    alert("音声未対応");
  }
}

</script>

</body>
</html>
