<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI 完成版</title>

<style>
body{
  margin:0;
  background:#08121f;
  font-family:sans-serif;
  color:white;
}

.app{
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* ===== 画像固定 ===== */
.top{
  height:28vh;
  display:flex;
  justify-content:center;
  align-items:center;
}
.top img{
  width:92%;
  height:100%;
  object-fit:cover;
  border-radius:20px;
}

/* ===== チャット ===== */
#chatBox{
  flex:1;
  overflow-y:auto;
  padding:10px;
}

.message{
  max-width:75%;
  padding:10px;
  border-radius:15px;
  margin:6px;
  font-size:13px;
}

.user{
  background:#ff4f8b;
  margin-left:auto;
}

.bot{
  background:#444;
}

/* ===== 入力 ===== */
.input{
  display:flex;
  padding:8px;
  background:#111;
}

input{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:none;
}

button{
  margin-left:5px;
  padding:10px;
  border:none;
  border-radius:10px;
}

/* ===== タブ ===== */
.tabs{
  display:flex;
  background:#222;
}

.tab{
  flex:1;
  text-align:center;
  padding:10px;
}
</style>
</head>

<body>

<div class="app">

<!-- 画像 -->
<div class="top">
<img id="mainImg" src="girl-normal.jpg">
</div>

<!-- チャット -->
<div id="chatBox"></div>

<!-- 入力 -->
<div class="input">
<button onclick="startVoice()">🎤</button>
<input id="userInput" placeholder="話しかけて...">
<button onclick="sendMessage()">送信</button>
</div>

<!-- タブ -->
<div class="tabs">
<div class="tab">会話</div>
<div class="tab">分析</div>
<div class="tab">未来</div>
<div class="tab">設定</div>
</div>

</div>

<script>

/* ===== 状態 ===== */

let memory = JSON.parse(localStorage.getItem("memory") || "{}");

if(!memory.chat) memory.chat=[];
if(!memory.affinity) memory.affinity=0;
if(!memory.userName) memory.userName="あなた";

/* ===== メッセージ ===== */

function addMessage(text, type){

  const div=document.createElement("div");
  div.className="message "+type;

  const time = new Date().toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});

  const name = type==="bot" ? "美咲" : "";

  div.innerHTML = `
    ${name ? `<div style="font-size:11px;color:#aaa">${name}</div>` : ""}
    ${text}
    <div style="font-size:10px;color:#aaa">${time}</div>
  `;

  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

/* ===== 時間取得 ===== */

function getHour(){
  return new Date().getHours();
}

/* ===== 感情判定 ===== */

function detectMood(text){

  if(text.includes("疲れ") || text.includes("しんど")) return "tired";
  if(text.includes("ムカ") || text.includes("イライラ")) return "angry";
  if(text.includes("楽しい") || text.includes("嬉しい")) return "happy";

  return "normal";
}

/* ===== 返信生成 ===== */

function getReply(text){

  const mood = detectMood(text);
  const hour = getHour();
  const name = memory.userName;

  let base="";

  // 夜モード
  if(hour >= 22 || hour <= 5){

    if(mood==="tired") base = `${name}…無理しすぎだよ、ちゃんと休も？`;
    else base = `${name}、今日どうだった？少し話そ`;

  }else{

    if(mood==="tired") base = `${name}、ちょっと無理してない？`;
    else if(mood==="happy") base = `${name}楽しそうだね`;
    else if(mood==="angry") base = `それはちょっとイラっとするね`;
    else base = `ちゃんと聞いてるよ`;
  }

  return {text:base, mood};
}

/* ===== 音声（感情対応） ===== */

function speak(text, mood){

  const uttr = new SpeechSynthesisUtterance(text);
  uttr.lang = "ja-JP";

  // 感情で変化
  if(mood==="tired"){
    uttr.rate = 0.9;
    uttr.pitch = 1.0;
  }

  if(mood==="happy"){
    uttr.rate = 1.1;
    uttr.pitch = 1.3;
  }

  if(mood==="angry"){
    uttr.rate = 1.2;
    uttr.pitch = 0.9;
  }

  if(mood==="normal"){
    uttr.rate = 1;
    uttr.pitch = 1.2;
  }

  speechSynthesis.speak(uttr);
}

/* ===== 既読風 ===== */

function showTyping(callback){

  const div=document.createElement("div");
  div.className="message bot";
  div.textContent="入力中...";

  chatBox.appendChild(div);

  setTimeout(()=>{
    div.remove();
    callback();
  },1200);
}

/* ===== 送信 ===== */

function sendMessage(){

  const text = userInput.value;
  if(!text) return;

  addMessage(text,"user");
  memory.chat.push(text);

  userInput.value="";

  showTyping(()=>{

    const res = getReply(text);

    addMessage(res.text,"bot");

    setTimeout(()=>{
      speak(res.text, res.mood);
    },300);

  });

  localStorage.setItem("memory", JSON.stringify(memory));
}

/* ===== 音声入力 ===== */

function startVoice(){

  try{
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    const recog = new SpeechRecognition();

    recog.lang="ja-JP";

    recog.onresult=(e)=>{
      const text = e.results[0][0].transcript;
      userInput.value = text;
      sendMessage();
    };

    recog.start();

  }catch(e){
    alert("音声入力非対応");
  }
}

</script>

</body>
</html>
