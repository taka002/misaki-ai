<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI 進化版</title>

<style>
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:#08121f;
  font-family:sans-serif;
}

.app{
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* ===== 画像 ===== */
.top{
  height:30%;
  display:flex;
  justify-content:center;
  align-items:center;
}
.top img{
  width:90%;
  height:100%;
  object-fit:cover;
  border-radius:20px;
  transition:0.3s;
}

/* ===== チャット ===== */
#chatBox{
  height:40%;
  overflow-y:auto;
  padding:8px;
}

/* ===== メッセージ ===== */
.message{
  max-width:70%;
  padding:8px;
  border-radius:14px;
  margin:4px;
  font-size:12px;
}
.user{
  background:#ff4f8b;
  margin-left:auto;
}
.bot{
  background:#444;
}

/* ===== 入力 ===== */
.input{
  height:14%;
  display:flex;
  align-items:center;
  padding:6px;
  background:#111;
}

input{
  flex:1;
  min-width:0;
  padding:10px;
  border-radius:10px;
  border:none;
}

button{
  flex-shrink:0;
  width:60px;
  margin-left:5px;
  border:none;
  border-radius:10px;
}

/* ===== タブ ===== */
.tabs{
  height:8%;
  display:flex;
  background:#222;
}
.tab{
  flex:1;
  text-align:center;
  padding:8px;
  font-size:12px;
}
</style>
</head>

<body>

<div class="app">

<div class="top">
<img id="face" src="face_normal.jpg">
</div>

<div id="chatBox"></div>

<div class="input">
<input id="userInput" placeholder="話しかけて...">
<button onclick="sendMessage()">送信</button>
</div>

<div class="tabs">
<div class="tab">会話</div>
<div class="tab">分析</div>
<div class="tab">未来</div>
<div class="tab">設定</div>
</div>

</div>

<script>

/* ===== 設定 ===== */
let userName = localStorage.getItem("name") || "あなた";
let love = Number(localStorage.getItem("love") || 0);

/* ===== 表情9枚 ===== */
const faces = {
  normal:"face_normal.jpg",
  happy:"face_happy.jpg",
  sad:"face_sad.jpg",
  angry:"face_angry.jpg",
  love:"face_love.jpg",
  tired:"face_tired.jpg",
  shy:"face_shy.jpg",
  smile:"face_smile.jpg",
  thinking:"face_thinking.jpg"
};

/* ===== 表情変更 ===== */
function setFace(type){
  document.getElementById("face").src = faces[type] || faces.normal;
}

/* ===== メッセージ追加 ===== */
function addMessage(text,type){
  const div=document.createElement("div");
  div.className="message "+type;
  div.innerHTML = text;
  chatBox.appendChild(div);
  chatBox.scrollTop=chatBox.scrollHeight;
}

/* ===== AI返信 ===== */
function aiReply(text){

  let reply="";
  let face="normal";

  /* 感情判定 */
  if(text.includes("疲")){
    face="tired";
    reply="無理してない？少し休も？";
    love+=2;
  }
  else if(text.includes("楽")){
    face="happy";
    reply="いいね、それ聞くと嬉しいな";
    love+=3;
  }
  else if(text.includes("怒")){
    face="angry";
    reply="そっか…それはちょっと嫌だね";
    love+=1;
  }
  else{
    face="smile";
    reply="ちゃんと聞いてるよ。もう少し教えて？";
    love+=1;
  }

  /* 親密度で変化 */
  if(love > 20){
    reply = userName + "、" + reply + " そばにいるよ";
    face="love";
  }

  if(love > 50){
    reply = userName + "、おかえり。待ってたよ";
    face="love";
  }

  /* 保存 */
  localStorage.setItem("love",love);

  setTimeout(()=>{
    setFace(face);
    addMessage("<b>美咲</b><br>"+reply,"bot");
  },700);
}

/* ===== 送信 ===== */
function sendMessage(){
  const text=userInput.value;
  if(!text) return;

  addMessage(text,"user");
  userInput.value="";

  aiReply(text);
}

/* ===== 初回メッセージ ===== */
window.onload=()=>{
  setFace("normal");
  addMessage("<b>美咲</b><br>"+userName+"、おかえり","bot");
}

</script>

</body>
</html>
