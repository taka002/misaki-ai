<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI 安定UI</title>

<style>
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:sans-serif;
  background:#08121f;
  color:white;
}

/* ===== 上画像固定 ===== */
.top{
  position:fixed;
  top:0;
  width:100%;
  height:28%;
  display:flex;
  justify-content:center;
}
.top img{
  width:90%;
  height:100%;
  object-fit:cover;
  border-radius:20px;
}

/* ===== チャット（ここだけスクロール） ===== */
#chatBox{
  position:fixed;
  top:28%;
  bottom:110px; /* 入力＋タブ分確保 */
  width:100%;
  overflow-y:auto;
  padding:10px;
}

/* ===== メッセージ ===== */
.message{
  max-width:75%;
  padding:10px;
  border-radius:14px;
  margin:6px;
}
.user{
  background:#ff4f8b;
  margin-left:auto;
}
.bot{
  background:#444;
}

/* ===== 入力固定 ===== */
.input{
  position:fixed;
  bottom:50px;
  width:100%;
  height:60px;
  display:flex;
  padding:6px;
  background:#111;
}
input{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:none;
}
button{
  width:60px;
  margin-left:5px;
}

/* ===== タブ固定 ===== */
.tabs{
  position:fixed;
  bottom:0;
  width:100%;
  height:50px;
  display:flex;
  background:#222;
}
.tab{
  flex:1;
  text-align:center;
  padding:10px;
  font-size:12px;
}
</style>
</head>

<body>

<!-- 上画像 -->
<div class="top">
<img src="girl-normal.jpg"
onerror="this.src='https://via.placeholder.com/300'">
</div>

<!-- チャット -->
<div id="chatBox"></div>

<!-- 入力 -->
<div class="input">
<input id="userInput" placeholder="話しかけて...">
<button onclick="sendMessage()">送信</button>
</div>

<!-- タブ -->
<div class="tabs">
<div class="tab">会話</div>
<div class="tab">分析</div>
<div class="tab">未来</div>
<div class="tab">設定</div>
</div>

<script>

const chatBox = document.getElementById("chatBox");
const userInput = document.getElementById("userInput");

/* ===== メッセージ ===== */
function addMessage(text,type){
  const div=document.createElement("div");
  div.className="message "+type;
  div.textContent=text;

  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

/* ===== 音声 ===== */
function speak(text){
  try{
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang="ja-JP";
    speechSynthesis.speak(msg);
  }catch(e){}
}

/* ===== AI（確実応答版） ===== */
function replyAI(text){

  let reply = "ちゃんと聞いてるよ";

  if(text.includes("疲")){
    reply = "疲れてるね、無理してない？";
  }
  else if(text.includes("楽")){
    reply = "いいね、それ嬉しい";
  }
  else{
    reply = "もう少し教えて？";
  }

  // タイピング表示
  const typing=document.createElement("div");
  typing.className="message bot";
  typing.textContent="…";
  chatBox.appendChild(typing);

  setTimeout(()=>{
    if(typing) typing.remove();

    addMessage(reply,"bot");

    setTimeout(()=>{
      speak(reply);
    },200);

  },600);
}

/* ===== 送信 ===== */
function sendMessage(){

  const text = userInput.value;
  if(!text) return;

  addMessage(text,"user");
  userInput.value="";

  replyAI(text);
}

/* ===== 初回 ===== */
window.onload=()=>{
  addMessage("おかえり","bot");
};

</script>

</body>
</html>
