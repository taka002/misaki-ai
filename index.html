<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI 最終版</title>

<style>
body{
  margin:0;
  background:#08121f;
  font-family:sans-serif;
  color:white;
}

.app{
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* ===== 画像固定 ===== */
.top{
  height:30vh;
  display:flex;
  justify-content:center;
  align-items:center;
}
.top img{
  width:90%;
  height:100%;
  object-fit:cover;
  border-radius:20px;
}

/* ===== チャット ===== */
#chatBox{
  flex:1;
  overflow-y:auto;
  padding:10px;
}

.message{
  max-width:75%;
  padding:10px;
  border-radius:15px;
  margin:6px;
  font-size:14px;
}

.user{
  background:#ff4f8b;
  margin-left:auto;
}

.bot{
  background:#444;
}

/* ===== 入力 ===== */
.input{
  display:flex;
  padding:8px;
  background:#111;
}

input{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:none;
}

button{
  margin-left:5px;
  padding:10px;
  border:none;
  border-radius:10px;
}

/* ===== タブ ===== */
.tabs{
  display:flex;
  background:#222;
}

.tab{
  flex:1;
  text-align:center;
  padding:10px;
}
</style>
</head>

<body>

<div class="app">

<!-- 画像 -->
<div class="top">
<img id="mainImg" src="girl-normal.jpg">
</div>

<!-- チャット -->
<div id="chatBox"></div>

<!-- 入力 -->
<div class="input">
<input id="userInput" placeholder="話しかけて...">
<button onclick="startVoice()">🎤</button>
<button onclick="sendMessage()">送信</button>
</div>

<!-- タブ -->
<div class="tabs">
<div class="tab">会話</div>
<div class="tab">分析</div>
<div class="tab">未来</div>
<div class="tab">設定</div>
</div>

</div>

<script>

/* ===== 状態 ===== */

let memory = JSON.parse(localStorage.getItem("memory") || "{}");

if(!memory.chat) memory.chat=[];
if(!memory.affinity) memory.affinity=0;
if(!memory.userName) memory.userName="あなた";

/* ===== メッセージ ===== */

function addMessage(text, type){

  const div=document.createElement("div");
  div.className="message "+type;

  const time = new Date().toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});

  const name = type==="bot" ? "美咲" : "";

  div.innerHTML = `
    ${name ? `<div style="font-size:11px;color:#aaa">${name}</div>` : ""}
    ${text}
    <div style="font-size:10px;color:#aaa">${time}</div>
  `;

  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

/* ===== 既読風 ===== */

function showTyping(callback){

  const div=document.createElement("div");
  div.className="message bot";
  div.textContent="既読…";

  chatBox.appendChild(div);

  setTimeout(()=>{
    div.textContent="入力中...";
  },800);

  setTimeout(()=>{
    div.remove();
    callback();
  },1800);
}

/* ===== 親密度 ===== */

function updateAffinity(text){

  if(text.includes("ありがとう") || text.includes("楽しい")){
    memory.affinity+=2;
  }else{
    memory.affinity+=1;
  }

  localStorage.setItem("memory", JSON.stringify(memory));
}

/* ===== 名前呼び ===== */

function getName(){
  return memory.userName || "あなた";
}

/* ===== 性格変化 ===== */

function getPersonalityReply(text){

  const a = memory.affinity;
  const name = getName();

  if(text.includes("疲れ")){

    if(a<5){
      return "少し疲れてる感じあるね";
    }

    if(a<15){
      return `${name}、ちょっと無理してない？`;
    }

    return `${name}、無理しすぎ…ちゃんと休も？`;
  }

  if(text.includes("楽しい")){
    if(a<5) return "いいね";
    if(a<15) return `${name}楽しそうだね`;
    return `${name}楽しそうで嬉しいな`;
  }

  return random([
    `${name}、もう少し教えて？`,
    "ちゃんと聞いてるよ",
    "それでどう感じた？"
  ]);
}

/* ===== ランダム ===== */

function random(arr){
  return arr[Math.floor(Math.random()*arr.length)];
}

/* ===== 送信 ===== */

function sendMessage(){

  const text = userInput.value;
  if(!text) return;

  addMessage(text,"user");
  memory.chat.push(text);

  updateAffinity(text);

  userInput.value="";

  showTyping(()=>{
    const reply = getPersonalityReply(text);
    addMessage(reply,"bot");
  });

  localStorage.setItem("memory", JSON.stringify(memory));
}

/* ===== 音声入力 ===== */

function startVoice(){

  try{
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recog = new SpeechRecognition();

    recog.lang="ja-JP";

    recog.onresult=(e)=>{
      userInput.value = e.results[0][0].transcript;
    };

    recog.start();

  }catch(e){
    alert("音声未対応");
  }
}

</script>

</body>
</html>
