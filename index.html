<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#09111f;
  color:white;
}

/* ===== 全体 ===== */
.app{
  display:flex;
  flex-direction:column;
  height:100dvh;
}

/* ===== 画像（小さく固定） ===== */
.top-character{
  flex:0 0 22vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:5px;
}
.top-character img{
  width:92%;
  height:100%;
  object-fit:cover;
  border-radius:20px;
}

/* ===== パネル ===== */
.panel{
  display:none;
  flex:1;
  flex-direction:column;
}
.panel.active{
  display:flex;
}

/* ===== メッセージだけスクロール ===== */
#chatBox{
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

/* ===== 吹き出し ===== */
.message{
  padding:12px;
  border-radius:18px;
  margin:6px 0;
  max-width:78%;
  font-size:16px;
}

.user{
  background:#ff4f8b;
  align-self:flex-end;
}

.bot{
  background:#444;
}

/* ===== 入力固定 ===== */
.input-area{
  display:flex;
  padding:8px;
  background:#09111f;
}
input{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:none;
}
button{
  padding:12px;
  margin-left:6px;
}

/* ===== タブ固定 ===== */
.tabs{
  display:flex;
  background:#222;
}
.tab{
  flex:1;
  padding:12px;
  text-align:center;
  font-size:14px;
}
</style>
</head>

<body>

<div class="app">

<!-- キャラ -->
<div class="top-character">
<img id="mainGirl" src="girl-normal.jpg">
</div>

<!-- 会話 -->
<div id="chatPanel" class="panel active">
<div id="chatBox"></div>

<div class="input-area">
<input id="userInput">
<button onclick="sendMessage()">送信</button>
</div>
</div>

<!-- 分析 -->
<div id="analysisPanel" class="panel">
  <div style="padding:10px;">分析（これから強化）</div>
</div>

<!-- 未来 -->
<div id="futurePanel" class="panel">
  <div style="padding:10px;">未来（これから強化）</div>
</div>

<!-- 設定（復活） -->
<div id="settingsPanel" class="panel">
  <div style="padding:10px;">
    名前：<input id="nameInput"><br><br>
    <button onclick="saveName()">保存</button>
  </div>
</div>

<!-- タブ -->
<div class="tabs">
<div class="tab" onclick="switchTab('chat')">会話</div>
<div class="tab" onclick="switchTab('analysis')">分析</div>
<div class="tab" onclick="switchTab('future')">未来</div>
<div class="tab" onclick="switchTab('settings')">設定</div>
</div>

</div>

<script>

/* ===== タブ ===== */
function switchTab(tab){
  document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));

  if(tab==='chat') chatPanel.classList.add("active");
  if(tab==='analysis') analysisPanel.classList.add("active");
  if(tab==='future') futurePanel.classList.add("active");
  if(tab==='settings') settingsPanel.classList.add("active");
}

/* ===== 名前保存 ===== */
const nameInput = document.getElementById("nameInput");
nameInput.value = localStorage.getItem("userName") || "";

function saveName(){
  localStorage.setItem("userName", nameInput.value);
  alert("保存したよ");
}

/* ===== 会話 ===== */
function addMessage(text,type){
  const div=document.createElement("div");
  div.className="message "+type;
  div.textContent=text;
  chatBox.appendChild(div);
  chatBox.scrollTop=chatBox.scrollHeight;
}

function sendMessage(){
  const text=userInput.value;
  if(!text) return;

  addMessage(text,"user");

  const name = localStorage.getItem("userName") || "";

  let reply="ちゃんと聞いてるよ";

  if(text.includes("疲")){
    reply = name ? name+"、ちょっと無理してる感じあるね…" : "ちょっと無理してる感じあるね…";
  }

  addMessage(reply,"bot");

  userInput.value="";
}

</script>

</body>
</html>
