<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ピピAI 完全版</title>

<style>
*{ box-sizing:border-box; }

body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(#2b314d,#09111f);
  color:white;
}

.app{
  display:flex;
  flex-direction:column;
  height:100vh;
  overflow:hidden;
}

/* ===== 画像 ===== */
.top{
  flex:0 0 35%;
  display:flex;
  justify-content:center;
  align-items:center;
}
.top img{
  width:90%;
  max-width:420px;
  border-radius:20px;
  transition:0.3s;
}

/* ===== チャット ===== */
#chatBox{
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

.row{
  display:flex;
  margin:6px 0;
}

.row.bot{ justify-content:flex-start; }
.row.user{ justify-content:flex-end; }

.bubble{
  padding:12px 16px;
  border-radius:16px;
  max-width:75%;
  word-break:break-word;
}

.user .bubble{
  background:#ff4f8b;
  border-bottom-right-radius:4px;
}

.bot .bubble{
  background:#444;
  border-bottom-left-radius:4px;
}

/* ===== 入力 ===== */
.input-area{
  display:flex;
  gap:6px;
  padding:8px;
  background:#111;
  position:sticky;
  bottom:0;
}

#userInput{
  flex:1;
  padding:14px;
  border:none;
  border-radius:10px;
}

.input-area button{
  width:60px;
  height:55px;
  border:none;
  border-radius:10px;
}

.mic{ background:#5f9bff; }

/* ===== モーダル ===== */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.modal.show{ display:flex; }

.box{
  width:90%;
  max-width:400px;
  background:#222;
  padding:20px;
  border-radius:12px;
}

textarea{
  width:100%;
  height:120px;
}
</style>
</head>

<body>

<div class="app">

  <div class="top">
    <img id="girl" src="girl-normal.jpg">
  </div>

  <div id="chatBox"></div>

  <div class="input-area">
    <input id="userInput" placeholder="話してみて">
    <button onclick="sendMessage()">送信</button>
    <button class="mic" onclick="startVoice()">🎤</button>
    <button onclick="openSettings()">⚙</button>
  </div>

</div>

<!-- モーダル -->
<div class="modal" id="modal">
  <div class="box">

    キャラ名<br>
    <input id="aiNameInput"><br><br>

    <button onclick="saveSettings()">保存</button>
    <button onclick="closeSettings()">閉じる</button>

  </div>
</div>

<script>

// ===== DOM =====
const modal = document.getElementById("modal");
const chatBox = document.getElementById("chatBox");
const girl = document.getElementById("girl");

// ===== 表情 =====
const faceImages = {
  normal:"girl-normal.jpg",
  happy:"girl-happy.png",
  sad:"girl-sad.png",
  angry:"girl-angry.png",
  thinking:"girl-thinking.png"
};

function setFace(type){
  girl.src = faceImages[type] || faceImages.normal;
}

// 感情判定
function detectEmotion(text){

  if(/嬉しい|楽しい|最高|好き/.test(text)) return "happy";
  if(/疲れ|しんど|悲しい|つらい|泣/.test(text)) return "sad";
  if(/怒|イライラ/.test(text)) return "angry";
  if(/どうしよう|悩/.test(text)) return "thinking";

  return "normal";
}

// ===== データ =====
let settings={
  aiName:localStorage.getItem("aiName")||"ピピ"
};

// ===== 初期 =====
window.onload=()=>{
  aiNameInput.value=settings.aiName;
};

// ===== 保存 =====
function saveSettings(){
  settings.aiName=aiNameInput.value;
  localStorage.setItem("aiName",settings.aiName);
  alert("保存OK🔥");
  closeSettings();
}

// ===== UI =====
function openSettings(){ modal.classList.add("show"); }
function closeSettings(){ modal.classList.remove("show"); }

// ===== 表示 =====
function addMessage(text,type){
  const row=document.createElement("div");
  row.className="row "+type;

  const bubble=document.createElement("div");
  bubble.className="bubble";
  bubble.textContent=text;

  row.appendChild(bubble);
  chatBox.appendChild(row);
  chatBox.scrollTop=chatBox.scrollHeight;
}

// ===== 🔥 音声 =====
function speak(text){

  if(!("speechSynthesis" in window)){
    return;
  }

  speechSynthesis.cancel();

  const u=new SpeechSynthesisUtterance(text);
  u.lang="ja-JP";

  const voices=speechSynthesis.getVoices();
  const jaVoice=voices.find(v=>v.lang==="ja-JP");
  if(jaVoice) u.voice=jaVoice;

  speechSynthesis.speak(u);
}

// 初回タップで音声有効化
document.body.addEventListener("click",()=>{
  speechSynthesis.getVoices();
},{once:true});

// ===== ローカルAI =====
function localReply(text){
  if(/疲れ|しんど/.test(text)) return "大丈夫？無理しないでね";
  if(/こんにちは/.test(text)) return "こんにちは😊";
  if(/ありがとう/.test(text)) return "どういたしまして";
  return "うん、聞いてるよ";
}

// ===== 送信 =====
function sendMessage(){

  const text=userInput.value.trim();
  if(!text)return;

  addMessage(text,"user");
  userInput.value="";

  // 👇 ユーザー感情で顔変化
  setFace(detectEmotion(text));

  const reply=localReply(text);

  setTimeout(()=>{
    addMessage(reply,"bot");

    // 👇 AIの感情でも変化
    setFace(detectEmotion(reply));

    speak(reply);

  },500);
}

// ===== 音声入力 =====
function startVoice(){
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if(!SpeechRecognition){
    alert("音声入力非対応");
    return;
  }

  const recog=new SpeechRecognition();
  recog.lang="ja-JP";

  recog.onresult=(e)=>{
    userInput.value=e.results[0][0].transcript;
    sendMessage();
  };

  recog.start();
}

// Enter送信
userInput.addEventListener("keypress",e=>{
  if(e.key==="Enter")sendMessage();
});

</script>

</body>
</html>
