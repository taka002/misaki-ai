<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ピピAI 完全版</title>

<style>
*{ box-sizing:border-box; }

html,body{
  height:100%;
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(#2b314d,#09111f);
  color:white;
}

.app{
  display:flex;
  flex-direction:column;
  height:100vh;
  overflow:hidden;
}

.top{
  height:35vh;
  width:100%;
  overflow:hidden;
}

.top img{
  width:100%;
  height:100%;
  object-fit:cover;
}

#chatBox{
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

.row{ display:flex; margin:6px 0; }
.row.user{ justify-content:flex-end; }
.row.bot{ justify-content:flex-start; }

.bubble{
  padding:12px 16px;
  border-radius:16px;
  max-width:75%;
  white-space:pre-wrap;
}

.user .bubble{ background:#ff4f8b; }
.bot .bubble{ background:#444; }

.input-area{
  display:flex;
  gap:6px;
  padding:8px;
  background:#111;
}

#userInput{
  flex:1;
  padding:14px;
  border:none;
  border-radius:10px;
}

.input-area button{
  width:60px;
  height:55px;
  border:none;
  border-radius:10px;
}

.mic{ background:#5f9bff; }

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal.show{ display:flex; }

.box{
  width:90%;
  max-width:420px;
  max-height:85vh;
  overflow:auto;
  background:#222;
  padding:20px;
  border-radius:12px;
}

input,textarea{
  width:100%;
  margin-bottom:10px;
  padding:10px;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="app">

  <div class="top">
    <img id="girl">
  </div>

  <div id="chatBox"></div>

  <div class="input-area">
    <input id="userInput" placeholder="話してみて">
    <button onclick="sendMessage()">送信</button>
    <button class="mic" onclick="startVoice()">🎤</button>
    <button onclick="analyze()">🧠</button>
    <button onclick="openSettings()">⚙</button>
  </div>

</div>

<div class="modal" id="modal">
  <div class="box">
    キャラ名<input id="nameInput">
    画像URL<input id="imageInput">
    画像選択<input type="file" id="imageFile" accept="image/*">
    OpenAI APIKey<input id="apiKeyInput">
    プロンプト<textarea id="promptInput"></textarea>
    <button onclick="saveSettings()">保存</button>
    <button onclick="closeSettings()">閉じる</button>
  </div>
</div>

<script>
let chatBox, girl, modal, userInput;
let nameInput, imageInput, apiKeyInput, promptInput, imageFile;

let chatLog=[];

let settings={
  name:localStorage.getItem("name")||"ピピ",
  image:localStorage.getItem("image")||"",
  apiKey:localStorage.getItem("apiKey")||"",
  prompt:localStorage.getItem("prompt")||"優しく話す"
};

window.addEventListener("DOMContentLoaded",()=>{

  chatBox=document.getElementById("chatBox");
  girl=document.getElementById("girl");
  modal=document.getElementById("modal");
  userInput=document.getElementById("userInput");

  nameInput=document.getElementById("nameInput");
  imageInput=document.getElementById("imageInput");
  apiKeyInput=document.getElementById("apiKeyInput");
  promptInput=document.getElementById("promptInput");
  imageFile=document.getElementById("imageFile");

  girl.src=settings.image || "https://via.placeholder.com/400x300";

  imageFile.addEventListener("change",()=>{
    const file=imageFile.files[0];
    const reader=new FileReader();
    reader.onload=e=>{
      settings.image=e.target.result;
      girl.src=settings.image;
    };
    reader.readAsDataURL(file);
  });

  userInput.addEventListener("keypress",e=>{
    if(e.key==="Enter") sendMessage();
  });

});

// ===== 表示（画像対応）=====
function addMessage(text,type,isImage=false){

  const row=document.createElement("div");
  row.className="row "+type;

  const bubble=document.createElement("div");
  bubble.className="bubble";

  if(isImage){
    const img=document.createElement("img");
    img.src=text;
    img.style.width="150px";
    img.style.borderRadius="12px";
    bubble.appendChild(img);
  }else{
    bubble.textContent=text;
  }

  row.appendChild(bubble);
  chatBox.appendChild(row);
  chatBox.scrollTop=chatBox.scrollHeight;
}

// ===== 動物決定 =====
function getAnimal(text){
  if(text.includes("不安")) return {img:"https://source.unsplash.com/200x200/?rabbit",msg:"ちょっと不安だよね…でも大丈夫"};
  if(text.includes("怒")) return {img:"https://source.unsplash.com/200x200/?tiger",msg:"イライラしてるね…落ち着こう"};
  if(text.includes("疲")) return {img:"https://source.unsplash.com/200x200/?sleeping-cat",msg:"今日は休んでいいよ"};
  if(text.includes("悲")) return {img:"https://source.unsplash.com/200x200/?puppy",msg:"つらかったね…そばにいるよ"};
  return {img:"https://source.unsplash.com/200x200/?hamster",msg:"ゆっくりいこう"};
}

// ===== 音声 =====
function speak(text){
  if(!("speechSynthesis" in window)) return;

  const u=new SpeechSynthesisUtterance(text);
  u.lang="ja-JP";
  speechSynthesis.speak(u);
}

// ===== AI =====
async function aiReply(text){

  if(!settings.apiKey) return "APIキー未設定";

  const res=await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+settings.apiKey
    },
    body:JSON.stringify({
      model:"gpt-4o-mini",
      messages:[
        {role:"system",content:`あなたは${settings.name}。${settings.prompt}`},
        ...chatLog.slice(-20),
        {role:"user",content:text}
      ]
    })
  });

  const data=await res.json();
  return data.choices[0].message.content;
}

// ===== 送信 =====
async function sendMessage(){

  const text=userInput.value.trim();
  if(!text) return;

  chatLog.push({role:"user",content:text});
  addMessage(text,"user");
  userInput.value="";

  const reply=await aiReply(text);

  chatLog.push({role:"assistant",content:reply});
  addMessage(reply,"bot");
  speak(reply);
}

// ===== CBT分析＋動物 =====
async function analyze(){

  if(chatLog.length===0){
    alert("会話がないよ");
    return;
  }

  addMessage("分析中…","bot");

  const res=await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+settings.apiKey
    },
    body:JSON.stringify({
      model:"gpt-4o-mini",
      messages:[
        {
          role:"system",
          content:`認知行動療法で分析：
①出来事
②思考
③感情
④歪み
⑤新しい考え
⑥行動`
        },
        ...chatLog.slice(-20)
      ]
    })
  });

  const data=await res.json();
  const result=data.choices[0].message.content;

  addMessage(result,"bot");

  const animal=getAnimal(result);

  addMessage(animal.img,"bot",true);
  addMessage("🐾 "+animal.msg,"bot");

  speak(animal.msg);
}

// ===== 音声入力 =====
function startVoice(){
  const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SpeechRecognition) return;

  const recog=new SpeechRecognition();
  recog.lang="ja-JP";

  recog.onresult=(e)=>{
    userInput.value=e.results[0][0].transcript;
    sendMessage();
  };

  recog.start();
}

// ===== 設定 =====
function saveSettings(){
  settings.name=nameInput.value;
  settings.apiKey=apiKeyInput.value;
  settings.prompt=promptInput.value;

  if(imageInput.value.trim()){
    settings.image=imageInput.value.trim();
  }

  localStorage.setItem("name",settings.name);
  localStorage.setItem("apiKey",settings.apiKey);
  localStorage.setItem("prompt",settings.prompt);
  localStorage.setItem("image",settings.image);

  girl.src=settings.image;
  closeSettings();
}

function openSettings(){ modal.classList.add("show"); }
function closeSettings(){ modal.classList.remove("show"); }

</script>

</body>
</html>
