<!-- 🔻変更点は script 内のみ -->
<script>
let chatBox, girl, modal, userInput;
let nameInput, imageInput, apiKeyInput, promptInput, imageFile;
let elevenApiKeyInput, voiceIdInput;

let chatLog=[];

// 🔥 追加
let wakeRecog=null;
let isListening=false;

let settings={
  name:localStorage.getItem("name")||"ピピ",
  image:localStorage.getItem("image")||"",
  apiKey:localStorage.getItem("apiKey")||"",
  elevenApiKey:localStorage.getItem("elevenApiKey")||"",
  voiceId:localStorage.getItem("voiceId")||"",
  prompt:localStorage.getItem("prompt")||"優しく話す"
};

window.addEventListener("DOMContentLoaded",()=>{

  chatBox=document.getElementById("chatBox");
  girl=document.getElementById("girl");
  modal=document.getElementById("modal");
  userInput=document.getElementById("userInput");

  nameInput=document.getElementById("nameInput");
  imageInput=document.getElementById("imageInput");
  apiKeyInput=document.getElementById("apiKeyInput");
  promptInput=document.getElementById("promptInput");
  imageFile=document.getElementById("imageFile");

  elevenApiKeyInput=document.getElementById("elevenApiKeyInput");
  voiceIdInput=document.getElementById("voiceIdInput");

  girl.src=settings.image || "https://cdn.pixabay.com/photo/2017/01/31/13/14/animal-2023924_1280.png";

  document.body.addEventListener("click",()=>{
    if("speechSynthesis" in window){
      speechSynthesis.getVoices();
    }

    // 🔥 初回クリックで常時リスニング開始
    startWakeWord();

  },{once:true});

  imageFile.addEventListener("change",()=>{
    const file=imageFile.files[0];
    const reader=new FileReader();
    reader.onload=e=>{
      settings.image=e.target.result;
      girl.src=settings.image;
    };
    reader.readAsDataURL(file);
  });

  userInput.addEventListener("keypress",e=>{
    if(e.key==="Enter") sendMessage();
  });

});

// ===== 🔥 ウェイクワード検知 =====
function startWakeWord(){

  const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SpeechRecognition) return;

  if(wakeRecog) wakeRecog.stop();

  wakeRecog=new SpeechRecognition();
  wakeRecog.lang="ja-JP";
  wakeRecog.continuous=true;
  wakeRecog.interimResults=false;

  wakeRecog.onresult=(e)=>{
    const text=e.results[e.results.length-1][0].transcript;

    console.log("待機音声:",text);

    // 🔥 キャラ名呼び検知
    if(text.includes(settings.name)){
      console.log("呼ばれた！");
      wakeRecog.stop();
      setTimeout(startVoice,300);
    }
  };

  wakeRecog.onend=()=>{
    // 🔁 常時再起動
    setTimeout(startWakeWord,1000);
  };

  wakeRecog.start();
}

// ===== 表示 =====
function addMessage(text,type,isImage=false){
  const row=document.createElement("div");
  row.className="row "+type;

  const bubble=document.createElement("div");
  bubble.className="bubble";

  if(isImage){
    const img=document.createElement("img");
    img.src=text;
    img.style.width="160px";
    img.style.borderRadius="12px";
    bubble.appendChild(img);
  }else{
    bubble.textContent=text;
  }

  row.appendChild(bubble);
  chatBox.appendChild(row);
  chatBox.scrollTop=chatBox.scrollHeight;
}

// ===== 音声 =====
async function speak(text){

  if(!text) return;

  if(settings.elevenApiKey && settings.voiceId){
    try{
      const res = await fetch(
        `https://api.elevenlabs.io/v1/text-to-speech/${settings.voiceId}`,
        {
          method:"POST",
          headers:{
            "xi-api-key":settings.elevenApiKey,
            "Content-Type":"application/json",
            "Accept":"audio/mpeg"
          },
          body:JSON.stringify({
            text:text,
            model_id:"eleven_multilingual_v2"
          })
        }
      );

      if(res.ok){
        const blob=await res.blob();
        const url=URL.createObjectURL(blob);

        const audio=new Audio(url);
        audio.play();

        audio.onended=()=>{
          URL.revokeObjectURL(url);
          startWakeWord(); // 🔥 会話ループ
        };
        return;
      }

    }catch(e){}
  }

  const u=new SpeechSynthesisUtterance(text);
  u.lang="ja-JP";

  u.onend=()=>startWakeWord(); // 🔥 ループ

  speechSynthesis.speak(u);
}

// ===== AI =====
async function aiReply(text){

  if(!settings.apiKey) return "APIキー未設定";

  try{
    const res=await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+settings.apiKey
      },
      body:JSON.stringify({
        model:"gpt-4o-mini",
        messages:[
          {role:"system",content:`あなたは${settings.name}。${settings.prompt}`},
          ...chatLog.slice(-20),
          {role:"user",content:text}
        ]
      })
    });

    const data=await res.json();

    if(!data.choices){
      console.log(data);
      return "AIエラー：" + (data.error?.message || "不明");
    }

    return data.choices[0].message.content;

  }catch(e){
    return "通信エラー";
  }
}

// ===== 送信 =====
async function sendMessage(){

  const text=userInput.value.trim();
  if(!text) return;

  chatLog.push({role:"user",content:text});
  addMessage(text,"user");
  userInput.value="";

  const reply=await aiReply(text);

  chatLog.push({role:"assistant",content:reply});
  addMessage(reply,"bot");
  speak(reply);
}

// ===== 分析 =====
async function analyze(){

  if(chatLog.length===0){
    alert("会話がないよ");
    return;
  }

  addMessage("🧠 分析中…","bot");

  try{
    const res=await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+settings.apiKey
      },
      body:JSON.stringify({
        model:"gpt-4o-mini",
        messages:[
          {
            role:"system",
            content:`認知行動療法で5カラム形式：
①出来事②思考③感情④歪み⑤新しい考え⑥行動`
          },
          ...chatLog.slice(-20)
        ]
      })
    });

    const data=await res.json();

    if(!data.choices){
      addMessage("分析エラー","bot");
      return;
    }

    const text=data.choices[0].message.content;
    addMessage(text,"bot");
    speak(text);

  }catch(e){
    addMessage("通信エラー","bot");
  }
}

// ===== 音声入力 =====
function startVoice(){
  const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SpeechRecognition) return;

  const recog=new SpeechRecognition();
  recog.lang="ja-JP";

  recog.onresult=(e)=>{
    userInput.value=e.results[0][0].transcript;
    sendMessage();
  };

  recog.start();
}

// ===== 設定 =====
function saveSettings(){

  settings.name=nameInput.value;
  settings.apiKey=apiKeyInput.value;
  settings.prompt=promptInput.value;

  settings.elevenApiKey=elevenApiKeyInput.value;
  settings.voiceId=voiceIdInput.value;

  if(imageInput.value.trim()){
    settings.image=imageInput.value.trim();
  }

  localStorage.setItem("name",settings.name);
  localStorage.setItem("apiKey",settings.apiKey);
  localStorage.setItem("prompt",settings.prompt);
  localStorage.setItem("image",settings.image);

  localStorage.setItem("elevenApiKey",settings.elevenApiKey);
  localStorage.setItem("voiceId",settings.voiceId);

  girl.src=settings.image;
  closeSettings();
}

function openSettings(){ modal.classList.add("show"); }
function closeSettings(){ modal.classList.remove("show"); }

</script>
