<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI 完成</title>

<style>
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:#08121f;
  font-family:sans-serif;
  color:white;
}

.app{
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* ===== 画像 ===== */
.top{
  height:28%;
  display:flex;
  justify-content:center;
  align-items:center;
}
.top img{
  width:90%;
  height:100%;
  object-fit:cover;
  border-radius:20px;
  background:#222;
}

/* ===== チャット ===== */
#chatBox{
  height:42%;
  overflow-y:auto;
  padding:8px;
}

/* ===== メッセージ ===== */
.message{
  max-width:75%;
  padding:10px;
  border-radius:14px;
  margin:6px;
  font-size:13px;
}
.user{
  background:#ff4f8b;
  margin-left:auto;
}
.bot{
  background:#444;
}

/* ===== 入力 ===== */
.input{
  height:14%;
  display:flex;
  align-items:center;
  padding:6px;
  background:#111;
}

input{
  flex:1;
  min-width:0;
  padding:10px;
  border-radius:10px;
  border:none;
}

button{
  flex-shrink:0;
  width:55px;
  margin-left:5px;
  border:none;
  border-radius:10px;
}

/* ===== スタンプ ===== */
#stampPanel{
  display:none;
  height:10%;
  background:#222;
  overflow-x:auto;
  padding:5px;
}

/* ===== タブ ===== */
.tabs{
  height:8%;
  display:flex;
  background:#222;
}
.tab{
  flex:1;
  text-align:center;
  padding:8px;
  font-size:12px;
}
</style>
</head>

<body>

<div class="app">

<div class="top">
<img id="face" src="girl-normal.jpg"
onerror="this.src='https://via.placeholder.com/300x200'">
</div>

<div id="chatBox"></div>

<div id="stampPanel"></div>

<div class="input">
<button onclick="toggleStamp()">😊</button>
<button onclick="startVoice()">🎤</button>
<input id="userInput" placeholder="話しかけて...">
<button onclick="sendMessage()">送信</button>
</div>

<div class="tabs">
<div class="tab">会話</div>
<div class="tab">分析</div>
<div class="tab">未来</div>
<div class="tab">設定</div>
</div>

</div>

<script>

/* ===== 状態 ===== */
let name = localStorage.getItem("name") || "あなた";
let love = Number(localStorage.getItem("love") || 0);

/* ===== 表情 ===== */
const faces = {
  normal:"girl-normal.jpg",
  happy:"girl-happy.png",
  exhausted:"girl-exhausted.png",
  healing:"girl-healing.png",
  irritated:"girl-irritated.png",
  panic:"girl-panic.png",
  sympathy:"girl-sympathy.png",
  troubled:"girl-troubled.png",
  worried:"girl-worried.png"
};

function setFace(type){
  document.getElementById("face").src = faces[type] || faces.normal;
}

/* ===== 時間 ===== */
function time(){
  const d=new Date();
  return d.getHours().toString().padStart(2,"0")+":"+
         d.getMinutes().toString().padStart(2,"0");
}

/* ===== メッセージ ===== */
function addMessage(text,type){

  const div=document.createElement("div");
  div.className="message "+type;

  if(type==="user"){
    div.innerHTML = `
      ${text}
      <div style="font-size:10px;color:#ddd;text-align:right">
        ${time()} ✔✔
      </div>`;
  }else{
    div.innerHTML = `
      <div style="font-size:11px;color:#aaa">美咲</div>
      ${text}
      <div style="font-size:10px;color:#aaa">${time()}</div>`;
  }

  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

/* ===== 感情分析 ===== */
function analyze(text){

  if(text.includes("疲") || text.includes("しんど")){
    return {mood:"exhausted",
    list:["無理してない？","今日は少し休も？","ちゃんと頑張ってるよ"]};
  }

  if(text.includes("楽") || text.includes("嬉")){
    return {mood:"happy",
    list:["それいいね","聞いてて嬉しい","いい感じだね"]};
  }

  if(text.includes("不安") || text.includes("心配")){
    return {mood:"worried",
    list:["一人で抱えてない？","大丈夫？","話してくれてありがとう"]};
  }

  return {mood:"normal",
  list:["ちゃんと聞いてるよ","もう少し教えて？","どうだった？"]};
}

/* ===== 親密度で変化 ===== */
function makeReply(base){

  let text = base;

  if(love > 10){
    text = name + "、" + text;
  }

  if(love > 30){
    text += " そばにいるよ";
  }

  if(love > 60){
    text = name + "、おかえり。待ってた";
  }

  return text;
}

/* ===== AI返信 ===== */
function botReply(text){

  const res = analyze(text);

  setFace(res.mood);

  love += 2;
  localStorage.setItem("love",love);

  const base = res.list[Math.floor(Math.random()*res.list.length)];
  const reply = makeReply(base);

  // 既読
  const read=document.createElement("div");
  read.style.fontSize="10px";
  read.style.color="#aaa";
  read.style.margin="3px";
  read.textContent="既読";
  chatBox.appendChild(read);

  // タイピング
  const typing=document.createElement("div");
  typing.className="message bot";
  typing.textContent="…";
  chatBox.appendChild(typing);

  setTimeout(()=>{
    typing.remove();
    addMessage(reply,"bot");
  },1000);
}

/* ===== 送信 ===== */
function sendMessage(){

  const text=userInput.value;
  if(!text) return;

  addMessage(text,"user");
  userInput.value="";

  botReply(text);
}

/* ===== スタンプ ===== */
const stamps=[
  {e:"😊",m:"happy"},
  {e:"😢",m:"sympathy"},
  {e:"😡",m:"irritated"},
  {e:"😴",m:"exhausted"},
  {e:"😰",m:"panic"},
  {e:"💛",m:"healing"},
  {e:"😟",m:"worried"},
  {e:"😞",m:"troubled"}
];

function toggleStamp(){
  const p=document.getElementById("stampPanel");
  p.style.display=p.style.display==="block"?"none":"block";
  p.innerHTML="";

  stamps.forEach(s=>{
    const b=document.createElement("button");
    b.textContent=s.e;
    b.onclick=()=>{
      addMessage(s.e,"user");
      setFace(s.m);
      p.style.display="none";
    };
    p.appendChild(b);
  });
}

/* ===== 音声入力 ===== */
function startVoice(){
  try{
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const r=new SpeechRecognition();
    r.lang="ja-JP";
    r.onresult=(e)=>{
      userInput.value=e.results[0][0].transcript;
      sendMessage();
    };
    r.start();
  }catch{
    alert("音声使えない");
  }
}

/* ===== 初回 ===== */
window.onload=()=>{
  addMessage(name+"、おかえり","bot");
};

</script>

</body>
</html>
