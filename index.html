<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>美咲AI 完全版</title>

  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      transition: background 0.45s ease;
    }

    body {
      background: linear-gradient(to bottom, #2b314d, #09111f);
      color: white;
      display: flex;
      flex-direction: column;
    }

    .app {
      width: 100%;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding-bottom: 98px;
    }

    /* ===== 上画像 ===== */
    .top-character {
      flex: 0 0 34vh;
      min-height: 240px;
      max-height: 360px;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 14px 14px 8px;
      position: relative;
    }

    .top-character img {
      width: min(92vw, 520px);
      height: 100%;
      object-fit: cover;
      border-radius: 28px;
      border: 3px solid rgba(255,255,255,0.14);
      box-shadow: 0 16px 34px rgba(0,0,0,0.38);
      background: rgba(255,255,255,0.03);
      transition: all 0.28s ease;
      display: block;
    }

    .settings-open {
      position: absolute;
      top: 18px;
      right: 18px;
      width: 76px;
      height: 76px;
      border-radius: 50%;
      border: none;
      font-size: 32px;
      background: rgba(255,255,255,0.16);
      color: white;
      backdrop-filter: blur(8px);
      box-shadow: 0 10px 26px rgba(0,0,0,0.22);
      cursor: pointer;
      z-index: 5;
    }

    /* ===== 会話エリア ===== */
    .chat-section {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding: 0 12px;
      overflow: hidden;
    }

    #chatBox {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 6px 2px 12px;
      scroll-behavior: smooth;
    }

    .message {
      max-width: 86%;
      padding: 16px 18px;
      border-radius: 24px;
      font-size: clamp(16px, 2.4vw, 18px);
      line-height: 1.95;
      white-space: pre-wrap;
      word-break: break-word;
      animation: fadeIn 0.22s ease;
    }

    .bot {
      align-self: flex-start;
      background: rgba(255,255,255,0.11);
      border-bottom-left-radius: 10px;
      color: #fff;
      box-shadow: 0 8px 18px rgba(0,0,0,0.12);
    }

    .user {
      align-self: flex-end;
      background: linear-gradient(135deg, #ff7eb3, #ff4f8b);
      border-bottom-right-radius: 10px;
      color: white;
      box-shadow: 0 8px 18px rgba(255,93,151,0.25);
    }

    .typing {
      opacity: 0.72;
      font-style: italic;
    }

    /* ===== 分析画面 ===== */
    #analysisScreen {
      display: none;
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 0 12px 16px;
    }

    .analysis-screen-card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 18px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.16);
      margin-top: 6px;
    }

    .analysis-screen-title {
      font-size: 28px;
      font-weight: bold;
      color: #ffdce9;
      margin-bottom: 14px;
    }

    .analysis-screen-desc {
      font-size: 15px;
      line-height: 1.9;
      opacity: 0.9;
      margin-bottom: 18px;
    }

    .analysis-run-btn {
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: 20px;
      font-size: 18px;
      font-weight: bold;
      color: white;
      cursor: pointer;
      background: linear-gradient(135deg, #7a69ff, #5f9bff);
      box-shadow: 0 14px 28px rgba(95,155,255,0.22);
      margin-bottom: 14px;
    }

    #analysisEmptyText {
      font-size: 14px;
      opacity: 0.78;
      line-height: 1.8;
      margin-top: 8px;
    }

    /* ===== 分析パネル ===== */
    #analysisPanel {
      display: none;
      flex-shrink: 0;
      margin: 14px 0 10px;
      padding: 16px;
      border-radius: 24px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 10px 24px rgba(0,0,0,0.16);
      backdrop-filter: blur(6px);
      overflow-y: auto;
    }

    .analysis-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 14px;
      color: #ffe4ef;
    }

    .animal-hero {
      text-align: center;
      margin-bottom: 14px;
    }

    .animal-emoji {
      font-size: 76px;
      line-height: 1;
      margin-bottom: 8px;
    }

    .animal-name {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .animal-sub {
      font-size: 14px;
      opacity: 0.88;
      line-height: 1.8;
    }

    .analysis-section {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .analysis-subtitle {
      font-size: 15px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #f6dfff;
    }

    .bar-row {
      margin-bottom: 12px;
    }

    .bar-label {
      font-size: 14px;
      margin-bottom: 6px;
      opacity: 0.94;
    }

    .bar-bg {
      width: 100%;
      height: 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.10);
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.55s ease;
    }

    .analysis-text {
      font-size: 14px;
      line-height: 1.9;
      opacity: 0.94;
    }

    .compare-line {
      font-size: 13px;
      line-height: 1.9;
      opacity: 0.88;
    }

    .weekly-block {
      margin-top: 12px;
    }

    .weekly-row {
      margin-bottom: 16px;
    }

    .weekly-label {
      font-size: 13px;
      margin-bottom: 8px;
      opacity: 0.92;
    }

    .mini-bars {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      height: 74px;
    }

    .mini-bar {
      flex: 1;
      min-width: 0;
      border-radius: 10px 10px 6px 6px;
      opacity: 0.92;
    }

    .weekly-note {
      font-size: 12px;
      opacity: 0.72;
      margin-top: 8px;
    }

    /* ===== ステータス ===== */
    .status-bar {
      flex-shrink: 0;
      font-size: 13px;
      opacity: 0.82;
      padding: 0 16px 8px;
      min-height: 22px;
    }

    /* ===== 入力エリア ===== */
    .input-area {
      flex-shrink: 0;
      display: grid;
      grid-template-columns: 1fr 88px 112px;
      gap: 10px;
      padding: 12px;
      background: rgba(0,0,0,0.24);
      border-top: 1px solid rgba(255,255,255,0.08);
      align-items: center;
    }

    input[type="text"], input[type="password"], select {
      width: 100%;
      min-width: 0;
      padding: 16px 18px;
      border-radius: 20px;
      border: none;
      outline: none;
      font-size: 18px;
      background: rgba(255,255,255,0.96);
      color: #222;
    }

    .mic-btn, .send-btn {
      border: none;
      border-radius: 24px;
      color: white;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 12px 24px rgba(0,0,0,0.16);
    }

    .mic-btn {
      width: 88px;
      height: 84px;
      font-size: 34px;
      background: rgba(255,255,255,0.12);
    }

    .mic-btn.listening {
      background: linear-gradient(135deg, #7a69ff, #5f9bff);
      box-shadow: 0 0 0 8px rgba(122,105,255,0.18);
    }

    .send-btn {
      width: 112px;
      height: 84px;
      font-size: 22px;
      background: linear-gradient(135deg, #ff7eb3, #ff4f8b);
      box-shadow: 0 14px 28px rgba(255,79,139,0.28);
    }

    .send-btn:active,
    .mic-btn:active,
    .settings-open:active {
      transform: scale(0.97);
    }

    #chatBox::-webkit-scrollbar,
    #analysisPanel::-webkit-scrollbar,
    #analysisScreen::-webkit-scrollbar,
    .modal-box::-webkit-scrollbar {
      width: 6px;
    }

    #chatBox::-webkit-scrollbar-thumb,
    #analysisPanel::-webkit-scrollbar-thumb,
    #analysisScreen::-webkit-scrollbar-thumb,
    .modal-box::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.18);
      border-radius: 999px;
    }

    /* ===== アニメ ===== */
    .speaking {
      animation: pulseTalk 0.75s infinite ease-in-out;
    }

    .face-change {
      animation: facePop 0.25s ease;
    }

    @keyframes pulseTalk {
      0%   { transform: scale(1) translateY(0px); }
      25%  { transform: scale(1.01) translateY(-1px); }
      50%  { transform: scale(1.02) translateY(0px); }
      75%  { transform: scale(1.01) translateY(-1px); }
      100% { transform: scale(1) translateY(0); }
    }

    @keyframes facePop {
      0%   { transform: scale(0.97); opacity: 0.75; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ===== 設定モーダル ===== */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 999;
      padding: 18px;
    }

    .modal.show {
      display: flex;
    }

    .modal-box {
      width: 100%;
      max-width: 420px;
      max-height: 88vh;
      overflow-y: auto;
      background: #2a2236;
      border-radius: 28px;
      padding: 22px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.45);
    }

    .modal-title {
      font-size: 26px;
      font-weight: bold;
      color: #ffd1e6;
      margin-bottom: 18px;
    }

    .setting-row {
      margin-bottom: 16px;
    }

    .setting-label {
      font-size: 16px;
      opacity: 0.95;
      margin-bottom: 8px;
      display: block;
      line-height: 1.6;
    }

    .setting-input {
      width: 100%;
      padding: 16px;
      border-radius: 18px;
      border: none;
      font-size: 18px;
      outline: none;
    }

    .toggle-btn, .danger-btn, .close-btn, .save-btn, .voice-chip {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 18px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    .toggle-btn {
      background: #5f5470;
      color: white;
    }

    .danger-btn {
      background: #8a3d57;
      color: white;
    }

    .save-btn {
      background: linear-gradient(135deg, #7a69ff, #5f9bff);
      color: white;
    }

    .close-btn {
      background: linear-gradient(135deg, #ff7eb3, #ff4f8b);
      color: white;
    }

    .hint {
      font-size: 13px;
      opacity: 0.72;
      margin-top: 6px;
      line-height: 1.6;
    }

    .voice-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .voice-chip {
      padding: 14px 10px;
      font-size: 15px;
      background: rgba(255,255,255,0.1);
      color: white;
      margin-top: 0;
    }

    .voice-chip.active {
      background: linear-gradient(135deg, #7a69ff, #5f9bff);
    }

    /* ===== 下タブ ===== */
    .bottom-tabs {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
      background: rgba(8, 10, 20, 0.88);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255,255,255,0.08);
      z-index: 998;
    }

    .tab-btn {
      border: none;
      border-radius: 22px;
      background: rgba(255,255,255,0.08);
      color: white;
      padding: 12px 8px;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      min-height: 74px;
      box-shadow: 0 10px 22px rgba(0,0,0,0.12);
    }

    .tab-btn span {
      display: block;
      font-size: 13px;
      margin-top: 4px;
      opacity: 0.92;
    }

    .tab-btn.active {
      background: linear-gradient(135deg, #ff7eb3, #ff4f8b);
      box-shadow: 0 14px 28px rgba(255,79,139,0.24);
    }

    @media (max-width: 430px) {
      .top-character {
        flex: 0 0 32vh;
        min-height: 220px;
      }

      .settings-open {
        width: 68px;
        height: 68px;
        font-size: 28px;
      }

      .input-area {
        grid-template-columns: 1fr 84px 106px;
      }

      .mic-btn {
        width: 84px;
        height: 80px;
      }

      .send-btn {
        width: 106px;
        height: 80px;
      }

      .voice-grid {
        grid-template-columns: 1fr;
      }

      .animal-emoji {
        font-size: 66px;
      }

      .animal-name {
        font-size: 18px;
      }

      #analysisPanel {
        padding: 14px;
        border-radius: 22px;
      }

      .analysis-screen-title {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="app">

    <!-- 上 -->
    <div class="top-character">
      <img id="mainGirl" src="girl-normal.jpg?v=1" alt="美咲">
      <button class="settings-open" onclick="openSettings()">⚙</button>
    </div>

    <!-- 会話 -->
    <div class="chat-section">
      <div id="chatBox"></div>
    </div>

    <!-- 分析 -->
    <div id="analysisScreen">
      <div class="analysis-screen-card">
        <div class="analysis-screen-title">📊 分析を見る</div>
        <div class="analysis-screen-desc">
          会話内容から、今のこころの状態を見やすく整理します。
        </div>

        <button class="analysis-run-btn" onclick="analyzeCurrentConversation()">
          今の会話から分析する
        </button>

        <div id="analysisEmptyText">
          まだ分析していません。<br>
          上のボタンを押すと、動物タイプ・グラフ・比較・今週の流れが見られます。
        </div>
      </div>

      <div id="analysisPanel"></div>
    </div>

    <!-- 状態 -->
    <div class="status-bar" id="statusBar">準備OK</div>

    <!-- 下入力 -->
    <div class="input-area">
      <input type="text" id="userInput" placeholder="何か話してみて…" />
      <button class="mic-btn" id="micBtn" onclick="startVoiceInput()">🎤</button>
      <button class="send-btn" onclick="sendMessage()">送信</button>
    </div>
  </div>

  <!-- 下タブ -->
  <div class="bottom-tabs">
    <button class="tab-btn active" id="tabChatBtn" onclick="switchTab('chat')">💬<br><span>会話</span></button>
    <button class="tab-btn" id="tabAnalysisBtn" onclick="switchTab('analysis')">📊<br><span>分析</span></button>
    <button class="tab-btn" id="tabSettingsBtn" onclick="switchTab('settings')">⚙<br><span>設定</span></button>
  </div>

  <!-- 設定 -->
  <div class="modal" id="settingsModal">
    <div class="modal-box">
      <div class="modal-title">設定</div>

      <div class="setting-row">
        <label class="setting-label">あなたの呼び名（時々呼ぶ）</label>
        <input class="setting-input" id="userNameInput" placeholder="だいすけ">
      </div>

      <div class="setting-row">
        <label class="setting-label">キャラ名</label>
        <input class="setting-input" id="nameInput" placeholder="美咲">
      </div>

      <div class="setting-row">
        <label class="setting-label">OpenAI APIキー（※保存しません）</label>
        <input class="setting-input" id="apiKeyInput" type="password" placeholder="sk-..." />
        <div class="hint">再起動すると空になります。会話履歴は残ります。</div>
      </div>

      <div class="setting-row">
        <label class="setting-label">ElevenLabs APIキー（※保存しません）</label>
        <input class="setting-input" id="elevenApiKeyInput" type="password" placeholder="sk_..." />
        <div class="hint">自然音声を使う時だけ入力します。再起動で消えます。</div>
      </div>

      <div class="setting-row">
        <label class="setting-label">Voice ID（※保存しません）</label>
        <input class="setting-input" id="voiceIdInput" type="text" placeholder="wcs09USXSN5Bl7FXohVZ" />
        <div class="hint">ElevenLabsの声ID。再起動で消えます。</div>
      </div>

      <div class="setting-row">
        <label class="setting-label">音声エンジン</label>
        <select class="setting-input" id="voiceEngineSelect">
          <option value="standard">スマホ標準音声</option>
          <option value="eleven">ElevenLabs音声</option>
        </select>
      </div>

      <div class="setting-row">
        <label class="setting-label">比較する分析履歴</label>
        <select class="setting-input" id="compareDepthSelect">
          <option value="1">前回と比較</option>
          <option value="2">2回前と比較</option>
          <option value="3">3回前と比較</option>
          <option value="4">4回前と比較</option>
          <option value="5">5回前と比較</option>
        </select>
        <div class="hint">分析画面の比較対象です</div>
      </div>

      <div class="setting-row">
        <label class="setting-label">声の簡単切り替え（ボタン）</label>
        <div class="voice-grid">
          <button class="voice-chip" id="voiceChipGentle" onclick="setVoicePreset('gentle')">優しい</button>
          <button class="voice-chip" id="voiceChipBright" onclick="setVoicePreset('bright')">明るい</button>
          <button class="voice-chip" id="voiceChipCalm" onclick="setVoicePreset('calm')">落ち着き</button>
        </div>
        <div class="hint">押すと Voice ID 欄に反映されます。必要なら上書きしてOK。</div>
      </div>

      <button class="save-btn" onclick="saveSettings()">💾 保存する</button>
      <button class="toggle-btn" id="gptToggle" onclick="toggleGPT()">🤖 GPT OFF</button>
      <button class="toggle-btn" id="voiceToggle" onclick="toggleVoice()">🔊 音声ON</button>
      <button class="toggle-btn" id="elevenToggle" onclick="toggleElevenVoice()">🎙 Eleven音声OFF</button>
      <button class="danger-btn" onclick="resetMemory()">記憶をリセット</button>
      <button class="close-btn" onclick="closeSettings()">閉じる</button>
    </div>
  </div>

  <script>
    const chatBox = document.getElementById("chatBox");
    const userInput = document.getElementById("userInput");
    const mainGirl = document.getElementById("mainGirl");
    const settingsModal = document.getElementById("settingsModal");
    const voiceToggleBtn = document.getElementById("voiceToggle");
    const gptToggleBtn = document.getElementById("gptToggle");
    const nameInput = document.getElementById("nameInput");
    const userNameInput = document.getElementById("userNameInput");
    const apiKeyInput = document.getElementById("apiKeyInput");
    const elevenApiKeyInput = document.getElementById("elevenApiKeyInput");
    const voiceIdInput = document.getElementById("voiceIdInput");
    const voiceEngineSelect = document.getElementById("voiceEngineSelect");
    const statusBar = document.getElementById("statusBar");
    const micBtn = document.getElementById("micBtn");
    const analysisPanel = document.getElementById("analysisPanel");
    const analysisScreen = document.getElementById("analysisScreen");
    const analysisEmptyText = document.getElementById("analysisEmptyText");
    const compareDepthSelect = document.getElementById("compareDepthSelect");
    const chatSection = document.querySelector(".chat-section");
    const inputArea = document.querySelector(".input-area");

    let voiceEnabled = localStorage.getItem("voiceEnabled") !== "false";
    let gptEnabled = localStorage.getItem("gptEnabled") === "true";
    let elevenVoiceEnabled = localStorage.getItem("elevenVoiceEnabled") === "true";
    let voiceEngine = localStorage.getItem("voiceEngine") || "standard";
    let selectedVoicePreset = localStorage.getItem("selectedVoicePreset") || "";
    let compareDepth = parseInt(localStorage.getItem("compareDepth") || "1", 10);
    let availableVoices = [];
    let recognition = null;
    let isListening = false;
    let isSpeaking = false;
    let lastBotReply = "";

    // ===== APIキーは保存しない =====
    let sessionSecrets = {
      apiKey: "",
      elevenApiKey: "",
      voiceId: ""
    };

    let memory = {
      characterName: localStorage.getItem("characterName") || "美咲",
      userName: localStorage.getItem("userNickName") || "",
      mood: localStorage.getItem("hostess_mood") || "",
      topic: localStorage.getItem("hostess_topic") || "",
      lastMessage: localStorage.getItem("hostess_lastMessage") || "",
      visitCount: parseInt(localStorage.getItem("hostess_visitCount") || "0", 10),
      chatHistory: JSON.parse(localStorage.getItem("hostess_chatHistory") || "[]"),

      currentFeeling: localStorage.getItem("hostess_currentFeeling") || "",
      currentNeed: localStorage.getItem("hostess_currentNeed") || "",
      unresolvedTopic: localStorage.getItem("hostess_unresolvedTopic") || "",
      lastBotQuestion: localStorage.getItem("hostess_lastBotQuestion") || ""
    };

    memory.visitCount += 1;
    localStorage.setItem("hostess_visitCount", memory.visitCount);

    nameInput.value = memory.characterName;
    userNameInput.value = memory.userName;

    apiKeyInput.value = "";
    elevenApiKeyInput.value = "";
    voiceIdInput.value = "";
    voiceEngineSelect.value = voiceEngine;
    compareDepthSelect.value = String(compareDepth);

    updateVoiceButton();
    updateGPTButton();
    updateElevenButton();
    updateVoicePresetButtons();

    const faceImages = {
      normal: "girl-normal.jpg?v=1",
      worried: "girl-worried.png?v=1",
      sympathy: "girl-sympathy.png?v=1",
      troubled: "girl-troubled.png?v=1",
      healing: "girl-healing.png?v=1",
      happy: "girl-happy.png?v=1",
      irritated: "girl-irritated.png?v=1",

    function detectMoodFromUserText(text) {
      const lower = text.toLowerCase();

      if (containsAny(lower, ["嬉しい", "好き", "よかった", "助かった", "楽しい"])) {
        return "happy";
      }

      if (containsAny(lower, ["癒して", "安心したい", "甘えたい"])) {
        return "healing";
      }

      if (containsAny(lower, ["悲しい", "泣きたい", "寂しい", "孤独", "つらい", "苦しい"])) {
        return "sympathy";
      }

      if (containsAny(lower, ["不安", "こわい", "怖い", "心配", "どうしよう"])) {
        return "worried";
      }

      if (containsAny(lower, ["疲れた", "しんどい", "限界", "無理", "へとへと"])) {
        return "exhausted";
      }

      if (containsAny(lower, ["イライラ", "むかつく", "腹立つ", "うざい"])) {
        return "irritated";
      }

      if (containsAny(lower, ["困る", "迷う", "わからない", "悩む"])) {
        return "troubled";
      }

      return memory.mood || "normal";
    }

- 相手の気持ちを先に受け止める
- やさしいけど不自然にベタベタしない
- カウンセリング風すぎず、自然な会話
- 短すぎず長すぎず
- 返答の最後に軽い問いかけ or 受け止めを入れる
- 「大丈夫？」ばかり使わない
- 「つらかったね」だけで終わらせない
- 必要なら感情を言語化して整理する
- 時々だけ ${memory.userName || "ユーザー"} の呼び名を自然に入れてよい
- 返答の文頭に必ず表情タグを1つだけ付ける

表情タグ:
[happy]
[healing]
[worried]
[sympathy]
[troubled]
[irritated]
[panic]
[exhausted]
[normal]

重要:
- 必ず返答の最初の1文字目から表情タグを付けてください
- タグなしの返答は禁止です
- 形式例:
[sympathy]それはかなりしんどかったよね…
[worried]不安が強くなってる感じがあるね…
[happy]それはちょっと嬉しいね😊
`;

      const messages = [
        { role: "system", content: systemPrompt },
        ...recentHistory,
        { role: "user", content: userText }
      ];

      const res = await fetch("https://api.openai.com/v1/chat/completions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${sessionSecrets.apiKey}`
        },
        body: JSON.stringify({
          model: "gpt-4o-mini",
          messages,
          temperature: 0.9
        })
      });

      if (!res.ok) {
        throw new Error("GPT API error");
      }

      const data = await res.json();
      const raw = data.choices?.[0]?.message?.content?.trim() || "うまく言葉が出なかったけど、ちゃんとここにいるよ。";
      return applyEmotionFromReply(raw, userText);
    }

    function applyEmotionFromReply(text, userText = "") {
      let mood = "";
      let cleaned = text;

      const tags = ["happy", "healing", "worried", "sympathy", "troubled", "irritated", "panic", "exhausted", "normal"];

      for (const tag of tags) {
        const pattern = new RegExp(`^\\[${tag}\\]\\s*`, "i");
        if (pattern.test(cleaned)) {
          mood = tag;
          cleaned = cleaned.replace(pattern, "");
          break;
        }
      }

      if (!mood) {
        mood = detectMoodFromUserText(userText);
      }

      memory.mood = mood;
      saveMemory();
      setFace(mood);

      return cleaned;
    }

    function getVoiceStyleByMood(mood) {
      switch (mood) {
        case "happy":
          return { rate: 0.97, pitch: 1.18 };
        case "healing":
          return { rate: 0.87, pitch: 1.12 };
        case "sympathy":
          return { rate: 0.86, pitch: 1.06 };
        case "exhausted":
          return { rate: 0.84, pitch: 1.02 };
        case "panic":
          return { rate: 0.91, pitch: 1.10 };
        case "irritated":
          return { rate: 0.90, pitch: 0.98 };
        case "troubled":
          return { rate: 0.88, pitch: 1.03 };
        default:
          return { rate: 0.92, pitch: 1.08 };
      }
    }

    async function speakText(text, isWelcome = false) {
      if (!voiceEnabled) return;

      const cleanText = text
        .replace(/\n/g, "。")
        .replace(/😊|♡|✨|😌|😢|🥺|😳|💦|💭/g, "")
        .replace(/…/g, "、")
        .trim();

      if (!cleanText) return;

      const engine = voiceEngineSelect.value || voiceEngine || "standard";

      if (
        engine === "eleven" &&
        elevenVoiceEnabled &&
        sessionSecrets.elevenApiKey
      ) {
        try {
          setStatus("Eleven音声で話してるよ…");
          startSpeakingAnimation();

          const autoVoiceId = getAutoVoiceIdByMood();
          const currentVoiceId = voiceIdInput.value.trim() || sessionSecrets.voiceId || autoVoiceId;

          const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${currentVoiceId}`, {
            method: "POST",
            headers: {
              "xi-api-key": sessionSecrets.elevenApiKey,
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              text: cleanText,
              model_id: "eleven_multilingual_v2",
              voice_settings: {
                stability: 0.55,
                similarity_boost: 0.78
              }
            })
          });

          if (!res.ok) {
            throw new Error("ElevenLabs error");
          }

          const blob = await res.blob();
          const audioUrl = URL.createObjectURL(blob);
          const audio = new Audio(audioUrl);

          audio.onended = () => {
            stopSpeakingAnimation();
            setStatus("準備OK");
            URL.revokeObjectURL(audioUrl);
          };

          audio.onerror = () => {
            stopSpeakingAnimation();
            setStatus("Eleven音声エラー → 標準音声へ");
            URL.revokeObjectURL(audioUrl);
            fallbackSpeech(cleanText, isWelcome);
          };

          await audio.play();
          return;

        } catch (e) {
          console.error("Eleven音声失敗", e);
          stopSpeakingAnimation();
          setStatus("Eleven音声失敗 → 標準音声へ");
          fallbackSpeech(cleanText, isWelcome);
          return;
        }
      }

      fallbackSpeech(cleanText, isWelcome);
    }

    function fallbackSpeech(cleanText, isWelcome = false) {
      if (!("speechSynthesis" in window)) {
        setStatus("この環境では音声非対応");
        return;
      }

      try {
        const synth = window.speechSynthesis;
        synth.cancel();

        const delay = isWelcome ? 600 : 220;

        setTimeout(() => {
          try {
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = "ja-JP";

            const voiceStyle = getVoiceStyleByMood(memory.mood);
            utterance.rate = voiceStyle.rate;
            utterance.pitch = voiceStyle.pitch;
            utterance.volume = 1.0;

            const voices = synth.getVoices();
            let preferredVoice =
              voices.find(v => v.lang && v.lang.includes("ja") && v.name.includes("Google")) ||
              voices.find(v => v.lang && v.lang.includes("ja"));

            if (preferredVoice) {
              utterance.voice = preferredVoice;
            }

            utterance.onstart = () => {
              startSpeakingAnimation();
              setStatus("話してるよ…");
            };

            utterance.onend = () => {
              stopSpeakingAnimation();
              setStatus("準備OK");
            };

            utterance.onerror = () => {
              stopSpeakingAnimation();
              setStatus("音声再生できませんでした");
            };

            synth.speak(utterance);
          } catch (err) {
            stopSpeakingAnimation();
            setStatus("音声エラー");
          }
        }, delay);

      } catch (e) {
        stopSpeakingAnimation();
        setStatus("音声エラー");
      }
    }

    function stopVoiceInput() {
      try {
        if (recognition) recognition.stop();
      } catch (e) {}
      isListening = false;
      micBtn.classList.remove("listening");
      setStatus("マイク停止");
    }

    function startVoiceInput() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

      if (!SpeechRecognition) {
        alert("この環境ではマイク入力が使えません。\n\nおすすめ:\n・Chromeで開く\n・GitHub Pagesで開く\n・HTTPSで開く");
        return;
      }

      if (isListening) {
        stopVoiceInput();
        return;
      }

      try {
        recognition = new SpeechRecognition();
        recognition.lang = "ja-JP";
        recognition.interimResults = false;
        recognition.continuous = false;
        recognition.maxAlternatives = 1;

        isListening = true;
        micBtn.classList.add("listening");
        setStatus("🎤 聞き取り中…話してください");

        recognition.onresult = (event) => {
          const transcript = event.results[0][0].transcript || "";
          userInput.value = transcript.trim();
          setStatus("音声入力OK → 送信中");
          setTimeout(() => {
            sendMessage();
          }, 350);
        };

        recognition.onerror = (event) => {
          if (event.error === "not-allowed") {
            setStatus("マイク許可が必要です");
            alert("マイクが拒否されています。\n\nChromeの設定でこのページのマイクを許可してください。");
          } else if (event.error === "no-speech") {
            setStatus("声が聞こえなかったみたい");
          } else if (event.error === "audio-capture") {
            setStatus("マイクが使えません");
          } else if (event.error === "network") {
            setStatus("音声認識ネットワークエラー");
          } else {
            setStatus("マイク入力失敗");
          }

          isListening = false;
          micBtn.classList.remove("listening");
        };

        recognition.onend = () => {
          isListening = false;
          micBtn.classList.remove("listening");
          if (statusBar.textContent.includes("聞き取り中")) {
            setStatus("準備OK");
          }
        };

        recognition.start();
      } catch (e) {
        isListening = false;
        micBtn.classList.remove("listening");
        setStatus("マイク起動失敗");
      }
    }

    // =========================
    // 分析機能
    // =========================

    function clamp(n, min, max) {
      return Math.max(min, Math.min(max, n));
    }

    function countMatches(text, words) {
      let score = 0;
      words.forEach(word => {
        if (text.includes(word)) score += 1;
      });
      return score;
    }

    function analyzeMentalState(text) {
      const lower = text.toLowerCase();

      const fatigueWords = ["疲れた", "しんどい", "きつい", "無理", "へとへと", "だるい", "消耗", "限界", "疲れる"];
      const anxietyWords = ["不安", "こわい", "怖い", "心配", "落ち着かない", "緊張", "どうしよう", "焦る"];
      const enduranceWords = ["頑張", "我慢", "大丈夫", "無理して", "耐え", "気を使", "ちゃんとしなきゃ"];
      const lonelinessWords = ["ひとり", "一人", "孤独", "寂しい", "さみしい", "分かってもらえない", "誰にも言えない"];
      const recoveryWords = ["落ち着いた", "安心", "少し楽", "眠れた", "休めた", "大丈夫そう", "軽くなった", "回復"];

      let fatigue = 18 + countMatches(lower, fatigueWords) * 14;
      let anxiety = 14 + countMatches(lower, anxietyWords) * 14;
      let endurance = 16 + countMatches(lower, enduranceWords) * 14;
      let loneliness = 10 + countMatches(lower, lonelinessWords) * 16;
      let recovery = 18 + countMatches(lower, recoveryWords) * 16;

      if (containsAny(lower, ["泣きたい", "つらい", "苦しい"])) {
        fatigue += 12;
        anxiety += 10;
      }

      if (containsAny(lower, ["イライラ", "むかつく", "腹立つ"])) {
        endurance += 8;
      }

      if (containsAny(lower, ["寝れない", "眠れない"])) {
        fatigue += 12;
        anxiety += 8;
        recovery -= 8;
      }

      fatigue = clamp(fatigue, 5, 95);
      anxiety = clamp(anxiety, 5, 95);
      endurance = clamp(endurance, 5, 95);
      loneliness = clamp(loneliness, 5, 95);
      recovery = clamp(recovery, 5, 95);

      const dominant = Math.max(fatigue, anxiety, endurance, loneliness, recovery);

      let animal = "🐱";
      let animalTitle = "安心不足ぎみのネコタイプ";
      let animalDesc = "ひとりで抱えやすく、安心できる距離感が必要な状態です。";

      if (dominant === fatigue) {
        animal = "🐢";
        animalTitle = "回復が必要なカメタイプ";
        animalDesc = "今は前に進むより、まず減らさないことが大事な状態です。";
      } else if (dominant === anxiety) {
        animal = "🐰";
        animalTitle = "気を張りやすいウサギタイプ";
        animalDesc = "頭と気持ちが休みにくく、警戒モードが続きやすい状態です。";
      } else if (dominant === endurance) {
        animal = "🐶";
        animalTitle = "がんばりすぎのイヌタイプ";
        animalDesc = "人に合わせたり、ちゃんとしようとしすぎて消耗しやすい流れです。";
      } else if (dominant === loneliness) {
        animal = "🐱";
        animalTitle = "安心を求めるネコタイプ";
        animalDesc = "解決より先に、わかってもらえる安心感が必要な状態です。";
      } else if (dominant === recovery) {
        animal = "🐬";
        animalTitle = "少し軽さが戻るイルカタイプ";
        animalDesc = "しんどさはありつつも、少しずつ回復の流れが出てきています。";
      }

      const summary = buildAnalysisSummary({ fatigue, anxiety, endurance, loneliness, recovery, animalTitle });

      return {
        fatigue,
        anxiety,
        endurance,
        loneliness,
        recovery,
        animal,
        animalTitle,
        animalDesc,
        summary
      };
    }

    function buildAnalysisSummary(result) {
      const notes = [];

      if (result.fatigue >= 70) {
        notes.push("今日は「頑張れない」のではなく、すでにかなり消耗している状態に近いです。");
      } else if (result.anxiety >= 70) {
        notes.push("今は落ち着かなさや気の張りが強く、頭の中が休みにくい流れです。");
      } else if (result.endurance >= 70) {
        notes.push("今は『しんどいのに頑張ってしまう』傾向がかなり強めです。");
      } else if (result.loneliness >= 65) {
        notes.push("今は『一人』というより『分かってもらえない孤独』が強いかもしれません。");
      } else if (result.recovery >= 60) {
        notes.push("少しずつ気持ちや体に余白が戻ってきている流れがあります。");
      } else {
        notes.push("今は小さな負担が重なって、じわじわ削られやすい状態です。");
      }

      if (result.recovery <= 30) {
        notes.push("回復の余白が少なめなので、今日は『減らす・休む・後回し』が大切です。");
      }

      if (result.endurance >= 65 && result.fatigue >= 65) {
        notes.push("特に『我慢しながら消耗している』傾向が見えます。");
      }

      return notes.join("\n");
    }

    function saveAnalysisHistory(result) {
      let history = JSON.parse(localStorage.getItem("analysisHistory") || "[]");

      history.push({
        date: new Date().toISOString(),
        ...result
      });

      if (history.length > 20) {
        history = history.slice(-20);
      }

      localStorage.setItem("analysisHistory", JSON.stringify(history));
    }

    function getAnalysisHistory() {
      return JSON.parse(localStorage.getItem("analysisHistory") || "[]");
    }

    function getPastAnalysis(offset = 1) {
      const history = getAnalysisHistory();
      if (history.length <= offset) return null;
      return history[history.length - 1 - offset];
    }

    function getWeeklyHistory() {
      const history = getAnalysisHistory();
      return history.slice(-7);
    }

    function createBarRow(label, value, color) {
      return `
        <div class="bar-row">
          <div class="bar-label">${label}　${value}%</div>
          <div class="bar-bg">
            <div class="bar-fill" style="width:${value}%; background:${color};"></div>
          </div>
        </div>
      `;
    }

    function diffText(label, now, old) {
      const diff = now - old;
      const sign = diff > 0 ? "+" : "";
      return `<div class="compare-line">${label}　${old} → ${now}（${sign}${diff}）</div>`;
    }

    function createMiniBars(values, color) {
      return `
        <div class="mini-bars">
          ${values.map(v => `
            <div class="mini-bar" style="
              height:${Math.max(10, v)}%;
              background:${color};
            "></div>
          `).join("")}
        </div>
      `;
    }

    function getWeeklyComment(weekly) {
      if (weekly.length < 2) return "まだ比較できるほど履歴がありません。";

      const first = weekly[0];
      const last = weekly[weekly.length - 1];

      const fatigueDiff = (last.fatigue || 0) - (first.fatigue || 0);
      const anxietyDiff = (last.anxiety || 0) - (first.anxiety || 0);
      const recoveryDiff = (last.recovery || 0) - (first.recovery || 0);

      if (fatigueDiff > 15 && recoveryDiff < -10) {
        return "今週は疲れが増えていて、回復する時間が足りていない流れが見えます。";
      }

      if (anxietyDiff > 15) {
        return "今週は気を張る場面が増えて、不安が高まりやすい流れが見えます。";
      }

      if (recoveryDiff > 10) {
        return "今週は少しずつ回復の流れが出てきています。";
      }

      return "今週は大きく崩れすぎず、ゆるやかな波の中にいる状態です。";
    }

    function renderAnalysisPanel(result) {
      if (!analysisPanel) return;

      const past = getPastAnalysis(compareDepth);
      const weekly = getWeeklyHistory();

      const compareTitle = compareDepth === 1 ? "前回比較" : `${compareDepth}回前と比較`;

      const compareHtml = past ? `
        <div class="analysis-section">
          <div class="analysis-subtitle">📈 ${compareTitle}</div>
          ${diffText("疲労", result.fatigue, past.fatigue || 0)}
          ${diffText("不安", result.anxiety, past.anxiety || 0)}
          ${diffText("我慢", result.endurance, past.endurance || 0)}
          ${diffText("孤独", result.loneliness, past.loneliness || 0)}
          ${diffText("回復", result.recovery, past.recovery || 0)}
        </div>
      ` : `
        <div class="analysis-section">
          <div class="analysis-subtitle">📈 比較</div>
          <div class="compare-line">まだ比較できる履歴が少ないので、あと少し話すと比較できるようになります。</div>
        </div>
      `;

      const weeklyHtml = weekly.length >= 2 ? `
        <div class="analysis-section">
          <div class="analysis-subtitle">📅 今週のこころの流れ</div>

          <div class="weekly-block">
            <div class="weekly-row">
              <div class="weekly-label">疲労</div>
              ${createMiniBars(weekly.map(d => d.fatigue || 0), "#ff9a9a")}
            </div>

            <div class="weekly-row">
              <div class="weekly-label">不安</div>
              ${createMiniBars(weekly.map(d => d.anxiety || 0), "#b39cff")}
            </div>

            <div class="weekly-row">
              <div class="weekly-label">回復力</div>
              ${createMiniBars(weekly.map(d => d.recovery || 0), "#7fe1ad")}
            </div>
          </div>

          <div class="weekly-note">左 → 右 で最近の流れです</div>
          <div class="analysis-text" style="margin-top:10px;">${getWeeklyComment(weekly)}</div>
        </div>
      ` : `
        <div class="analysis-section">
          <div class="analysis-subtitle">📅 今週のこころの流れ</div>
          <div class="analysis-text">まだ履歴が少ないので、分析を重ねると変化が見えるようになります。</div>
        </div>
      `;

      analysisPanel.innerHTML = `
        <div class="analysis-title">今日のこころの地図</div>

        <div class="animal-hero">
          <div class="animal-emoji">${result.animal}</div>
          <div class="animal-name">${result.animalTitle}</div>
          <div class="animal-sub">${result.animalDesc}</div>
        </div>

        <div class="analysis-section">
          <div class="analysis-subtitle">📊 今のバランス</div>
          ${createBarRow("疲労", result.fatigue, "#ff9a9a")}
          ${createBarRow("不安", result.anxiety, "#b39cff")}
          ${createBarRow("我慢", result.endurance, "#ffc17a")}
          ${createBarRow("孤独", result.loneliness, "#87d6ff")}
          ${createBarRow("回復力", result.recovery, "#7fe1ad")}
        </div>

        <div class="analysis-section">
          <div class="analysis-subtitle">📝 わかりやすい解説</div>
          <div class="analysis-text">${result.summary.replace(/\n/g, "<br>")}</div>
        </div>

        ${compareHtml}
        ${weeklyHtml}
      `;

      analysisPanel.style.display = "block";

      if (analysisEmptyText) {
        analysisEmptyText.style.display = "none";
      }
    }

    function hideAnalysisPanel() {
      if (!analysisPanel) return;
      analysisPanel.style.display = "none";
      analysisPanel.innerHTML = "";

      if (analysisEmptyText) {
        analysisEmptyText.style.display = "block";
      }
    }

    function analyzeCurrentConversation() {
      const userOnly = memory.chatHistory
        .filter(item => item.role === "user")
        .map(item => item.content)
        .join(" ");

      const targetText = userOnly || memory.lastMessage || "今日は少し気持ちを整理したい";

      const result = analyzeMentalState(targetText);
      saveAnalysisHistory(result);
      renderAnalysisPanel(result);

      if (analysisEmptyText) {
        analysisEmptyText.style.display = "none";
      }

      setStatus("分析を更新しました");
    }

    function showLatestAnalysisIfExists() {
      const history = getAnalysisHistory();
      if (!history.length) return;

      const latest = history[history.length - 1];
      renderAnalysisPanel(latest);

      if (analysisEmptyText) {
        analysisEmptyText.style.display = "none";
      }
    }

    function switchTab(tab) {
      const tabChatBtn = document.getElementById("tabChatBtn");
      const tabAnalysisBtn = document.getElementById("tabAnalysisBtn");
      const tabSettingsBtn = document.getElementById("tabSettingsBtn");

      tabChatBtn.classList.remove("active");
      tabAnalysisBtn.classList.remove("active");
      tabSettingsBtn.classList.remove("active");

      if (tab === "chat") {
        tabChatBtn.classList.add("active");
        chatSection.style.display = "flex";
        inputArea.style.display = "grid";
        analysisScreen.style.display = "none";
        closeSettings();
        setStatus("会話画面");
      }

      if (tab === "analysis") {
        tabAnalysisBtn.classList.add("active");
        chatSection.style.display = "none";
        inputArea.style.display = "none";
        analysisScreen.style.display = "block";
        closeSettings();
        setStatus("分析画面");
      }

      if (tab === "settings") {
        tabSettingsBtn.classList.add("active");
        chatSection.style.display = "flex";
        inputArea.style.display = "grid";
        analysisScreen.style.display = "none";
        openSettings();
        setStatus("設定");
      }
    }

    settingsModal.addEventListener("click", (e) => {
      if (e.target === settingsModal) {
        closeSettings();
      }
    });
  </script>
