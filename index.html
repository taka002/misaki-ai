<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI</title>

<style>
body{
  margin:0;
  background:#09111f;
  font-family:sans-serif;
  color:white;
  height:100vh;
  overflow:hidden;
}

/* ===== 画像（完全固定） ===== */
.top{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:220px;
  background:#000;
}

.top img{
  width:100%;
  height:100%;
  object-fit:cover; /* ← 顔ちゃんと出る */
}

/* ===== 入力 ===== */
.input{
  position:fixed;
  bottom:60px;
  left:0;
  width:100%;
  display:flex;
  gap:8px;
  padding:8px;
  background:#111;
}

input{
  flex:1;
  padding:14px;
  border-radius:12px;
  border:none;
}

button{
  padding:14px;
  border-radius:12px;
  border:none;
}

/* ===== タブ ===== */
.tabs{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  height:60px;
  display:flex;
  background:#222;
}

.tab{
  flex:1;
  text-align:center;
  line-height:60px;
}

/* ===== チャット（ここだけスクロール） ===== */
#chatBox{
  position:fixed;
  top:220px;
  bottom:120px; /* 入力+タブ分 */
  left:0;
  width:100%;
  overflow-y:auto;
  padding:10px;
}

/* ===== メッセージ ===== */
.message{
  max-width:80%;
  padding:14px;
  border-radius:18px;
  margin:8px 0;
}

.user{
  background:#ff4f8b;
  margin-left:auto;
}

.bot{
  background:#444;
}

.time{
  font-size:11px;
  opacity:0.6;
  margin-top:4px;
}
</style>
</head>

<body>

<!-- 画像 -->
<div class="top">
  <img id="mainGirl" src="girl-normal.jpg">
</div>

<!-- チャット -->
<div id="chatBox"></div>

<!-- 入力 -->
<div class="input">
  <input id="userInput" placeholder="話しかけて…">
  <button onclick="sendMessage()">送信</button>
</div>

<!-- タブ -->
<div class="tabs">
  <div class="tab">会話</div>
  <div class="tab">分析</div>
  <div class="tab">未来</div>
  <div class="tab">設定</div>
</div>

<script>

/* ===== 表情 ===== */
const faces={
  normal:"girl-normal.jpg",
  happy:"girl-happy.png",
  worried:"girl-worried.png",
  sympathy:"girl-sympathy.png",
  troubled:"girl-troubled.png",
  healing:"girl-healing.png",
  irritated:"girl-irritated.png",
  panic:"girl-panic.png",
  exhausted:"girl-exhausted.png"
};

function setFace(type){
  mainGirl.src=faces[type]||faces.normal;
}

/* ===== 時間 ===== */
function now(){
  const d=new Date();
  return d.getHours()+":"+String(d.getMinutes()).padStart(2,"0");
}

/* ===== メッセージ ===== */
function addMessage(text,type){
  const div=document.createElement("div");
  div.className="message "+type;
  div.innerHTML=`
    ${text}
    <div class="time">${now()}</div>
  `;
  chatBox.appendChild(div);
  chatBox.scrollTop=chatBox.scrollHeight;
}

/* ===== 送信 ===== */
function sendMessage(){
  const t=userInput.value;
  if(!t) return;

  addMessage(t,"user");

  const r=reply(t);

  setTimeout(()=>{
    addMessage(r,"bot");
  },300);

  userInput.value="";
}

/* ===== AI ===== */
let last="";

function reply(t){

  let r="ちゃんと聞いてるよ。もう少し教えてくれる？";

  if(t.includes("こんにちは")){
    setFace("happy");
    r="こんにちは。来てくれてちょっと嬉しい。今日はどんな気分？";
  }

  else if(t.includes("楽しい")){
    setFace("happy");
    r="いいね、それ。どの瞬間が一番よかった？";
  }

  else if(t.includes("疲れ")){
    setFace("exhausted");
    r="ちょっと無理してる感じあるね…少し力抜けそう？";
  }

  if(r===last){
    r+=" もう少しだけ教えてほしいな";
  }

  last=r;
  return r;
}

</script>

</body>
</html>
