<style>

/* 全体 */
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(#2b314d,#09111f);
  color:white;
}

/* アプリ */
.app{
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* ===== 画像 ===== */
.top{
  height:45vh;
  display:flex;
  justify-content:center;
  align-items:center;
}
.top img{
  width:95%;
  max-width:500px;
  border-radius:20px;
}

/* ===== チャット ===== */
#chatBox{
  flex:1;
  overflow:auto;
  padding:10px;
}

.message{
  margin:8px;
  padding:14px;
  border-radius:14px;
  max-width:80%;
  font-size:16px;
  word-break:break-word;
}

.user{
  background:#ff4f8b;
  margin-left:auto;
}

.bot{
  background:#444;
}

/* ===== 入力 ===== */
.input-area{
  display:flex;
  gap:8px;
  padding:8px;
}

#userInput{
  flex:1;
  min-width:0;
  padding:16px;
  font-size:18px;
  border:none;
  border-radius:10px;
}

.input-area button{
  flex:0 0 auto;
  width:70px;
  height:60px;
  font-size:18px;
  border:none;
  border-radius:10px;
}

.mic{
  background:#5f9bff;
}

/* ===== モーダル ===== */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.modal.show{
  display:flex;
}

.box{
  width:90%;
  max-width:400px;
  max-height:85vh;
  overflow-y:auto;
  background:#222;
  padding:20px;
  border-radius:12px;
}

textarea{
  width:100%;
  height:120px;
}

</style>


<!-- 🔥 HTML（必須） -->
<div class="app">

  <div class="top">
    <img id="girl" src="girl-normal.jpg">
  </div>

  <div id="chatBox"></div>

  <div class="input-area">
    <input id="userInput" placeholder="話してみて">
    <button onclick="sendMessage()">送信</button>
    <button class="mic" onclick="startVoice()">🎤</button>
    <button onclick="openSettings()">⚙</button>
  </div>

</div>

<!-- モーダル -->
<div class="modal" id="modal">
  <div class="box">
    設定画面<br><br>
    <button onclick="closeSettings()">閉じる</button>
  </div>
</div>


<!-- 🔥 scriptは最後に置く -->
<script>

// DOM読み込み後に取得（これが重要）
const modal = document.getElementById("modal");

function openSettings(){
  modal.classList.add("show");
}

function closeSettings(){
  modal.classList.remove("show");
}

</script>
