<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ピピAI 安定版</title>

<style>
*{ box-sizing:border-box; }

html,body{
  height:100%;
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(#2b314d,#09111f);
  color:white;
}

/* ===== 全体 ===== */
.app{
  display:flex;
  flex-direction:column;
  height:100%;
}

/* ===== 上（画像） ===== */
.top{
  flex:0 0 auto;
  padding:10px;
  display:flex;
  justify-content:center;
}

.top img{
  width:90%;
  max-width:420px;
  border-radius:20px;
  transition:0.3s;
}

/* ===== チャット ===== */
#chatBox{
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

.row{
  display:flex;
  margin:6px 0;
}

.row.user{ justify-content:flex-end; }
.row.bot{ justify-content:flex-start; }

.bubble{
  padding:12px 16px;
  border-radius:16px;
  max-width:75%;
  word-break:break-word;
}

.user .bubble{
  background:#ff4f8b;
  border-bottom-right-radius:4px;
}

.bot .bubble{
  background:#444;
  border-bottom-left-radius:4px;
}

/* ===== 入力 ===== */
.input-area{
  flex:0 0 auto;
  display:flex;
  gap:6px;
  padding:8px;
  background:#111;
}

#userInput{
  flex:1;
  padding:14px;
  border:none;
  border-radius:10px;
  font-size:16px;
}

.input-area button{
  width:60px;
  height:55px;
  border:none;
  border-radius:10px;
}

.mic{ background:#5f9bff; }
</style>
</head>

<body>

<div class="app">

  <!-- 画像 -->
  <div class="top">
    <img id="girl" src="girl-normal.jpg">
  </div>

  <!-- チャット -->
  <div id="chatBox"></div>

  <!-- 入力 -->
  <div class="input-area">
    <input id="userInput" placeholder="話してみて">
    <button onclick="sendMessage()">送信</button>
    <button class="mic" onclick="startVoice()">🎤</button>
  </div>

</div>

<script>

// ===== DOM =====
const chatBox=document.getElementById("chatBox");
const girl=document.getElementById("girl");

// ===== 表情 =====
const faceImages={
  normal:"girl-normal.jpg",
  happy:"girl-happy.png",
  sad:"girl-sad.png",
  angry:"girl-angry.png",
  thinking:"girl-thinking.png"
};

function setFace(type){
  girl.src=faceImages[type]||faceImages.normal;
}

// ===== 感情判定 =====
function detectEmotion(text){
  if(/嬉しい|楽しい|最高|好き/.test(text)) return "happy";
  if(/疲れ|しんど|悲しい|つらい/.test(text)) return "sad";
  if(/怒|イライラ/.test(text)) return "angry";
  if(/どうしよう|悩/.test(text)) return "thinking";
  return "normal";
}

// ===== 表示 =====
function addMessage(text,type){
  const row=document.createElement("div");
  row.className="row "+type;

  const bubble=document.createElement("div");
  bubble.className="bubble";
  bubble.textContent=text;

  row.appendChild(bubble);
  chatBox.appendChild(row);

  chatBox.scrollTop=chatBox.scrollHeight;
}

// ===== 🔊 音声（完全安定） =====
function speak(text){

  if(!("speechSynthesis" in window)) return;

  speechSynthesis.cancel();

  const u=new SpeechSynthesisUtterance(text);
  u.lang="ja-JP";

  const voices=speechSynthesis.getVoices();
  const ja=voices.find(v=>v.lang==="ja-JP");
  if(ja) u.voice=ja;

  speechSynthesis.speak(u);
}

// 初回タップで音声有効
document.body.addEventListener("click",()=>{
  speechSynthesis.getVoices();
},{once:true});

// ===== ローカルAI =====
function localReply(text){

  if(/疲れ|しんど/.test(text))
    return "大丈夫？無理しないでね";

  if(/こんにちは/.test(text))
    return "こんにちは😊";

  if(/ありがとう/.test(text))
    return "どういたしまして";

  return "うん、聞いてるよ";
}

// ===== 送信 =====
function sendMessage(){

  const text=userInput.value.trim();
  if(!text) return;

  addMessage(text,"user");
  userInput.value="";

  // 表情（ユーザー）
  setFace(detectEmotion(text));

  const reply=localReply(text);

  setTimeout(()=>{
    addMessage(reply,"bot");

    // 表情（AI）
    setFace(detectEmotion(reply));

    speak(reply);

  },400);
}

// ===== 音声入力 =====
function startVoice(){

  const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;

  if(!SpeechRecognition){
    alert("音声入力非対応");
    return;
  }

  const recog=new SpeechRecognition();
  recog.lang="ja-JP";

  recog.onresult=(e)=>{
    userInput.value=e.results[0][0].transcript;
    sendMessage();
  };

  recog.start();
}

// Enter送信
userInput.addEventListener("keypress",e=>{
  if(e.key==="Enter") sendMessage();
});

</script>

</body>
</html>
