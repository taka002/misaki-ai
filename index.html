<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ピピAI 完全版</title>

<style>
*{ box-sizing:border-box; }

html,body{
  height:100%;
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(#2b314d,#09111f);
  color:white;
}

.app{
  display:flex;
  flex-direction:column;
  height:100vh;
  overflow:hidden;
}

.top{
  height:35vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:10px;
}

.top img{
  max-height:100%;
  max-width:100%;
  border-radius:20px;
  object-fit:contain;
  animation: float 5s ease-in-out infinite;
}

@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-5px);}
  100%{transform:translateY(0);}
}

#chatBox{
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

.row{ display:flex; margin:6px 0; }
.row.user{ justify-content:flex-end; }
.row.bot{ justify-content:flex-start; }

.bubble{
  padding:12px 16px;
  border-radius:16px;
  max-width:75%;
}

.user .bubble{
  background:#ff4f8b;
}

.bot .bubble{
  background:#444;
}

.input-area{
  display:flex;
  gap:6px;
  padding:8px;
  background:#111;
}

#userInput{
  flex:1;
  min-width:0;
  padding:14px;
  border:none;
  border-radius:10px;
}

.input-area button{
  width:60px;
  height:55px;
  border:none;
  border-radius:10px;
}

.mic{ background:#5f9bff; }

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal.show{ display:flex; }

.box{
  width:90%;
  max-width:420px;
  max-height:85vh;
  overflow:auto;
  background:#222;
  padding:20px;
  border-radius:12px;
}

input,textarea{
  width:100%;
  margin-bottom:10px;
  padding:10px;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="app">

  <div class="top">
    <img id="girl">
  </div>

  <div id="chatBox"></div>

  <div class="input-area">
    <input id="userInput" placeholder="話してみて">
    <button onclick="sendMessage()">送信</button>
    <button class="mic" onclick="startVoice()">🎤</button>
    <button onclick="analyze()">🧠</button> <!-- ←追加 -->
    <button onclick="openSettings()">⚙</button>
  </div>

</div>

<!-- 設定 -->
<div class="modal" id="modal">
  <div class="box">
    キャラ名<input id="nameInput">
    画像URL<input id="imageInput">
    OpenAI APIKey<input id="apiKeyInput">
    Eleven APIKey<input id="elevenApiKeyInput">
    VoiceID<input id="voiceIdInput">
    プロンプト<textarea id="promptInput"></textarea>
    <button onclick="saveSettings()">保存</button>
    <button onclick="closeSettings()">閉じる</button>
  </div>
</div>

<script>

const chatBox=document.getElementById("chatBox");
const girl=document.getElementById("girl");
const modal=document.getElementById("modal");

// ✅ 会話ログ
let chatLog=[];

let settings={
  name:localStorage.getItem("name")||"ピピ",
  image:localStorage.getItem("image")||"girl-normal.jpg",
  apiKey:localStorage.getItem("apiKey")||"",
  prompt:localStorage.getItem("prompt")||"優しく話す"
};

window.onload=()=>{
  girl.src=settings.image;
};

function saveSettings(){
  settings.name=nameInput.value;
  settings.image=imageInput.value;
  settings.apiKey=apiKeyInput.value;
  settings.prompt=promptInput.value;

  localStorage.setItem("name",settings.name);
  localStorage.setItem("image",settings.image);
  localStorage.setItem("apiKey",settings.apiKey);
  localStorage.setItem("prompt",settings.prompt);

  girl.src=settings.image;
  closeSettings();
}

function openSettings(){ modal.classList.add("show"); }
function closeSettings(){ modal.classList.remove("show"); }

function addMessage(text,type){

  // ログ保存
  chatLog.push({role:type,content:text});

  const row=document.createElement("div");
  row.className="row "+type;

  const bubble=document.createElement("div");
  bubble.className="bubble";
  bubble.textContent=text;

  row.appendChild(bubble);
  chatBox.appendChild(row);

  chatBox.scrollTop=chatBox.scrollHeight;
}

// ===== AI会話 =====
async function aiReply(text){

  if(!settings.apiKey) return "（AI未接続）";

  const res=await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+settings.apiKey
    },
    body:JSON.stringify({
      model:"gpt-4o-mini",
      messages:[
        {
          role:"system",
          content:`あなたは${settings.name}です。
性格:${settings.prompt}`
        },
        ...chatLog.slice(-10), // ←記憶
        {role:"user",content:text}
      ]
    })
  });

  const data=await res.json();
  return data.choices[0].message.content;
}

// ===== 送信 =====
async function sendMessage(){

  const text=userInput.value.trim();
  if(!text) return;

  addMessage(text,"user");
  userInput.value="";

  const reply=await aiReply(text);

  addMessage(reply,"bot");
}

// ===== 🔥 分析 =====
async function analyze(){

  if(chatLog.length===0){
    alert("会話がないよ");
    return;
  }

  addMessage("分析中…","bot");

  const res=await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+settings.apiKey
    },
    body:JSON.stringify({
      model:"gpt-4o-mini",
      messages:[
        {
          role:"system",
          content:`
以下を作成：
①会話まとめ
②気持ち分析
③認知の歪み
④5カラム（出来事・思考・感情・反証・新しい考え）
⑤具体的行動
⑥今日の一言
優しく丁寧に`
        },
        ...chatLog.slice(-20)
      ]
    })
  });

  const data=await res.json();
  addMessage(data.choices[0].message.content,"bot");
}

// ===== 音声入力 =====
function startVoice(){
  const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SpeechRecognition) return;

  const recog=new SpeechRecognition();
  recog.lang="ja-JP";

  recog.onresult=(e)=>{
    userInput.value=e.results[0][0].transcript;
    sendMessage();
  };

  recog.start();
}

userInput.addEventListener("keypress",e=>{
  if(e.key==="Enter") sendMessage();
});

</script>

</body>
</html>
