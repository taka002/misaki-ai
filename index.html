<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ピピAI 完全版</title>

<style>
*{ box-sizing:border-box; }

html,body{
  height:100%;
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(#2b314d,#09111f);
  color:white;
}

.app{
  display:flex;
  flex-direction:column;
  height:100vh;
  overflow:hidden;
}

.top{
  height:35vh;
  width:100%;
  overflow:hidden;
}

.top img{
  width:100%;
  height:100%;
  object-fit:cover;
}

#chatBox{
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

.row{ display:flex; margin:6px 0; }
.row.user{ justify-content:flex-end; }
.row.bot{ justify-content:flex-start; }

.bubble{
  padding:12px 16px;
  border-radius:16px;
  max-width:75%;
}

/* 🔥 ここが追加（ズレ防止） */
.bubble pre{
  margin:0;
  font-family: monospace;
  font-size:14px;
  line-height:1.6;
  white-space:pre;
  overflow-x:auto;
}

.user .bubble{ background:#ff4f8b; }
.bot .bubble{ background:#444; }

.input-area{
  display:flex;
  gap:6px;
  padding:8px;
  background:#111;
}

#userInput{
  flex:1;
  padding:14px;
  border:none;
  border-radius:10px;
}

.input-area button{
  width:60px;
  height:55px;
  border:none;
  border-radius:10px;
}

.mic{ background:#5f9bff; }

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal.show{ display:flex; }

.box{
  width:90%;
  max-width:420px;
  max-height:85vh;
  overflow:auto;
  background:#222;
  padding:20px;
  border-radius:12px;
}

input,textarea{
  width:100%;
  margin-bottom:10px;
  padding:10px;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="app">

  <div class="top">
    <img id="girl">
  </div>

  <div id="chatBox"></div>

  <div class="input-area">
    <input id="userInput" placeholder="話してみて">
    <button onclick="sendMessage()">送信</button>
    <button class="mic" onclick="startVoice()">🎤</button>
    <button onclick="analyze()">🧠</button>
    <button onclick="openSettings()">⚙</button>
  </div>

</div>

<div class="modal" id="modal">
  <div class="box">
    キャラ名<input id="nameInput">
    画像URL<input id="imageInput">
    画像選択<input type="file" id="imageFile" accept="image/*">

    OpenAI APIKey<input id="apiKeyInput">
    Eleven APIKey<input id="elevenApiKeyInput">
    VoiceID<input id="voiceIdInput">

    プロンプト<textarea id="promptInput"></textarea>
    <button onclick="saveSettings()">保存</button>
    <button onclick="closeSettings()">閉じる</button>
  </div>
</div>

<script>

let chatBox, girl, modal, userInput;
let nameInput, imageInput, apiKeyInput, promptInput, imageFile;
let elevenApiKeyInput, voiceIdInput;

let chatLog=[];

let settings={
  name:localStorage.getItem("name")||"ピピ",
  image:localStorage.getItem("image")||"",
  apiKey:localStorage.getItem("apiKey")||"",
  elevenApiKey:localStorage.getItem("elevenApiKey")||"",
  voiceId:localStorage.getItem("voiceId")||"",
  prompt:localStorage.getItem("prompt")||"優しく話す"
};

window.addEventListener("DOMContentLoaded",()=>{

  chatBox=document.getElementById("chatBox");
  girl=document.getElementById("girl");
  modal=document.getElementById("modal");
  userInput=document.getElementById("userInput");

  nameInput=document.getElementById("nameInput");
  imageInput=document.getElementById("imageInput");
  apiKeyInput=document.getElementById("apiKeyInput");
  promptInput=document.getElementById("promptInput");
  imageFile=document.getElementById("imageFile");

  elevenApiKeyInput=document.getElementById("elevenApiKeyInput");
  voiceIdInput=document.getElementById("voiceIdInput");

  girl.src=settings.image || "https://cdn.pixabay.com/photo/2017/01/31/13/14/animal-2023924_1280.png";

  userInput.addEventListener("keypress",e=>{
    if(e.key==="Enter") sendMessage();
  });

});

// ===== 表示（🔥ここが修正）=====
function addMessage(text,type,isImage=false){

  const row=document.createElement("div");
  row.className="row "+type;

  const bubble=document.createElement("div");
  bubble.className="bubble";

  if(isImage){
    const img=document.createElement("img");
    img.src=text;
    img.style.width="160px";
    img.style.borderRadius="12px";
    bubble.appendChild(img);
  }else{
    const pre=document.createElement("pre");
    pre.textContent=text;
    bubble.appendChild(pre);
  }

  row.appendChild(bubble);
  chatBox.appendChild(row);
  chatBox.scrollTop=chatBox.scrollHeight;
}

// ===== 音声 =====
async function speak(text){

  if(!text) return;

  if(settings.elevenApiKey && settings.voiceId){
    try{
      const res = await fetch(
        `https://api.elevenlabs.io/v1/text-to-speech/${settings.voiceId}`,
        {
          method:"POST",
          headers:{
            "xi-api-key":settings.elevenApiKey,
            "Content-Type":"application/json",
            "Accept":"audio/mpeg"
          },
          body:JSON.stringify({
            text:text,
            model_id:"eleven_multilingual_v2"
          })
        }
      );

      if(res.ok){
        const blob=await res.blob();
        const url=URL.createObjectURL(blob);
        const audio=new Audio(url);
        audio.play();
        return;
      }

    }catch(e){}
  }

  const u=new SpeechSynthesisUtterance(text);
  u.lang="ja-JP";
  speechSynthesis.speak(u);
}

// ===== AI =====
async function aiReply(text){

  if(!settings.apiKey) return "APIキー未設定";

  const res=await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+settings.apiKey
    },
    body:JSON.stringify({
      model:"gpt-4o-mini",
      messages:[
        {role:"system",content:`5カラムはズレないように整形して`},
        ...chatLog.slice(-20),
        {role:"user",content:text}
      ]
    })
  });

  const data=await res.json();
  return data.choices?.[0]?.message?.content || "エラー";
}

// ===== 送信 =====
async function sendMessage(){

  const text=userInput.value.trim();
  if(!text) return;

  chatLog.push({role:"user",content:text});
  addMessage(text,"user");
  userInput.value="";

  const reply=await aiReply(text);

  chatLog.push({role:"assistant",content:reply});
  addMessage(reply,"bot");
  speak(reply);
}

// ===== 分析 =====
async function analyze(){

  if(chatLog.length===0){
    alert("会話がないよ");
    return;
  }

  addMessage("🧠 分析中…","bot");

  const reply=await aiReply("5カラムで分析して");
  addMessage(reply,"bot");
  speak(reply);
}

// ===== 設定 =====
function saveSettings(){

  settings.name=nameInput.value;
  settings.apiKey=apiKeyInput.value;
  settings.prompt=promptInput.value;
  settings.elevenApiKey=elevenApiKeyInput.value;
  settings.voiceId=voiceIdInput.value;

  if(imageInput.value.trim()){
    settings.image=imageInput.value.trim();
  }

  localStorage.setItem("name",settings.name);
  localStorage.setItem("apiKey",settings.apiKey);
  localStorage.setItem("prompt",settings.prompt);
  localStorage.setItem("image",settings.image);
  localStorage.setItem("elevenApiKey",settings.elevenApiKey);
  localStorage.setItem("voiceId",settings.voiceId);

  girl.src=settings.image;
  closeSettings();
}

function openSettings(){ modal.classList.add("show"); }
function closeSettings(){ modal.classList.remove("show"); }

// ===== 音声入力 =====
function startVoice(){
  const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SpeechRecognition) return;

  const recog=new SpeechRecognition();
  recog.lang="ja-JP";

  recog.onresult=(e)=>{
    userInput.value=e.results[0][0].transcript;
    sendMessage();
  };

  recog.start();
}

</script>

</body>
</html>
