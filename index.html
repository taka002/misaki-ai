<style>

/* 全体安定化（超重要） */
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(#2b314d,#09111f);
  color:white;
}

/* アプリ */
.app{
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* 画像 */
.top{
  height:30vh;
  display:flex;
  justify-content:center;
  align-items:center;
}
.top img{
  width:90%;
  max-width:400px;
  border-radius:20px;
}

/* チャット */
#chatBox{
  flex:1;
  overflow:auto;
  padding:10px;
}

.message{
  margin:8px;
  padding:12px;
  border-radius:12px;
  max-width:75%;
  word-break:break-word;
}

.user{
  background:#ff4f8b;
  margin-left:auto;
}

.bot{
  background:#444;
}

/* ===== 入力エリア（完全修正版） ===== */
.input-area{
  display:flex;
  gap:6px;
  padding:6px;
}

#userInput{
  flex:1;
  min-width:0; /* ← これ超重要 */
  padding:12px;
  font-size:16px;
  border:none;
  border-radius:8px;
}

/* ボタン */
.input-area button{
  flex:0 0 auto;
  width:60px;
  padding:10px;
  font-size:14px;
  border:none;
  border-radius:8px;
}

/* マイク */
.mic{
  background:#5f9bff;
}

/* モーダル */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal.show{
  display:flex;
}

.box{
  width:90%;
  max-width:400px;
  max-height:85vh;
  overflow-y:auto;
  background:#222;
  padding:20px;
  border-radius:12px;
}

textarea{
  width:100%;
  height:120px;
}

</style>


<!-- ===== HTML（ここはstyleの外！） ===== -->

<div class="app">

  <div class="top">
    <img id="girl" src="girl-normal.jpg">
  </div>

  <div id="chatBox"></div>

  <div class="input-area">
    <input id="userInput" placeholder="話してみて">
    <button onclick="sendMessage()">送信</button>
    <button class="mic" onclick="startVoice()">🎤</button>
    <button onclick="openSettings()">⚙</button>
  </div>

</div>
