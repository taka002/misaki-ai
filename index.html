<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ピピAI 完全版</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(#2b314d,#09111f);
  color:white;
}
.app{display:flex;flex-direction:column;height:100vh;}
.top{height:35vh;display:flex;justify-content:center;align-items:center;}
.top img{width:90%;max-width:400px;border-radius:20px;}
#chatBox{flex:1;overflow:auto;padding:10px;}
.message{margin:8px;padding:12px;border-radius:12px;max-width:80%;}
.user{background:#ff4f8b;margin-left:auto;}
.bot{background:#444;}
.input-area{display:flex;}
input{flex:1;padding:10px;}
button{padding:10px;}

.modal{
  position:fixed;
  inset:0;
  background:#0008;
  display:none;
  align-items:center;
  justify-content:center;
}
.modal.show{display:flex;}

.box{
  background:#222;
  padding:20px;
  border-radius:10px;
  width:90%;
  max-width:400px;
  max-height:80vh;
  overflow:auto;
}

textarea{
  width:100%;
  height:120px;
}
</style>
</head>

<body>

<div class="app">

<div class="top">
<img id="girl" src="girl-normal.jpg">
</div>

<div id="chatBox"></div>

<div class="input-area">
<input id="userInput" placeholder="話してみて">
<button onclick="sendMessage()">送信</button>
<button onclick="openSettings()">⚙</button>
</div>

</div>

<!-- 設定 -->
<div class="modal" id="modal">
<div class="box">

あなたの名前<br>
<input id="userNameInput"><br><br>

キャラ名<br>
<input id="aiNameInput"><br><br>

OpenAI APIKey<br>
<input id="apiKeyInput"><br><br>

Eleven APIKey<br>
<input id="elevenApiKeyInput"><br><br>

VoiceID<br>
<input id="voiceIdInput"><br><br>

プロンプト（人格設定）<br>
<textarea id="promptInput"></textarea><br><br>

<button onclick="saveSettings()">保存</button>
<button onclick="closeSettings()">閉じる</button>

</div>
</div>

<script>

// ===== 表情 =====
const faceImages={
  normal:"girl-normal.jpg",
  happy:"girl-happy.png",
  sympathy:"girl-sympathy.png",
  worried:"girl-worried.png",
  exhausted:"girl-exhausted.png"
};

function setFace(type){
  girl.src=faceImages[type]||faceImages.normal;
}

// ===== 保存 =====
let memory={
  userName:localStorage.getItem("userName")||"",
  aiName:localStorage.getItem("aiName")||"ピピ",
  prompt:localStorage.getItem("customPrompt")||"あなたは優しい女性AI。自然に会話する"
};

let sessionSecrets={
  apiKey:localStorage.getItem("apiKey")||"",
  elevenApiKey:localStorage.getItem("elevenApiKey")||"",
  voiceId:localStorage.getItem("voiceId")||""
};

let chatHistory=JSON.parse(localStorage.getItem("chatHistory")||"[]");

// 初期表示
userNameInput.value=memory.userName;
aiNameInput.value=memory.aiName;
apiKeyInput.value=sessionSecrets.apiKey;
elevenApiKeyInput.value=sessionSecrets.elevenApiKey;
voiceIdInput.value=sessionSecrets.voiceId;
promptInput.value=memory.prompt;

// ===== UI =====
function openSettings(){
  modal.classList.add("show");

  // 再反映（重要）
  userNameInput.value=memory.userName;
  aiNameInput.value=memory.aiName;
  apiKeyInput.value=sessionSecrets.apiKey;
  elevenApiKeyInput.value=sessionSecrets.elevenApiKey;
  voiceIdInput.value=sessionSecrets.voiceId;
  promptInput.value=memory.prompt;
}

function closeSettings(){
  modal.classList.remove("show");
}

// ===== 保存 =====
function saveSettings(){

  memory.userName=userNameInput.value.trim();
  memory.aiName=aiNameInput.value.trim()||"ピピ";
  memory.prompt=promptInput.value.trim();

  sessionSecrets.apiKey=apiKeyInput.value.trim();
  sessionSecrets.elevenApiKey=elevenApiKeyInput.value.trim();
  sessionSecrets.voiceId=voiceIdInput.value.trim();

  localStorage.setItem("userName",memory.userName);
  localStorage.setItem("aiName",memory.aiName);
  localStorage.setItem("customPrompt",memory.prompt);

  localStorage.setItem("apiKey",sessionSecrets.apiKey);
  localStorage.setItem("elevenApiKey",sessionSecrets.elevenApiKey);
  localStorage.setItem("voiceId",sessionSecrets.voiceId);

  alert("保存OK🔥");
  closeSettings();
}

// ===== 表示 =====
function addMessage(text,type){
  const div=document.createElement("div");
  div.className="message "+type;
  div.textContent=text;
  chatBox.appendChild(div);
  chatBox.scrollTop=chatBox.scrollHeight;
}

// ===== GPT =====
async function sendMessage(){

  const text=userInput.value.trim();
  if(!text)return;

  addMessage(text,"user");
  userInput.value="";

  if(!sessionSecrets.apiKey){
    addMessage("APIキー入れて","bot");
    return;
  }

  chatHistory.push({role:"user",content:text});

  const userName=memory.userName?memory.userName+"さん":"";
  const aiName=memory.aiName;

  try{
    const res=await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+sessionSecrets.apiKey
      },
      body:JSON.stringify({
        model:"gpt-4o-mini",
        messages:[
          {
            role:"system",
            content:`
${memory.prompt}

あなたの名前: ${aiName}
相手: ${userName}

・自然に会話
・人間っぽく
・時々名前呼ぶ
・最初に感情タグ付ける

タグ:
[happy][sympathy][worried][exhausted][normal]
`
          },
          ...chatHistory
        ]
      })
    });

    const data=await res.json();
    let reply=data.choices?.[0]?.message?.content||"エラー";

    // 表情タグ
    let mood="normal";
    const match=reply.match(/^\[(.*?)\]/);
    if(match){
      mood=match[1];
      reply=reply.replace(/^\[.*?\]/,"");
    }

    setFace(mood);

    addMessage(reply,"bot");

    chatHistory.push({role:"assistant",content:reply});
    localStorage.setItem("chatHistory",JSON.stringify(chatHistory));

    speak(reply);

  }catch(e){
    addMessage("通信エラー","bot");
  }
}

// ===== 音声（簡易） =====
function speak(text){
  if(!("speechSynthesis" in window))return;
  const u=new SpeechSynthesisUtterance(text);
  u.lang="ja-JP";
  speechSynthesis.speak(u);
}

// Enter
userInput.addEventListener("keypress",e=>{
  if(e.key==="Enter")sendMessage();
});

</script>

</body>
</html>
