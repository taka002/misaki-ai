<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>美咲AI</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      overflow: hidden;
      background: linear-gradient(to bottom, #232b49, #050b18);
      color: white;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      width: 100%;
      overflow: hidden;
      position: relative;
    }

    /* ===== 上：画像 ===== */
    .top-character {
      flex: 0 0 34%;
      min-height: 220px;
      max-height: 360px;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px 12px 6px;
      position: relative;
    }

    .top-character img {
      width: min(92vw, 420px);
      height: 100%;
      max-height: 100%;
      object-fit: cover;
      border-radius: 34px;
      border: 3px solid rgba(255,255,255,0.14);
      box-shadow: 0 14px 30px rgba(0,0,0,0.35);
      background: rgba(255,255,255,0.04);
      transition: all 0.28s ease;
    }

    .settings-open {
      position: absolute;
      top: 16px;
      right: 18px;
      width: 74px;
      height: 74px;
      border: none;
      border-radius: 50%;
      background: rgba(255,255,255,0.20);
      color: white;
      font-size: 30px;
      backdrop-filter: blur(8px);
      box-shadow: 0 10px 24px rgba(0,0,0,0.22);
      cursor: pointer;
      z-index: 5;
    }

    /* ===== 中：チャット ===== */
    .chat-section {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 0 12px;
    }

    #chatBox {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 8px 4px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }

    .message {
      max-width: 84%;
      padding: 16px 18px;
      border-radius: 24px;
      font-size: clamp(17px, 2.4vw, 20px);
      line-height: 1.9;
      white-space: pre-wrap;
      word-break: break-word;
      animation: fadeIn 0.25s ease;
      box-shadow: 0 10px 24px rgba(0,0,0,0.12);
    }

    .bot {
      align-self: flex-start;
      background: rgba(255,255,255,0.12);
      border-bottom-left-radius: 10px;
      color: #fff;
    }

    .user {
      align-self: flex-end;
      background: linear-gradient(135deg, #ff7eb3, #ff4f8b);
      border-bottom-right-radius: 10px;
      color: white;
    }

    .typing {
      opacity: 0.72;
      font-style: italic;
    }

    .status-bar {
      font-size: 15px;
      opacity: 0.88;
      padding: 0 18px 8px;
      min-height: 26px;
      flex-shrink: 0;
    }

    /* ===== 下：入力 ===== */
    .input-area {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
      background: rgba(0,0,0,0.22);
      border-top: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
      backdrop-filter: blur(6px);
    }

    input[type="text"],
    input[type="password"] {
      flex: 1;
      min-width: 0;
      padding: 16px 18px;
      border-radius: 18px;
      border: none;
      outline: none;
      font-size: 18px;
      background: rgba(255,255,255,0.96);
      color: #222;
    }

    .mic-btn {
      width: 82px;
      height: 82px;
      border: none;
      border-radius: 24px;
      background: rgba(255,255,255,0.12);
      color: white;
      font-size: 34px;
      cursor: pointer;
      flex-shrink: 0;
      box-shadow: 0 10px 22px rgba(0,0,0,0.16);
    }

    .mic-btn.listening {
      background: linear-gradient(135deg, #7a69ff, #5f9bff);
      box-shadow: 0 0 0 6px rgba(122,105,255,0.16);
    }

    .send-btn {
      width: 120px;
      height: 82px;
      border: none;
      border-radius: 24px;
      background: linear-gradient(135deg, #ff7eb3, #ff4f8b);
      color: white;
      font-size: 24px;
      font-weight: bold;
      cursor: pointer;
      flex-shrink: 0;
      box-shadow: 0 10px 24px rgba(255,79,139,0.28);
    }

    .send-btn:active,
    .mic-btn:active,
    .settings-open:active {
      transform: scale(0.97);
    }

    #chatBox::-webkit-scrollbar {
      width: 6px;
    }

    #chatBox::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.18);
      border-radius: 999px;
    }

    /* ===== 初回起動オーバーレイ ===== */
    .start-overlay {
      position: fixed;
      inset: 0;
      background: rgba(4,8,18,0.84);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      padding: 24px;
    }

    .start-box {
      width: 100%;
      max-width: 420px;
      background: rgba(35,29,48,0.96);
      border-radius: 30px;
      padding: 28px 24px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.45);
      text-align: center;
    }

    .start-title {
      font-size: 30px;
      font-weight: bold;
      margin-bottom: 12px;
      color: #ffd1e6;
    }

    .start-text {
      font-size: 18px;
      line-height: 1.9;
      opacity: 0.95;
      margin-bottom: 22px;
    }

    .start-btn {
      width: 100%;
      border: none;
      border-radius: 22px;
      padding: 18px;
      font-size: 22px;
      font-weight: bold;
      cursor: pointer;
      background: linear-gradient(135deg, #7a69ff, #5f9bff);
      color: white;
      box-shadow: 0 14px 28px rgba(95,155,255,0.24);
    }

    /* ===== 設定 ===== */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      padding: 20px;
    }

    .modal.show {
      display: flex;
    }

    .modal-box {
      width: 100%;
      max-width: 400px;
      max-height: 88vh;
      overflow-y: auto;
      background: #2a2236;
      border-radius: 28px;
      padding: 22px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.45);
    }

    .modal-title {
      font-size: 28px;
      font-weight: bold;
      color: #ffd1e6;
      margin-bottom: 18px;
    }

    .setting-row {
      margin-bottom: 16px;
    }

    .setting-label {
      display: block;
      font-size: 17px;
      margin-bottom: 8px;
      opacity: 0.95;
    }

    .setting-input {
      width: 100%;
      padding: 16px;
      border-radius: 18px;
      border: none;
      font-size: 18px;
      outline: none;
    }

    .save-btn,
    .toggle-btn,
    .danger-btn,
    .close-btn {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 16px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    .save-btn {
      background: linear-gradient(135deg, #7a69ff, #5f9bff);
      color: white;
    }

    .toggle-btn {
      background: #5f5470;
      color: white;
    }

    .danger-btn {
      background: #8a3d57;
      color: white;
    }

    .close-btn {
      background: linear-gradient(135deg, #ff7eb3, #ff4f8b);
      color: white;
    }

    .hint {
      font-size: 13px;
      opacity: 0.72;
      margin-top: 6px;
      line-height: 1.7;
    }

    /* ===== 表情アニメ ===== */
    .speaking {
      animation: pulseTalk 0.75s infinite ease-in-out;
    }

    .face-change {
      animation: facePop 0.28s ease;
    }

    @keyframes pulseTalk {
      0%   { transform: scale(1) translateY(0px); }
      25%  { transform: scale(1.01) translateY(-1px); }
      50%  { transform: scale(1.02) translateY(0px); }
      75%  { transform: scale(1.01) translateY(-1px); }
      100% { transform: scale(1) translateY(0); }
    }

    @keyframes facePop {
      0%   { transform: scale(0.96); opacity: 0.7; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ===== 小さいスマホ対策 ===== */
    @media (max-height: 740px) {
      .top-character {
        flex: 0 0 31%;
        min-height: 190px;
      }

      .top-character img {
        width: min(90vw, 380px);
        border-radius: 28px;
      }

      .message {
        font-size: 17px;
        line-height: 1.8;
      }

      .mic-btn, .send-btn {
        height: 74px;
      }

      .mic-btn {
        width: 74px;
        font-size: 30px;
      }

      .send-btn {
        width: 108px;
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="app">

    <!-- 初回起動 -->
    <div class="start-overlay" id="startOverlay">
      <div class="start-box">
        <div class="start-title">美咲AI</div>
        <div class="start-text">
          最初に一度だけタップすると、<br>
          音声返答が使えるようになります。
        </div>
        <button class="start-btn" onclick="startApp()">タップして開始</button>
      </div>
    </div>

    <!-- 上 -->
    <div class="top-character">
      <img id="mainGirl" src="girl-normal.jpg" alt="美咲">
      <button class="settings-open" onclick="openSettings()">⚙</button>
    </div>

    <!-- 中 -->
    <div class="chat-section">
      <div id="chatBox"></div>
    </div>

    <!-- ステータス -->
    <div class="status-bar" id="statusBar">起動待ち</div>

    <!-- 下 -->
    <div class="input-area">
      <input type="text" id="userInput" placeholder="何か話してみて…" />
      <button class="mic-btn" id="micBtn" onclick="startVoiceInput()">🎤</button>
      <button class="send-btn" onclick="sendMessage()">送信</button>
    </div>
  </div>

  <!-- 設定 -->
  <div class="modal" id="settingsModal">
    <div class="modal-box">
      <div class="modal-title">設定</div>

      <div class="setting-row">
        <label class="setting-label">あなたの呼び名（時々呼ぶ）</label>
        <input class="setting-input" id="userNameInput" placeholder="だいすけ">
      </div>

      <div class="setting-row">
        <label class="setting-label">キャラ名</label>
        <input class="setting-input" id="nameInput" placeholder="美咲">
      </div>

      <div class="setting-row">
        <label class="setting-label">OpenAI APIキー</label>
        <input class="setting-input" id="apiKeyInput" type="password" placeholder="sk-..." />
        <div class="hint">GPTを使う時だけ必要。使わないなら空でもOK。</div>
      </div>

      <button class="save-btn" onclick="saveSettings()">💾 保存する</button>
      <button class="toggle-btn" id="gptToggle" onclick="toggleGPT()">🤖 GPT OFF</button>
      <button class="toggle-btn" id="voiceToggle" onclick="toggleVoice()">🔊 音声ON</button>
      <button class="danger-btn" onclick="resetMemory()">記憶をリセット</button>
      <button class="close-btn" onclick="closeSettings()">閉じる</button>
    </div>
  </div>

  <script>
    const chatBox = document.getElementById("chatBox");
    const userInput = document.getElementById("userInput");
    const mainGirl = document.getElementById("mainGirl");
    const settingsModal = document.getElementById("settingsModal");
    const voiceToggleBtn = document.getElementById("voiceToggle");
    const gptToggleBtn = document.getElementById("gptToggle");
    const nameInput = document.getElementById("nameInput");
    const userNameInput = document.getElementById("userNameInput");
    const apiKeyInput = document.getElementById("apiKeyInput");
    const statusBar = document.getElementById("statusBar");
    const micBtn = document.getElementById("micBtn");
    const startOverlay = document.getElementById("startOverlay");

    let appStarted = false;
    let voiceEnabled = localStorage.getItem("voiceEnabled") !== "false";
    let gptEnabled = localStorage.getItem("gptEnabled") === "true";
    let availableVoices = [];
    let recognition = null;
    let isListening = false;

    let memory = {
      characterName: localStorage.getItem("characterName") || "美咲",
      userName: localStorage.getItem("userNickName") || "",
      apiKey: localStorage.getItem("openai_api_key") || "",
      mood: localStorage.getItem("hostess_mood") || "",
      topic: localStorage.getItem("hostess_topic") || "",
      lastMessage: localStorage.getItem("hostess_lastMessage") || "",
      visitCount: parseInt(localStorage.getItem("hostess_visitCount") || "0", 10),
      chatHistory: JSON.parse(localStorage.getItem("hostess_chatHistory") || "[]")
    };

    memory.visitCount += 1;
    localStorage.setItem("hostess_visitCount", memory.visitCount);

    nameInput.value = memory.characterName;
    userNameInput.value = memory.userName;
    apiKeyInput.value = memory.apiKey;

    updateVoiceButton();
    updateGPTButton();

    const faceImages = {
      normal: "girl-normal.jpg",
      worried: "girl-worried.png",
      sympathy: "girl-sympathy.png",
      troubled: "girl-troubled.png",
      healing: "girl-healing.png",
      happy: "girl-happy.png",
      irritated: "girl-irritated.png",
      panic: "girl-panic.png",
      exhausted: "girl-exhausted.png"
    };

    const moodBackgrounds = {
      normal: "linear-gradient(to bottom, #232b49, #050b18)",
      worried: "linear-gradient(to bottom, #3f4c6b, #1d2230)",
      sympathy: "linear-gradient(to bottom, #4a3b60, #1c1a2a)",
      troubled: "linear-gradient(to bottom, #4c4b67, #1d2031)",
      healing: "linear-gradient(to bottom, #5b4767, #1d1d30)",
      happy: "linear-gradient(to bottom, #485f8b, #1b233a)",
      irritated: "linear-gradient(to bottom, #5f3a4f, #241926)",
      panic: "linear-gradient(to bottom, #5a5068, #201d2c)",
      exhausted: "linear-gradient(to bottom, #4b5165, #1a1f2c)"
    };

    function setStatus(text) {
      statusBar.textContent = text;
    }

    function setFace(type = "normal") {
      const src = faceImages[type] || faceImages.normal;
      mainGirl.src = src;
      document.body.style.background = moodBackgrounds[type] || moodBackgrounds.normal;

      mainGirl.classList.remove("face-change");
      void mainGirl.offsetWidth;
      mainGirl.classList.add("face-change");
    }

    function startSpeakingAnimation() {
      mainGirl.classList.add("speaking");
    }

    function stopSpeakingAnimation() {
      mainGirl.classList.remove("speaking");
    }

    function openSettings() {
      nameInput.value = memory.characterName || "美咲";
      userNameInput.value = memory.userName || "";
      apiKeyInput.value = memory.apiKey || "";
      settingsModal.classList.add("show");
    }

    function closeSettings() {
      settingsModal.classList.remove("show");
    }

    function saveSettings() {
      memory.characterName = nameInput.value.trim() || "美咲";
      memory.userName = userNameInput.value.trim();
      memory.apiKey = apiKeyInput.value.trim();

      localStorage.setItem("characterName", memory.characterName);
      localStorage.setItem("userNickName", memory.userName);
      localStorage.setItem("openai_api_key", memory.apiKey);

      addMessage("設定を保存したよ😊", "bot");
      setStatus("設定を保存しました");
      closeSettings();
    }

    function toggleVoice() {
      voiceEnabled = !voiceEnabled;
      localStorage.setItem("voiceEnabled", voiceEnabled);
      updateVoiceButton();

      if (!voiceEnabled && ("speechSynthesis" in window)) {
        window.speechSynthesis.cancel();
        stopSpeakingAnimation();
      }
    }

    function toggleGPT() {
      gptEnabled = !gptEnabled;
      localStorage.setItem("gptEnabled", gptEnabled);
      updateGPTButton();
      setStatus(gptEnabled ? "GPT接続ON" : "GPT接続OFF");
    }

    function updateVoiceButton() {
      voiceToggleBtn.textContent = voiceEnabled ? "🔊 音声ON" : "🔇 音声OFF";
    }

    function updateGPTButton() {
      gptToggleBtn.textContent = gptEnabled ? "🤖 GPT ON" : "🤖 GPT OFF";
    }

    function resetMemory() {
      localStorage.removeItem("hostess_mood");
      localStorage.removeItem("hostess_topic");
      localStorage.removeItem("hostess_lastMessage");
      localStorage.removeItem("hostess_visitCount");
      localStorage.removeItem("hostess_chatHistory");

      memory.mood = "";
      memory.topic = "";
      memory.lastMessage = "";
      memory.visitCount = 1;
      memory.chatHistory = [];

      addMessage("記憶をリセットしたよ😊\nまた最初からゆっくり話そう。", "bot");
      setFace("healing");
      setStatus("記憶をリセットしました");
      closeSettings();
    }

    function loadVoices() {
      if (!("speechSynthesis" in window)) return;
      availableVoices = window.speechSynthesis.getVoices();
    }

    if ("speechSynthesis" in window) {
      loadVoices();
      window.speechSynthesis.onvoiceschanged = loadVoices;
    }

    function startApp() {
      appStarted = true;
      startOverlay.style.display = "none";

      unlockSpeech();

      setTimeout(() => {
        setFace("normal");
        botReply(getWelcomeMessage());
        setStatus("準備OK");
      }, 350);
    }

    function unlockSpeech() {
      try {
        if (!("speechSynthesis" in window)) return;
        const synth = window.speechSynthesis;
        const u = new SpeechSynthesisUtterance("起動");
        u.volume = 0;
        u.rate = 1;
        u.pitch = 1;
        synth.cancel();
        synth.speak(u);
      } catch (e) {}
    }

    function getWelcomeMessage() {
      const name = memory.characterName || "美咲";
      const user = memory.userName ? `${memory.userName}さん、` : "";

      if (memory.visitCount >= 2 && memory.mood === "tired") {
        return `${user}${name}だよ😊\n前もちょっとしんどそうだったよね。\n今日は昨日よりきつい感じある？`;
      }

      if (memory.visitCount >= 2 && memory.mood === "panic") {
        return `${user}${name}だよ😊\n前もちょっと焦ってた感じがあったよね。\n今日は少し落ち着けそう？`;
      }

      if (memory.visitCount >= 2 && memory.mood === "lonely") {
        return `${user}${name}だよ😊\n前もちょっと寂しそうだったよね。\n今日はどう？少し話せそう？`;
      }

      return `${user}${name}だよ😊\n今日はどんな感じだった？`;
    }

    function addMessage(text, sender, extraClass = "") {
      const msg = document.createElement("div");
      msg.className = `message ${sender} ${extraClass}`;
      msg.textContent = text;
      chatBox.appendChild(msg);
      chatBox.scrollTop = chatBox.scrollHeight;
      return msg;
    }

    function botReply(text) {
      addMessage(text, "bot");
      saveChat("assistant", text);
      speakText(text);
    }

    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;

      addMessage(text, "user");
      saveChat("user", text);
      userInput.value = "";

      const typingMsg = addMessage("…入力中", "bot", "typing");

      try {
        let reply = "";

        if (gptEnabled && memory.apiKey) {
          setStatus("GPTで考え中…");
          reply = await generateGPTReply(text);
        } else {
          setStatus("ローカル応答中…");
          reply = generateLocalReply(text);
        }

        typingMsg.remove();
        botReply(reply);
        setStatus("準備OK");
      } catch (e) {
        console.error(e);
        typingMsg.remove();
        const fallback = generateLocalReply(text);
        botReply(fallback);
        setStatus("GPT失敗 → ローカルで返答");
      }
    }

    userInput.addEventListener("keypress", e => {
      if (e.key === "Enter") sendMessage();
    });

    function saveChat(role, content) {
      memory.chatHistory.push({ role, content });
      if (memory.chatHistory.length > 20) {
        memory.chatHistory = memory.chatHistory.slice(-20);
      }
      localStorage.setItem("hostess_chatHistory", JSON.stringify(memory.chatHistory));
    }

    function rememberUserInfo(text, lower) {
      memory.lastMessage = text;

      if (containsAny(lower, ["仕事", "会社", "上司", "職場", "残業"])) {
        memory.topic = "work";
      } else if (containsAny(lower, ["家族", "子ども", "娘", "息子"])) {
        memory.topic = "family";
      } else if (containsAny(lower, ["不安", "眠れない", "寝れない"])) {
        memory.topic = "anxiety";
      }

      saveMemory();
    }

    function saveMemory() {
      localStorage.setItem("hostess_mood", memory.mood || "");
      localStorage.setItem("hostess_topic", memory.topic || "");
      localStorage.setItem("hostess_lastMessage", memory.lastMessage || "");
    }

    function containsAny(text, words) {
      return words.some(word => text.includes(word.toLowerCase()));
    }

    function shorten(text) {
      return text.length > 18 ? text.slice(0, 18) + "…" : text;
    }

    function pick(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function maybeCallUserName() {
      if (!memory.userName) return "";
      return Math.random() < 0.35 ? `${memory.userName}さん、` : "";
    }

    function generateLocalReply(text) {
      const t = text.trim();
      const lower = t.toLowerCase();
      rememberUserInfo(t, lower);

      const callName = maybeCallUserName();

      if (containsAny(lower, ["イライラ", "むかつく", "ムカつく", "腹立つ", "うざい"])) {
        setFace("irritated");
        memory.mood = "irritated";
        saveMemory();
        return pick([
          `${callName}それ、かなりイラッとしたよね。\n無理に飲み込まなくていいよ。\n何が一番ひっかかった？`,
          `${callName}それは腹立つやつだね…。\nちゃんと嫌だったって感じていいよ。\n言い方？態度？出来事そのもの？`
        ]);
      }

      if (containsAny(lower, ["焦る", "あせる", "やばい", "間に合わない", "どうしよう", "パニック"])) {
        setFace("panic");
        memory.mood = "panic";
        saveMemory();
        return pick([
          `${callName}かなり焦ってる感じあるね。\n大丈夫、今は全部を片づけなくていい。\nまず一番急いでることだけ教えて？`,
          `${callName}それは焦るよね…。\n頭の中が散らかると余計しんどいから、一個ずつでいこう。\n今すぐ対応が必要なのは何？`
        ]);
      }

      if (containsAny(lower, ["きつい", "限界", "無理", "へとへと", "しんどい", "もうだめ"])) {
        setFace("exhausted");
        memory.mood = "tired";
        saveMemory();
        return pick([
          `${callName}かなりきつかったね…。\n今は頑張るより、少し守る方が大事かも。\n体がきつい？気持ちがきつい？`,
          `${callName}もう無理って感じるくらいしんどいんだね。\nここではちゃんと弱音吐いていいよ。\n今日は何が一番重かった？`
        ]);
      }

      if (containsAny(lower, ["疲れた", "つかれた", "つらい"])) {
        setFace("worried");
        memory.mood = "tired";
        saveMemory();
        return pick([
          `${callName}大丈夫？かなり頑張ってきた感じするよ。\n今日は何が一番しんどかった？`,
          `${callName}それはつらかったね…。\nここでは少し気を抜いていいよ。\n体の疲れが強い感じ？気持ちの方？`
        ]);
      }

      if (containsAny(lower, ["寂しい", "さみしい", "泣きたい", "孤独", "悲しい"])) {
        setFace("sympathy");
        memory.mood = "lonely";
        saveMemory();
        return pick([
          `${callName}そっか…つらかったね。\nちゃんとここで受け止めるよ。\n何かあった後の気持ち？それともずっと続いてる感じ？`,
          `${callName}その寂しさ、ちゃんと伝わってるよ。\nひとりで抱えなくて大丈夫。\n少しだけでも話していこ？`
        ]);
      }

      if (containsAny(lower, ["困った", "わからない", "迷う", "悩む"])) {
        setFace("troubled");
        memory.mood = "troubled";
        saveMemory();
        return pick([
          `${callName}それ、かなり悩むやつだね…。\n一緒に整理してみよっか。\n何が一番引っかかってる？`,
          `${callName}迷う時って、頭の中ごちゃっとするよね。\n順番にほどいていこう。\n何から話すのが一番楽そう？`
        ]);
      }

      if (containsAny(lower, ["癒して", "甘えたい", "安心したい"])) {
        setFace("healing");
        memory.mood = "healing";
        saveMemory();
        return pick([
          `${callName}いいよ😊\nここでは安心していいからね。\n今日はちょっと力抜こっか。`,
          `${callName}うん、今日は少し甘えていい日。\n無理してしゃんとしなくていいよ。`
        ]);
      }

      if (containsAny(lower, ["好き", "嬉しい", "うれしい", "会いたい"])) {
        setFace("happy");
        memory.mood = "happy";
        saveMemory();
        return pick([
          `${callName}ふふ😊\nそういうの嬉しいな。\n今日はちょっと心がやわらぐ日かもね。`,
          `${callName}そんなふうに言われると、ちょっと照れるね。\nでも嬉しい。`
        ]);
      }

      setFace("normal");
      memory.mood = "normal";
      saveMemory();

      return pick([
        `${callName}うん、ちゃんと聞いてるよ。\n「${shorten(t)}」って感じなんだね。\nもう少し詳しく話せそう？`,
        `${callName}なるほど…そういう感じだったんだね。\nその時、気持ちはどんな感じだった？`,
        `${callName}うん、続けて話して大丈夫だよ。\n今いちばん引っかかってるところ、どこ？`
      ]);
    }

    async function generateGPTReply(userText) {
      const lower = userText.toLowerCase();
      rememberUserInfo(userText, lower);

      const recentHistory = memory.chatHistory.slice(-10).map(item => ({
        role: item.role,
        content: item.content
      }));

      const systemPrompt = `
あなたは「${memory.characterName || "美咲"}」という、落ち着いた大人の女性です。
ユーザーに寄り添い、安心感のある自然な会話をしてください。

ルール:
- 返答は日本語
- 長すぎず、短すぎず、自然に
- AIっぽい説明口調を避ける
- カウンセリング風に、気持ちを受け止めて返す
- 決めつけすぎない
- ユーザーを責めない
- 時々だけ ${memory.userName || "ユーザー"} の呼び名を自然に入れてよい
- 必ず最後に、軽い問いかけや受け止めを入れる
- 必要ならやさしく整理する
- 恋愛営業っぽくしすぎない
- 「表情タグ」を必ず文頭に1つだけ付ける

表情タグ:
[happy]
[healing]
[worried]
[sympathy]
[troubled]
[irritated]
[panic]
[exhausted]
[normal]
`;

      const messages = [
        { role: "system", content: systemPrompt },
        ...recentHistory,
        { role: "user", content: userText }
      ];

      const res = await fetch("https://api.openai.com/v1/chat/completions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${memory.apiKey}`
        },
        body: JSON.stringify({
          model: "gpt-4o-mini",
          messages,
          temperature: 0.9
        })
      });

      if (!res.ok) {
        throw new Error("GPT API error");
      }

      const data = await res.json();
      const raw = data.choices?.[0]?.message?.content?.trim() || "うまく言葉が出なかったけど、ちゃんとここにいるよ。";
      return applyEmotionFromReply(raw);
    }

    function applyEmotionFromReply(text) {
      let mood = "normal";
      let cleaned = text;

      const tags = ["happy", "healing", "worried", "sympathy", "troubled", "irritated", "panic", "exhausted", "normal"];

      for (const tag of tags) {
        const pattern = new RegExp(`^\\[${tag}\\]\\s*`, "i");
        if (pattern.test(cleaned)) {
          mood = tag;
          cleaned = cleaned.replace(pattern, "");
          break;
        }
      }

      memory.mood = mood;
      saveMemory();
      setFace(mood);
      return cleaned;
    }

    function getVoiceStyleByMood(mood) {
      switch (mood) {
        case "happy":
          return { rate: 0.97, pitch: 1.18 };
        case "healing":
          return { rate: 0.87, pitch: 1.12 };
        case "lonely":
        case "sympathy":
          return { rate: 0.85, pitch: 1.06 };
        case "tired":
        case "exhausted":
          return { rate: 0.84, pitch: 1.02 };
        case "panic":
          return { rate: 0.91, pitch: 1.10 };
        case "irritated":
          return { rate: 0.90, pitch: 0.98 };
        case "troubled":
          return { rate: 0.88, pitch: 1.03 };
        default:
          return { rate: 0.92, pitch: 1.08 };
      }
    }

    function speakText(text) {
      if (!voiceEnabled || !appStarted) return;

      if (!("speechSynthesis" in window)) {
        setStatus("この環境では音声非対応");
        return;
      }

      try {
        const synth = window.speechSynthesis;
        synth.cancel();

        const cleanText = text
          .replace(/\n/g, "。")
          .replace(/😊|♡|✨|😌|😢|🥺|😳|💦|💭/g, "")
          .replace(/…/g, "、")
          .trim();

        if (!cleanText) return;

        setTimeout(() => {
          try {
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = "ja-JP";

            const voiceStyle = getVoiceStyleByMood(memory.mood);
            utterance.rate = voiceStyle.rate;
            utterance.pitch = voiceStyle.pitch;
            utterance.volume = 1.0;

            const voices = synth.getVoices();
            let preferredVoice =
              voices.find(v => v.lang && v.lang.includes("ja") && v.name.includes("Google")) ||
              voices.find(v => v.lang && v.lang.includes("ja"));

            if (preferredVoice) {
              utterance.voice = preferredVoice;
            }

            utterance.onstart = () => {
              startSpeakingAnimation();
              setStatus("話してるよ…");
            };

            utterance.onend = () => {
              stopSpeakingAnimation();
              setStatus("準備OK");
            };

            utterance.onerror = () => {
              stopSpeakingAnimation();
              setStatus("音声再生できませんでした");
            };

            synth.speak(utterance);
          } catch (err) {
            console.error(err);
            stopSpeakingAnimation();
            setStatus("音声エラー");
          }
        }, 220);

      } catch (e) {
        console.error(e);
        stopSpeakingAnimation();
        setStatus("音声エラー");
      }
    }

    function stopVoiceInput() {
      try {
        if (recognition) recognition.stop();
      } catch (e) {}
      isListening = false;
      micBtn.classList.remove("listening");
      setStatus("マイク停止");
    }

    function startVoiceInput() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

      if (!SpeechRecognition) {
        alert("この環境ではマイク入力が使えません。\n\nおすすめ:\n・Chromeで開く\n・GitHub Pagesで開く\n・HTTPSで開く");
        return;
      }

      if (isListening) {
        stopVoiceInput();
        return;
      }

      try {
        recognition = new SpeechRecognition();
        recognition.lang = "ja-JP";
        recognition.interimResults = false;
        recognition.continuous = false;
        recognition.maxAlternatives = 1;

        isListening = true;
        micBtn.classList.add("listening");
        setStatus("🎤 聞き取り中…話してください");

        recognition.onresult = (event) => {
          const transcript = event.results[0][0].transcript || "";
          userInput.value = transcript.trim();
          setStatus("音声入力OK → 送信中");
          sendMessage();
        };

        recognition.onerror = (event) => {
          console.log("音声認識エラー:", event.error);

          if (event.error === "not-allowed") {
            setStatus("マイク許可が必要です");
            alert("マイクが拒否されています。\n\nChromeの設定でこのページのマイクを許可してください。");
          } else if (event.error === "no-speech") {
            setStatus("声が聞こえなかったみたい");
          } else if (event.error === "audio-capture") {
            setStatus("マイクが使えません");
          } else if (event.error === "network") {
            setStatus("音声認識ネットワークエラー");
          } else {
            setStatus("マイク入力失敗");
          }

          isListening = false;
          micBtn.classList.remove("listening");
        };

        recognition.onend = () => {
          isListening = false;
          micBtn.classList.remove("listening");
          if (statusBar.textContent.includes("聞き取り中")) {
            setStatus("準備OK");
          }
        };

        recognition.start();
      } catch (e) {
        console.error(e);
        isListening = false;
        micBtn.classList.remove("listening");
        setStatus("マイク起動失敗");
      }
    }
  </script>
