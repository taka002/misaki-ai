<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ピピAI 完全版</title>

<style>
*{ box-sizing:border-box; }

html,body{
  height:100%;
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(#2b314d,#09111f);
  color:white;
}

.app{
  display:flex;
  flex-direction:column;
  height:100vh;
  overflow:hidden;
}

/* 🔥 横いっぱいに修正 */
.top{
  height:35vh;
  width:100%;
  overflow:hidden;
}

.top img{
  width:100%;
  height:100%;
  object-fit:cover; /* ←ここ重要 */
}

/* ===== チャット ===== */
#chatBox{
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

.row{ display:flex; margin:6px 0; }
.row.user{ justify-content:flex-end; }
.row.bot{ justify-content:flex-start; }

.bubble{
  padding:12px 16px;
  border-radius:16px;
  max-width:75%;
  white-space:pre-wrap;
}

.user .bubble{ background:#ff4f8b; }
.bot .bubble{ background:#444; }

/* ===== 入力 ===== */
.input-area{
  display:flex;
  gap:6px;
  padding:8px;
  background:#111;
}

#userInput{
  flex:1;
  padding:14px;
  border:none;
  border-radius:10px;
}

.input-area button{
  width:60px;
  height:55px;
  border:none;
  border-radius:10px;
}

.mic{ background:#5f9bff; }

/* ===== モーダル ===== */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal.show{ display:flex; }

.box{
  width:90%;
  max-width:420px;
  max-height:85vh;
  overflow:auto;
  background:#222;
  padding:20px;
  border-radius:12px;
}

input,textarea{
  width:100%;
  margin-bottom:10px;
  padding:10px;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="app">

  <div class="top">
    <img id="girl">
  </div>

  <div id="chatBox"></div>

  <div class="input-area">
    <input id="userInput" placeholder="話してみて">
    <button onclick="sendMessage()">送信</button>
    <button class="mic" onclick="startVoice()">🎤</button>
    <button onclick="analyze()">🧠</button>
    <button onclick="openSettings()">⚙</button>
  </div>

</div>

<!-- 設定 -->
<div class="modal" id="modal">
  <div class="box">
    キャラ名<input id="nameInput">

    画像URL<input id="imageInput">

    <!-- 🔥 スマホ画像選択 -->
    画像選択<input type="file" id="imageFile" accept="image/*">

    OpenAI APIKey<input id="apiKeyInput">
    Eleven APIKey<input id="elevenApiKeyInput">
    VoiceID<input id="voiceIdInput">
    プロンプト<textarea id="promptInput"></textarea>

    <button onclick="saveSettings()">保存</button>
    <button onclick="closeSettings()">閉じる</button>
  </div>
</div>

<script>
let chatBox, girl, modal, userInput;
let nameInput, imageInput, apiKeyInput, elevenApiKeyInput, voiceIdInput, promptInput, imageFile;

let chatLog=[];

let settings={
  name:localStorage.getItem("name")||"ピピ",
  image:localStorage.getItem("image")||"",
  apiKey:localStorage.getItem("apiKey")||"",
  elevenApiKey:localStorage.getItem("elevenApiKey")||"",
  voiceId:localStorage.getItem("voiceId")||"",
  prompt:localStorage.getItem("prompt")||"優しく話す"
};

window.addEventListener("DOMContentLoaded",()=>{

  chatBox=document.getElementById("chatBox");
  girl=document.getElementById("girl");
  modal=document.getElementById("modal");
  userInput=document.getElementById("userInput");

  nameInput=document.getElementById("nameInput");
  imageInput=document.getElementById("imageInput");
  apiKeyInput=document.getElementById("apiKeyInput");
  elevenApiKeyInput=document.getElementById("elevenApiKeyInput");
  voiceIdInput=document.getElementById("voiceIdInput");
  promptInput=document.getElementById("promptInput");
  imageFile=document.getElementById("imageFile");

  girl.src=settings.image || "https://via.placeholder.com/400x300";

  // 🔥 画像選択処理
  imageFile.addEventListener("change",()=>{
    const file=imageFile.files[0];
    if(!file) return;

    const reader=new FileReader();
    reader.onload=e=>{
      settings.image=e.target.result;
      girl.src=settings.image;
    };
    reader.readAsDataURL(file);
  });

  userInput.addEventListener("keypress",e=>{
    if(e.key==="Enter") sendMessage();
  });

});

// 保存
function saveSettings(){

  if(imageInput.value.trim()){
    settings.image=imageInput.value.trim();
  }

  settings.name=nameInput.value;
  settings.apiKey=apiKeyInput.value;
  settings.elevenApiKey=elevenApiKeyInput.value;
  settings.voiceId=voiceIdInput.value;
  settings.prompt=promptInput.value;

  localStorage.setItem("name",settings.name);
  localStorage.setItem("image",settings.image);
  localStorage.setItem("apiKey",settings.apiKey);
  localStorage.setItem("elevenApiKey",settings.elevenApiKey);
  localStorage.setItem("voiceId",settings.voiceId);
  localStorage.setItem("prompt",settings.prompt);

  girl.src=settings.image;
  closeSettings();
}

function openSettings(){ modal.classList.add("show"); }
function closeSettings(){ modal.classList.remove("show"); }

// 表示
function addMessage(text,type){

  chatLog.push({role:type==="user"?"user":"assistant",content:text});

  const row=document.createElement("div");
  row.className="row "+type;

  const bubble=document.createElement("div");
  bubble.className="bubble";
  bubble.textContent=text;

  row.appendChild(bubble);
  chatBox.appendChild(row);
  chatBox.scrollTop=chatBox.scrollHeight;
}

// ===== 音声 =====
function speak(text){
  if(!("speechSynthesis" in window)) return;

  const u=new SpeechSynthesisUtterance(text);
  u.lang="ja-JP";
  speechSynthesis.speak(u);
}

// AI
async function aiReply(text){

  if(!settings.apiKey) return "APIキー未設定";

  const res=await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+settings.apiKey
    },
    body:JSON.stringify({
      model:"gpt-4o-mini",
      messages:[
        {role:"system",content:`あなたは${settings.name}。${settings.prompt}`},
        ...chatLog.slice(-20),
        {role:"user",content:text}
      ]
    })
  });

  const data=await res.json();
  return data.choices[0].message.content;
}

// 送信
async function sendMessage(){

  const text=userInput.value.trim();
  if(!text) return;

  addMessage(text,"user");
  userInput.value="";

  const reply=await aiReply(text);

  addMessage(reply,"bot");
  speak(reply);
}

// 分析
async function analyze(){

  if(chatLog.length===0){
    alert("会話がないよ");
    return;
  }

  addMessage("分析中…","bot");

  const res=await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+settings.apiKey
    },
    body:JSON.stringify({
      model:"gpt-4o-mini",
      messages:[
        {role:"system",content:`①まとめ②感情③歪み④5カラム⑤行動⑥一言`},
        ...chatLog.slice(-20)
      ]
    })
  });

  const data=await res.json();
  addMessage(data.choices[0].message.content,"bot");
}

// 音声入力
function startVoice(){
  const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SpeechRecognition) return;

  const recog=new SpeechRecognition();
  recog.lang="ja-JP";

  recog.onresult=(e)=>{
    userInput.value=e.results[0][0].transcript;
    sendMessage();
  };

  recog.start();
}
</script>

</body>
</html>
