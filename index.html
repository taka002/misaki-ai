<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#09111f;
  color:white;
}

/* ===== ロック画面 ===== */
#lockScreen{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:999;
}

#lockScreen input{
  padding:15px;
  font-size:20px;
  margin-top:10px;
}

#lockScreen button{
  padding:10px;
  margin-top:10px;
}

/* ===== 全体 ===== */
.app{
  display:flex;
  flex-direction:column;
  height:100dvh;
}

/* ===== 時間 ===== */
.time-bar{
  text-align:center;
  font-size:14px;
  padding:5px;
  opacity:0.8;
}

/* ===== 画像 ===== */
.top-character{
  flex:0 0 20vh;
  display:flex;
  justify-content:center;
  align-items:center;
}
.top-character img{
  width:90%;
  height:100%;
  object-fit:cover;
  border-radius:20px;
}

/* ===== パネル ===== */
.panel{
  display:none;
  flex:1;
  flex-direction:column;
}
.panel.active{
  display:flex;
}

/* ===== メッセージ ===== */
#chatBox{
  flex:1;
  overflow-y:auto;
  padding:10px;
}

.message{
  padding:10px;
  border-radius:15px;
  margin:5px 0;
  max-width:80%;
}

.user{
  background:#ff4f8b;
  align-self:flex-end;
}

.bot{
  background:#444;
}

/* ===== 入力 ===== */
.input-area{
  display:flex;
}
input{
  flex:1;
  padding:10px;
}
button{
  padding:10px;
}

/* ===== タブ ===== */
.tabs{
  display:flex;
  background:#222;
}
.tab{
  flex:1;
  padding:10px;
  text-align:center;
}
</style>
</head>

<body>

<!-- 🔒 ロック画面 -->
<div id="lockScreen">
  <h2>ロック解除</h2>
  <input type="password" id="passInput" placeholder="パスコード">
  <button onclick="unlock()">解除</button>
</div>

<div class="app">

<div class="time-bar" id="timeBar"></div>

<div class="top-character">
<img id="mainGirl" src="girl-normal.jpg">
</div>

<!-- 会話 -->
<div id="chatPanel" class="panel active">
<div id="chatBox"></div>

<div class="input-area">
<input id="userInput">
<button onclick="sendMessage()">送信</button>
</div>
</div>

<!-- 分析 -->
<div id="analysisPanel" class="panel"></div>

<!-- 未来 -->
<div id="futurePanel" class="panel"></div>

<!-- タブ -->
<div class="tabs">
<div class="tab" onclick="switchTab('chat')">会話</div>
<div class="tab" onclick="switchTab('analysis')">分析</div>
<div class="tab" onclick="switchTab('future')">未来</div>
</div>

</div>

<script>

/* ===== ロック ===== */
const PASS = "1234";

function unlock(){
  const input = document.getElementById("passInput").value;
  if(input === PASS){
    document.getElementById("lockScreen").style.display="none";
  }else{
    alert("違う");
  }
}

/* ===== 時間 ===== */
function updateTime(){
  const now = new Date();
  const str = now.toLocaleString();
  document.getElementById("timeBar").textContent = str;
}
setInterval(updateTime,1000);
updateTime();

/* ===== タブ ===== */
function switchTab(tab){
  document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
  if(tab==='chat') chatPanel.classList.add("active");
  if(tab==='analysis') analysisPanel.classList.add("active");
  if(tab==='future') futurePanel.classList.add("active");
}

/* ===== 会話 ===== */
function addMessage(text,type){
  const div=document.createElement("div");
  div.className="message "+type;
  div.textContent=text;
  chatBox.appendChild(div);
  chatBox.scrollTop=chatBox.scrollHeight;
}

function sendMessage(){
  const text=userInput.value;
  if(!text) return;

  addMessage(text,"user");

  let reply="ちゃんと聞いてるよ";
  if(text.includes("疲")) reply="無理してる感じあるね…";

  addMessage(reply,"bot");

  userInput.value="";
}

</script>

</body>
</html>
