<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>美咲AI 完全版</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      transition: background 0.45s ease;
    }

    body {
      background: linear-gradient(to bottom, #2b314d, #09111f);
      color: white;
      display: flex;
      flex-direction: column;
    }

    .app {
      width: 100%;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* ===== 上画像 ===== */
    .top-character {
      flex: 0 0 30vh;
      min-height: 210px;
      max-height: 320px;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px 12px 6px;
      position: relative;
    }

    .top-character img {
      width: min(92vw, 520px);
      height: 100%;
      object-fit: cover;
      border-radius: 28px;
      border: 3px solid rgba(255,255,255,0.14);
      box-shadow: 0 16px 34px rgba(0,0,0,0.38);
      background: rgba(255,255,255,0.03);
      transition: all 0.28s ease;
      display: block;
    }

    .settings-open {
      position: absolute;
      top: 18px;
      right: 18px;
      width: 68px;
      height: 68px;
      border-radius: 50%;
      border: none;
      font-size: 28px;
      background: rgba(255,255,255,0.16);
      color: white;
      backdrop-filter: blur(8px);
      box-shadow: 0 10px 26px rgba(0,0,0,0.22);
      cursor: pointer;
      z-index: 5;
    }

    /* ===== メインタブ切り替え ===== */
    .main-panels {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel {
      display: none;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .panel.active {
      display: flex;
      flex-direction: column;
    }

    /* ===== 会話エリア ===== */
    .chat-section {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding: 0 10px;
      overflow: hidden;
    }

    #chatBox {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 6px 2px 12px;
      scroll-behavior: smooth;
    }

    .message {
      max-width: 86%;
      padding: 14px 16px;
      border-radius: 24px;
      font-size: clamp(15px, 2.4vw, 18px);
      line-height: 1.9;
      white-space: pre-wrap;
      word-break: break-word;
      animation: fadeIn 0.22s ease;
    }

    .bot {
      align-self: flex-start;
      background: rgba(255,255,255,0.11);
      border-bottom-left-radius: 10px;
      color: #fff;
      box-shadow: 0 8px 18px rgba(0,0,0,0.12);
    }

    .user {
      align-self: flex-end;
      background: linear-gradient(135deg, #ff7eb3, #ff4f8b);
      border-bottom-right-radius: 10px;
      color: white;
      box-shadow: 0 8px 18px rgba(255,93,151,0.25);
    }

    .typing {
      opacity: 0.72;
      font-style: italic;
    }

    /* ===== ステータス ===== */
    .status-bar {
      flex-shrink: 0;
      font-size: 13px;
      opacity: 0.82;
      padding: 0 14px 8px;
      min-height: 22px;
    }

    /* ===== 入力エリア（小型化） ===== */
    .input-area {
      flex-shrink: 0;
      display: grid;
      grid-template-columns: 1fr 78px 96px;
      gap: 10px;
      padding: 10px 10px 8px;
      background: rgba(0,0,0,0.20);
      border-top: 1px solid rgba(255,255,255,0.08);
      align-items: center;
    }

    input[type="text"], input[type="password"], select, textarea {
      width: 100%;
      min-width: 0;
      padding: 14px 16px;
      border-radius: 18px;
      border: none;
      outline: none;
      font-size: 17px;
      background: rgba(255,255,255,0.96);
      color: #222;
    }

    textarea {
      resize: none;
      min-height: 100px;
      font-family: inherit;
      line-height: 1.8;
    }

    .mic-btn, .send-btn {
      border: none;
      border-radius: 22px;
      color: white;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 12px 24px rgba(0,0,0,0.16);
    }

    .mic-btn {
      width: 78px;
      height: 68px;
      font-size: 28px;
      background: rgba(255,255,255,0.12);
    }

    .mic-btn.listening {
      background: linear-gradient(135deg, #7a69ff, #5f9bff);
      box-shadow: 0 0 0 8px rgba(122,105,255,0.18);
    }

    .send-btn {
      width: 96px;
      height: 68px;
      font-size: 20px;
      background: linear-gradient(135deg, #ff7eb3, #ff4f8b);
      box-shadow: 0 14px 28px rgba(255,79,139,0.28);
    }

    .send-btn:active,
    .mic-btn:active,
    .settings-open:active,
    .main-tab-btn:active,
    .action-btn:active {
      transform: scale(0.97);
    }

    #chatBox::-webkit-scrollbar,
    .panel-scroll::-webkit-scrollbar,
    .modal-box::-webkit-scrollbar {
      width: 6px;
    }

    #chatBox::-webkit-scrollbar-thumb,
    .panel-scroll::-webkit-scrollbar-thumb,
    .modal-box::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.18);
      border-radius: 999px;
    }

    /* ===== 下3タブ（小型化） ===== */
    .main-tabs {
      flex-shrink: 0;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      padding: 8px 10px 12px;
      background: rgba(0,0,0,0.18);
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .main-tab-btn {
      border: none;
      border-radius: 24px;
      padding: 14px 8px 12px;
      color: white;
      background: rgba(255,255,255,0.08);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.16);
      min-height: 92px;
      transition: 0.2s ease;
    }

    .main-tab-btn.active {
      background: linear-gradient(135deg, #ff7eb3, #ff4f8b);
      box-shadow: 0 16px 32px rgba(255,79,139,0.24);
    }

    .main-tab-icon {
      font-size: 34px;
      line-height: 1;
    }

    .main-tab-label {
      font-size: 15px;
      font-weight: bold;
    }

    /* ===== 分析タブ ===== */
    .panel-scroll {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 10px 12px 18px;
    }

    .glass-card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 14px 28px rgba(0,0,0,0.18);
      backdrop-filter: blur(8px);
      border-radius: 26px;
      padding: 18px;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: 26px;
      font-weight: bold;
      color: #ffdbe9;
      margin-bottom: 14px;
    }

    .sub-title {
      font-size: 17px;
      font-weight: bold;
      color: #ffeaf3;
      margin-bottom: 10px;
    }

    .analysis-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 14px;
      color: #ffe4ef;
    }

    .animal-hero {
      text-align: center;
      margin-bottom: 6px;
    }

    .animal-emoji {
      font-size: 74px;
      line-height: 1;
      margin-bottom: 8px;
    }

    .animal-name {
      font-size: 21px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .animal-sub {
      font-size: 14px;
      opacity: 0.88;
      line-height: 1.8;
    }

    .analysis-section {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .analysis-subtitle {
      font-size: 15px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #f6dfff;
    }

    .bar-row {
      margin-bottom: 12px;
    }

    .bar-label {
      font-size: 14px;
      margin-bottom: 6px;
      opacity: 0.94;
    }

    .bar-bg {
      width: 100%;
      height: 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.10);
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.55s ease;
    }

    .analysis-text {
      font-size: 14px;
      line-height: 1.9;
      opacity: 0.94;
    }

    .compare-line {
      font-size: 13px;
      line-height: 1.9;
      opacity: 0.88;
    }

    .weekly-block {
      margin-top: 12px;
    }

    .weekly-row {
      margin-bottom: 16px;
    }

    .weekly-label {
      font-size: 13px;
      margin-bottom: 8px;
      opacity: 0.92;
    }

    .mini-bars {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      height: 74px;
    }

    .mini-bar {
      flex: 1;
      min-width: 0;
      border-radius: 10px 10px 6px 6px;
      opacity: 0.92;
    }

    .weekly-note {
      font-size: 12px;
      opacity: 0.72;
      margin-top: 8px;
    }

    .analysis-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .action-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 20px;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, #7a69ff, #5f9bff);
      box-shadow: 0 12px 24px rgba(95,155,255,0.20);
    }

    .advice-list, .cbt-list {
      display: grid;
      gap: 10px;
      margin-top: 8px;
    }

    .advice-item, .cbt-item {
      padding: 14px;
      border-radius: 18px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.06);
      font-size: 14px;
      line-height: 1.85;
    }

    .pie-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
    }

    #pieChart {
      width: 100%;
      max-width: 280px;
      aspect-ratio: 1 / 1;
      background: rgba(255,255,255,0.04);
      border-radius: 50%;
    }

    .pie-legend {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 10px;
      margin-top: 6px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      opacity: 0.95;
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ===== 設定タブ ===== */
    .settings-inline {
      display: grid;
      gap: 14px;
    }

    .setting-card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 14px 28px rgba(0,0,0,0.18);
      backdrop-filter: blur(8px);
      border-radius: 26px;
      padding: 18px;
    }

    .setting-row {
      margin-bottom: 16px;
    }

    .setting-label {
      font-size: 15px;
      opacity: 0.95;
      margin-bottom: 8px;
      display: block;
      line-height: 1.6;
    }

    .setting-input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 18px;
      border: none;
      font-size: 17px;
      outline: none;
    }

    .toggle-btn, .danger-btn, .save-btn, .voice-chip {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 18px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
      color: white;
    }

    .toggle-btn {
      background: #5f5470;
    }

    .danger-btn {
      background: #8a3d57;
    }

    .save-btn {
      background: linear-gradient(135deg, #7a69ff, #5f9bff);
    }

    .hint {
      font-size: 13px;
      opacity: 0.72;
      margin-top: 6px;
      line-height: 1.6;
    }

    .voice-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .voice-chip {
      padding: 12px 10px;
      font-size: 15px;
      background: rgba(255,255,255,0.1);
      margin-top: 0;
    }

    .voice-chip.active {
      background: linear-gradient(135deg, #7a69ff, #5f9bff);
    }

    /* ===== アニメ ===== */
    .speaking {
      animation: pulseTalk 0.75s infinite ease-in-out;
    }

    .face-change {
      animation: facePop 0.25s ease;
    }

    @keyframes pulseTalk {
      0%   { transform: scale(1) translateY(0px); }
      25%  { transform: scale(1.01) translateY(-1px); }
      50%  { transform: scale(1.02) translateY(0px); }
      75%  { transform: scale(1.01) translateY(-1px); }
      100% { transform: scale(1) translateY(0); }
    }

    @keyframes facePop {
      0%   { transform: scale(0.97); opacity: 0.75; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ===== 旧モーダル（残す） ===== */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 999;
      padding: 18px;
    }

    .modal.show {
      display: flex;
    }

    .modal-box {
      width: 100%;
      max-width: 420px;
      max-height: 88vh;
      overflow-y: auto;
      background: #2a2236;
      border-radius: 28px;
      padding: 22px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.45);
    }

    .modal-title {
      font-size: 26px;
      font-weight: bold;
      color: #ffd1e6;
      margin-bottom: 18px;
    }

    @media (max-width: 430px) {
      .top-character {
        flex: 0 0 28vh;
        min-height: 190px;
      }

      .settings-open {
        width: 62px;
        height: 62px;
        font-size: 26px;
      }

      .input-area {
        grid-template-columns: 1fr 74px 92px;
      }

      .mic-btn {
        width: 74px;
        height: 64px;
        font-size: 26px;
      }

      .send-btn {
        width: 92px;
        height: 64px;
        font-size: 19px;
      }

      .voice-grid {
        grid-template-columns: 1fr;
      }

      .animal-emoji {
        font-size: 66px;
      }

      .animal-name {
        font-size: 18px;
      }

      .main-tab-btn {
        min-height: 86px;
        border-radius: 22px;
      }

      .main-tab-icon {
        font-size: 30px;
      }

      .main-tab-label {
        font-size: 14px;
      }

      .section-title {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="app">

    <!-- 上 -->
    <div class="top-character">
      <img id="mainGirl" src="girl-normal.jpg" alt="美咲">
      <button class="settings-open" onclick="openSettings()">⚙</button>
    </div>

    <!-- メイン領域 -->
    <div class="main-panels">

      <!-- 会話タブ -->
      <div class="panel active" id="chatPanel">
        <div class="chat-section">
          <div id="chatBox"></div>
        </div>

        <div class="status-bar" id="statusBar">準備OK</div>

        <div class="input-area">
          <input type="text" id="userInput" placeholder="何か話してみて…" />
          <button class="mic-btn" id="micBtn" onclick="startVoiceInput()">🎤</button>
          <button class="send-btn" onclick="sendMessage()">送信</button>
        </div>
      </div>

      <!-- 分析タブ -->
      <div class="panel" id="analysisTabPanel">
        <div class="panel-scroll">
          <div class="glass-card">
            <div class="section-title">📊 分析を見る</div>
            <div class="analysis-actions">
              <button class="action-btn" onclick="analyzeCurrentConversation()">今の会話から分析する</button>
            </div>
            <div class="analysis-text">
              会話から今のこころの状態を見える化します。<br>
              動物タイプ・棒グラフ・円グラフ・比較・行動アドバイス・気持ちの整理まで表示します。
            </div>
          </div>

          <div id="analysisContent"></div>
        </div>
      </div>

      <!-- 設定タブ -->
      <div class="panel" id="settingsTabPanel">
        <div class="panel-scroll">
          <div class="settings-inline">

            <div class="setting-card">
              <div class="section-title">⚙ 設定</div>

              <div class="setting-row">
                <label class="setting-label">あなたの呼び名（時々呼ぶ）</label>
                <input class="setting-input" id="userNameInput" placeholder="だいすけ">
              </div>

              <div class="setting-row">
                <label class="setting-label">キャラ名</label>
                <input class="setting-input" id="nameInput" placeholder="美咲">
              </div>

              <div class="setting-row">
                <label class="setting-label">OpenAI APIキー（※保存しません）</label>
                <input class="setting-input" id="apiKeyInput" type="password" placeholder="sk-..." />
                <div class="hint">再起動すると空になります。会話履歴は残ります。</div>
              </div>

              <div class="setting-row">
                <label class="setting-label">ElevenLabs APIキー（※保存しません）</label>
                <input class="setting-input" id="elevenApiKeyInput" type="password" placeholder="sk_..." />
                <div class="hint">自然音声を使う時だけ入力します。再起動で消えます。</div>
              </div>

              <div class="setting-row">
                <label class="setting-label">Voice ID（※保存しません）</label>
                <input class="setting-input" id="voiceIdInput" type="text" placeholder="wcs09USXSN5Bl7FXohVZ" />
                <div class="hint">ElevenLabsの声ID。再起動で消えます。</div>
              </div>

              <div class="setting-row">
                <label class="setting-label">音声エンジン</label>
                <select class="setting-input" id="voiceEngineSelect">
                  <option value="standard">スマホ標準音声</option>
                  <option value="eleven">ElevenLabs音声</option>
                </select>
              </div>

              <div class="setting-row">
                <label class="setting-label">会話モード</label>
                <select class="setting-input" id="talkModeSelect">
                  <option value="listen">💗 話を聞く</option>
                  <option value="organize">🧠 気持ちを整理する</option>
                  <option value="analyze">📊 分析する</option>
                  <option value="free">🌙 自由に話す</option>
                </select>
                <div class="hint">分析は下の「分析」タブからいつでも見られます</div>
              </div>

              <div class="setting-row">
                <label class="setting-label">比較する分析履歴</label>
                <select class="setting-input" id="compareDepthSelect">
                  <option value="1">前回と比較</option>
                  <option value="2">2回前と比較</option>
                  <option value="3">3回前と比較</option>
                  <option value="4">4回前と比較</option>
                  <option value="5">5回前と比較</option>
                </select>
                <div class="hint">分析タブの比較対象です</div>
              </div>

              <div class="setting-row">
                <label class="setting-label">声の簡単切り替え（ボタン）</label>
                <div class="voice-grid">
                  <button class="voice-chip" id="voiceChipGentle" onclick="setVoicePreset('gentle')">優しい</button>
                  <button class="voice-chip" id="voiceChipBright" onclick="setVoicePreset('bright')">明るい</button>
                  <button class="voice-chip" id="voiceChipCalm" onclick="setVoicePreset('calm')">落ち着き</button>
                </div>
                <div class="hint">押すと Voice ID 欄に反映されます。必要なら上書きしてOK。</div>
              </div>

              <button class="save-btn" onclick="saveSettings()">💾 保存する</button>
              <button class="toggle-btn" id="gptToggle" onclick="toggleGPT()">🤖 GPT OFF</button>
              <button class="toggle-btn" id="voiceToggle" onclick="toggleVoice()">🔊 音声ON</button>
              <button class="toggle-btn" id="elevenToggle" onclick="toggleElevenVoice()">🎙 Eleven音声OFF</button>
              <button class="danger-btn" onclick="resetMemory()">記憶をリセット</button>
            </div>

          </div>
        </div>
      </div>
    </div>

    <!-- 下3タブ -->
    <div class="main-tabs">
      <button class="main-tab-btn active" id="tabBtnChat" onclick="switchMainTab('chat')">
        <div class="main-tab-icon">💬</div>
        <div class="main-tab-label">会話</div>
      </button>

      <button class="main-tab-btn" id="tabBtnAnalysis" onclick="switchMainTab('analysis')">
        <div class="main-tab-icon">📊</div>
        <div class="main-tab-label">分析</div>
      </button>

      <button class="main-tab-btn" id="tabBtnSettings" onclick="switchMainTab('settings')">
        <div class="main-tab-icon">⚙</div>
        <div class="main-tab-label">設定</div>
      </button>
    </div>
  </div>

  <!-- 旧モーダル（保険で残す） -->
  <div class="modal" id="settingsModal">
    <div class="modal-box">
      <div class="modal-title">設定</div>
      <div class="analysis-text">今は下の「設定」タブから変更できます。</div>
      <button class="save-btn" onclick="closeSettings()">閉じる</button>
    </div>
  </div>

  <script>
    // =========================
    // DOM
    // =========================
    const chatBox = document.getElementById("chatBox");
    const userInput = document.getElementById("userInput");
    const mainGirl = document.getElementById("mainGirl");
    const settingsModal = document.getElementById("settingsModal");
    const voiceToggleBtn = document.getElementById("voiceToggle");
    const gptToggleBtn = document.getElementById("gptToggle");
    const nameInput = document.getElementById("nameInput");
    const userNameInput = document.getElementById("userNameInput");
    const apiKeyInput = document.getElementById("apiKeyInput");
    const elevenApiKeyInput = document.getElementById("elevenApiKeyInput");
    const voiceIdInput = document.getElementById("voiceIdInput");
    const voiceEngineSelect = document.getElementById("voiceEngineSelect");
    const statusBar = document.getElementById("statusBar");
    const micBtn = document.getElementById("micBtn");
    const talkModeSelect = document.getElementById("talkModeSelect");
    const compareDepthSelect = document.getElementById("compareDepthSelect");
    const analysisContent = document.getElementById("analysisContent");

    // タブ
    const chatPanel = document.getElementById("chatPanel");
    const analysisTabPanel = document.getElementById("analysisTabPanel");
    const settingsTabPanel = document.getElementById("settingsTabPanel");
    const tabBtnChat = document.getElementById("tabBtnChat");
    const tabBtnAnalysis = document.getElementById("tabBtnAnalysis");
    const tabBtnSettings = document.getElementById("tabBtnSettings");

    // =========================
    // 状態
    // =========================
    let voiceEnabled = localStorage.getItem("voiceEnabled") !== "false";
    let gptEnabled = localStorage.getItem("gptEnabled") === "true";
    let elevenVoiceEnabled = localStorage.getItem("elevenVoiceEnabled") === "true";
    let voiceEngine = localStorage.getItem("voiceEngine") || "standard";
    let selectedVoicePreset = localStorage.getItem("selectedVoicePreset") || "";
    let talkMode = localStorage.getItem("talkMode") || "listen";
    let compareDepth = parseInt(localStorage.getItem("compareDepth") || "1", 10);
    let availableVoices = [];
    let recognition = null;
    let isListening = false;
    let isSpeaking = false;
    let lastBotReply = "";
    let currentMainTab = "chat";

    // ===== APIキーは保存しない =====
    let sessionSecrets = {
      apiKey: "",
      elevenApiKey: "",
      voiceId: ""
    };

    let memory = {
      characterName: localStorage.getItem("characterName") || "美咲",
      userName: localStorage.getItem("userNickName") || "",
      mood: localStorage.getItem("hostess_mood") || "",
      topic: localStorage.getItem("hostess_topic") || "",
      lastMessage: localStorage.getItem("hostess_lastMessage") || "",
      visitCount: parseInt(localStorage.getItem("hostess_visitCount") || "0", 10),
      chatHistory: JSON.parse(localStorage.getItem("hostess_chatHistory") || "[]"),

      currentFeeling: localStorage.getItem("hostess_currentFeeling") || "",
      currentNeed: localStorage.getItem("hostess_currentNeed") || "",
      unresolvedTopic: localStorage.getItem("hostess_unresolvedTopic") || "",
      lastBotQuestion: localStorage.getItem("hostess_lastBotQuestion") || ""
    };

    memory.visitCount += 1;
    localStorage.setItem("hostess_visitCount", memory.visitCount);

    nameInput.value = memory.characterName;
    userNameInput.value = memory.userName;

    // API系は毎回空
    apiKeyInput.value = "";
    elevenApiKeyInput.value = "";
    voiceIdInput.value = "";
    voiceEngineSelect.value = voiceEngine;
    talkModeSelect.value = talkMode;
    compareDepthSelect.value = String(compareDepth);

    updateVoiceButton();
    updateGPTButton();
    updateElevenButton();
    updateVoicePresetButtons();

    const faceImages = {
      normal: "girl-normal.jpg",
      worried: "girl-worried.png",
      sympathy: "girl-sympathy.png",
      troubled: "girl-troubled.png",
      healing: "girl-healing.png",
      happy: "girl-happy.png",
      irritated: "girl-irritated.png",
      panic: "girl-panic.png",
      exhausted: "girl-exhausted.png"
    };

    const moodBackgrounds = {
      normal: "linear-gradient(to bottom, #2b314d, #09111f)",
      worried: "linear-gradient(to bottom, #3f4c6b, #151d2b)",
      sympathy: "linear-gradient(to bottom, #4a3b60, #161626)",
      troubled: "linear-gradient(to bottom, #4c4b67, #151b28)",
      healing: "linear-gradient(to bottom, #5b4767, #171629)",
      happy: "linear-gradient(to bottom, #485f8b, #12203b)",
      irritated: "linear-gradient(to bottom, #5f3a4f, #1a111b)",
      panic: "linear-gradient(to bottom, #5a5068, #181724)",
      exhausted: "linear-gradient(to bottom, #4b5165, #121926)"
    };

    // ===== 声プリセット =====
    const voicePresets = {
      gentle: "wcs09USXSN5Bl7FXohVZ",
      bright: "21m00Tcm4TlvDq8ikWAM",
      calm: "AZnzlk1XvdvUeBnXmlld"
    };

    function getAutoVoiceIdByMood() {
      if (memory.mood === "happy") return voicePresets.bright;
      if (memory.mood === "sympathy" || memory.mood === "healing" || memory.mood === "exhausted") return voicePresets.gentle;
      if (memory.mood === "worried" || memory.mood === "panic" || memory.mood === "troubled") return voicePresets.calm;
      return voiceIdInput.value.trim() || sessionSecrets.voiceId || voicePresets.gentle;
    }

    function setStatus(text) {
      statusBar.textContent = text;
    }

    // =========================
    // 顔切り替え（GPT ONでも確実に切替）
    // =========================
    function setFace(type = "normal") {
      const mood = faceImages[type] ? type : "normal";
      const src = faceImages[mood];
      document.body.style.background = moodBackgrounds[mood] || moodBackgrounds.normal;

      // 画像切替の確実化
      const bust = src.includes("?") ? "&" : "?";
      mainGirl.src = src + bust + "t=" + Date.now();

      mainGirl.classList.remove("face-change");
      void mainGirl.offsetWidth;
      mainGirl.classList.add("face-change");
    }

    function startSpeakingAnimation() {
      mainGirl.classList.add("speaking");
      isSpeaking = true;
    }

    function stopSpeakingAnimation() {
      mainGirl.classList.remove("speaking");
      isSpeaking = false;
    }

    function openSettings() {
      switchMainTab("settings");
    }

    function closeSettings() {
      settingsModal.classList.remove("show");
    }

    function saveSettings() {
      memory.characterName = nameInput.value.trim() || "美咲";
      memory.userName = userNameInput.value.trim();

      sessionSecrets.apiKey = apiKeyInput.value.trim();
      sessionSecrets.elevenApiKey = elevenApiKeyInput.value.trim();
      sessionSecrets.voiceId = voiceIdInput.value.trim();

      voiceEngine = voiceEngineSelect.value;
      localStorage.setItem("voiceEngine", voiceEngine);

      talkMode = talkModeSelect.value;
      localStorage.setItem("talkMode", talkMode);

      compareDepth = parseInt(compareDepthSelect.value || "1", 10);
      localStorage.setItem("compareDepth", String(compareDepth));

      localStorage.setItem("characterName", memory.characterName);
      localStorage.setItem("userNickName", memory.userName);

      addMessage("設定を保存したよ😊", "bot");
      setStatus("設定を保存しました（APIキーは今回だけ有効）");
      switchMainTab("chat");
    }

    function toggleVoice() {
      voiceEnabled = !voiceEnabled;
      localStorage.setItem("voiceEnabled", voiceEnabled);
      updateVoiceButton();

      if (!voiceEnabled && ("speechSynthesis" in window)) {
        window.speechSynthesis.cancel();
        stopSpeakingAnimation();
      }
    }

    function toggleGPT() {
      gptEnabled = !gptEnabled;
      localStorage.setItem("gptEnabled", gptEnabled);
      updateGPTButton();
      setStatus(gptEnabled ? "GPT接続ON" : "GPT接続OFF");
    }

    function toggleElevenVoice() {
      elevenVoiceEnabled = !elevenVoiceEnabled;
      localStorage.setItem("elevenVoiceEnabled", elevenVoiceEnabled);
      updateElevenButton();
      setStatus(elevenVoiceEnabled ? "Eleven音声ON" : "Eleven音声OFF");
    }

    function updateVoiceButton() {
      voiceToggleBtn.textContent = voiceEnabled ? "🔊 音声ON" : "🔇 音声OFF";
    }

    function updateGPTButton() {
      gptToggleBtn.textContent = gptEnabled ? "🤖 GPT ON" : "🤖 GPT OFF";
    }

    function updateElevenButton() {
      const btn = document.getElementById("elevenToggle");
      if (btn) {
        btn.textContent = elevenVoiceEnabled ? "🎙 Eleven音声ON" : "🎙 Eleven音声OFF";
      }
    }

    function setVoicePreset(type) {
      selectedVoicePreset = type;
      localStorage.setItem("selectedVoicePreset", selectedVoicePreset);

      if (voicePresets[type]) {
        voiceIdInput.value = voicePresets[type];
        sessionSecrets.voiceId = voicePresets[type];
        setStatus("Voice ID を切り替えました");
      }

      updateVoicePresetButtons();
    }

    function updateVoicePresetButtons() {
      ["gentle", "bright", "calm"].forEach(type => {
        const idMap = {
          gentle: "voiceChipGentle",
          bright: "voiceChipBright",
          calm: "voiceChipCalm"
        };
        const btn = document.getElementById(idMap[type]);
        if (!btn) return;
        btn.classList.toggle("active", selectedVoicePreset === type);
      });
    }

    function resetMemory() {
      localStorage.removeItem("hostess_mood");
      localStorage.removeItem("hostess_topic");
      localStorage.removeItem("hostess_lastMessage");
      localStorage.removeItem("hostess_visitCount");
      localStorage.removeItem("hostess_chatHistory");
      localStorage.removeItem("hostess_currentFeeling");
      localStorage.removeItem("hostess_currentNeed");
      localStorage.removeItem("hostess_unresolvedTopic");
      localStorage.removeItem("hostess_lastBotQuestion");
      localStorage.removeItem("analysisHistory");

      memory.mood = "";
      memory.topic = "";
      memory.lastMessage = "";
      memory.visitCount = 1;
      memory.chatHistory = [];
      memory.currentFeeling = "";
      memory.currentNeed = "";
      memory.unresolvedTopic = "";
      memory.lastBotQuestion = "";

      analysisContent.innerHTML = "";
      addMessage("記憶をリセットしたよ😊\nまた最初からゆっくり話そう。", "bot");
      setFace("healing");
      setStatus("記憶をリセットしました");
      switchMainTab("chat");
    }

    function loadVoices() {
      if (!("speechSynthesis" in window)) return;
      availableVoices = window.speechSynthesis.getVoices();
    }

    if ("speechSynthesis" in window) {
      loadVoices();
      window.speechSynthesis.onvoiceschanged = loadVoices;
    }

    document.body.addEventListener("click", unlockSpeech, { once: false });
    document.body.addEventListener("touchstart", unlockSpeech, { once: false });

    function unlockSpeech() {
      try {
        if (!("speechSynthesis" in window)) return;
        const synth = window.speechSynthesis;
        const u = new SpeechSynthesisUtterance(" ");
        u.volume = 0;
        synth.speak(u);
      } catch (e) {}
    }

    setTimeout(() => {
      setFace("normal");
      botReply(getWelcomeMessage(), true);
    }, 700);

    function getWelcomeMessage() {
      const name = memory.characterName || "美咲";
      const user = memory.userName ? `${memory.userName}さん、` : "";

      if (memory.visitCount >= 2 && memory.currentFeeling === "tired") {
        return `${user}${name}だよ😊\n前もちょっとしんどそうだったよね。\n今日は昨日よりきつい感じある？`;
      }

      if (memory.visitCount >= 2 && memory.currentFeeling === "anxious") {
        return `${user}${name}だよ😊\n前もちょっと不安そうだったよね。\n今日は少し落ち着いてる？`;
      }

      if (memory.visitCount >= 2 && memory.currentFeeling === "sad") {
        return `${user}${name}だよ😊\n前もちょっと心が沈んでる感じあったよね。\n今日はどんな感じ？`;
      }

      return `${user}${name}だよ😊\n今日はどんな感じだった？`;
    }

    function addMessage(text, sender, extraClass = "") {
      const msg = document.createElement("div");
      msg.className = `message ${sender} ${extraClass}`;

      if (sender === "bot" && /<[^>]+>/.test(text)) {
        msg.innerHTML = text;
      } else {
        msg.textContent = text;
      }

      chatBox.appendChild(msg);
      chatBox.scrollTop = chatBox.scrollHeight;
      return msg;
    }

    function botReply(text, isWelcome = false) {
      lastBotReply = text;
      addMessage(text, "bot");
      saveChat("assistant", text);
      speakText(text, isWelcome);
    }

    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;

      if (window.speechSynthesis) {
        window.speechSynthesis.cancel();
      }
      stopSpeakingAnimation();

      addMessage(text, "user");
      saveChat("user", text);
      userInput.value = "";

      const typingMsg = addMessage("…入力中", "bot", "typing");

      try {
        let reply = "";

        if (gptEnabled && sessionSecrets.apiKey) {
          setStatus("GPTで考え中…");
          reply = await generateGPTReply(text);
        } else {
          setStatus("寄り添い返答中…");
          reply = generateLocalReply(text);
        }

        typingMsg.remove();
        botReply(reply);

        // analyzeモード時は自動更新もする（でも表示は分析タブ）
        if (talkMode === "analyze") {
          analyzeCurrentConversation(false);
        }

        setStatus("準備OK");
      } catch (e) {
        console.error(e);
        typingMsg.remove();
        const fallback = generateLocalReply(text);
        botReply(fallback);

        if (talkMode === "analyze") {
          analyzeCurrentConversation(false);
        }

        setStatus("GPT失敗 → ローカル返答");
      }
    }

    userInput.addEventListener("keypress", e => {
      if (e.key === "Enter") sendMessage();
    });

    function saveChat(role, content) {
      memory.chatHistory.push({ role, content });
      if (memory.chatHistory.length > 30) {
        memory.chatHistory = memory.chatHistory.slice(-30);
      }
      localStorage.setItem("hostess_chatHistory", JSON.stringify(memory.chatHistory));
    }

    function rememberUserInfo(text, lower) {
      memory.lastMessage = text;

      if (containsAny(lower, ["仕事", "会社", "上司", "職場", "残業"])) {
        memory.topic = "work";
      } else if (containsAny(lower, ["家族", "子ども", "娘", "息子"])) {
        memory.topic = "family";
      } else if (containsAny(lower, ["不安", "眠れない", "寝れない"])) {
        memory.topic = "anxiety";
      } else if (containsAny(lower, ["体調", "病院", "不調"])) {
        memory.topic = "health";
      }

      saveMemory();
    }

    function saveMemory() {
      localStorage.setItem("hostess_mood", memory.mood || "");
      localStorage.setItem("hostess_topic", memory.topic || "");
      localStorage.setItem("hostess_lastMessage", memory.lastMessage || "");
      localStorage.setItem("hostess_currentFeeling", memory.currentFeeling || "");
      localStorage.setItem("hostess_currentNeed", memory.currentNeed || "");
      localStorage.setItem("hostess_unresolvedTopic", memory.unresolvedTopic || "");
      localStorage.setItem("hostess_lastBotQuestion", memory.lastBotQuestion || "");
    }

    function containsAny(text, words) {
      return words.some(word => text.includes(word.toLowerCase()));
    }

    function pick(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function maybeCallUserName() {
      if (!memory.userName) return "";
      return Math.random() < 0.35 ? `${memory.userName}さん、` : "";
    }

    function analyzeContext(text) {
      const lower = text.toLowerCase();

      if (containsAny(lower, ["悲しい", "泣きたい", "寂しい", "つらい", "苦しい"])) {
        memory.currentFeeling = "sad";
      } else if (containsAny(lower, ["不安", "こわい", "怖い", "心配"])) {
        memory.currentFeeling = "anxious";
      } else if (containsAny(lower, ["イライラ", "むかつく", "腹立つ"])) {
        memory.currentFeeling = "angry";
      } else if (containsAny(lower, ["疲れた", "しんどい", "無理", "限界"])) {
        memory.currentFeeling = "tired";
      }

      if (containsAny(lower, ["聞いて", "つらい", "悲しい", "しんどい"])) {
        memory.currentNeed = "empathy";
      } else if (containsAny(lower, ["どうしたら", "どうすれば", "わからない", "困る"])) {
        memory.currentNeed = "guidance";
      } else if (containsAny(lower, ["寂しい", "ひとり", "会いたい"])) {
        memory.currentNeed = "connection";
      }

      if (containsAny(lower, ["仕事", "会社", "上司", "職場"])) {
        memory.unresolvedTopic = "work";
      } else if (containsAny(lower, ["家族", "娘", "息子", "子ども"])) {
        memory.unresolvedTopic = "family";
      } else if (containsAny(lower, ["体調", "病院", "不調"])) {
        memory.unresolvedTopic = "health";
      } else if (containsAny(lower, ["人間関係", "友達", "恋愛"])) {
        memory.unresolvedTopic = "relationship";
      }

      saveMemory();
    }

    function generateLocalReply(text) {
      const t = text.trim();
      const lower = t.toLowerCase();

      rememberUserInfo(t, lower);
      analyzeContext(t);

      const callName = maybeCallUserName();

      const shortReply = t.length <= 12;
      const seemsAnswerToPrevious =
        shortReply ||
        containsAny(lower, ["そう", "うん", "違う", "いや", "たぶん", "少し", "まあ", "うーん"]);

      if (containsAny(lower, ["悲しい", "泣きたい", "寂しい", "孤独", "なんだか悲しくなる"])) {
        setFace("sympathy");
        memory.mood = "sympathy";
        memory.currentFeeling = "sad";
        memory.currentNeed = "empathy";
        memory.lastBotQuestion = "その気持ちは何がきっかけで出てきたの？";
        saveMemory();

        return pick([
          `${callName}そっか…。\nそれ、静かにしんどくなる感じだよね。\n無理に元気にしなくていいよ。\n何かあった後からそうなった感じ？`,
          `${callName}うん…その言い方、かなり我慢してる感じがする。\nちゃんとここで弱っていいよ。\n今日は何が一番心に残ってる？`,
          `${callName}なんだか悲しくなる時って、理由がはっきりしないぶん余計つらいよね。\n今は、気持ちに近い？体の疲れに近い？`
        ]);
      }

      if (containsAny(lower, ["不安", "こわい", "怖い", "心配", "どうしよう"])) {
        setFace("worried");
        memory.mood = "panic";
        memory.currentFeeling = "anxious";
        memory.currentNeed = "empathy";
        memory.lastBotQuestion = "今いちばん不安なのは何？";
        saveMemory();

        return pick([
          `${callName}不安がずっと頭の中にある感じかな…。\nそれ、かなり消耗するよね。\n今いちばん引っかかってることって何？`,
          `${callName}それは落ち着かないよね…。\n一人で抱えるとどんどん膨らむやつだと思う。\n今、何が一番こわい？`,
          `${callName}その不安、ちゃんと理由がある感じ？\nそれとも、なんとなく気持ちが落ち着かない感じかな？`
        ]);
      }

      if (containsAny(lower, ["疲れた", "しんどい", "限界", "無理", "へとへと", "きつい"])) {
        setFace("exhausted");
        memory.mood = "exhausted";
        memory.currentFeeling = "tired";
        memory.currentNeed = "empathy";
        memory.lastBotQuestion = "何で一番すり減った？";
        saveMemory();

        return pick([
          `${callName}かなり削られてる感じあるね…。\n今日はもう頑張った側だと思うよ。\n何で一番すり減った？`,
          `${callName}しんどい時って、気持ちも体も両方重くなるよね。\n今はどっちが強い？体？気持ち？`,
          `${callName}限界寄りっぽいね…。\nここではちゃんと弱音吐いていいよ。\n今日いちばんきつかった場面ってどこ？`
        ]);
      }

      if (containsAny(lower, ["イライラ", "むかつく", "腹立つ", "うざい"])) {
        setFace("irritated");
        memory.mood = "irritated";
        memory.currentFeeling = "angry";
        memory.currentNeed = "empathy";
        memory.lastBotQuestion = "何が一番引っかかった？";
        saveMemory();

        return pick([
          `${callName}それはかなり引っかかるよね。\nちゃんと嫌だったって感覚、大事だよ。\n何が一番ムカッとした？`,
          `${callName}うん、それ腹立つやつだと思う。\n我慢して流すより、一回言葉にした方が楽になるかも。\nどこが一番嫌だった？`,
          `${callName}イラッとした時って、実は傷ついてる時もあるんだよね。\n今回は怒り寄り？それとも悲しい寄り？`
        ]);
      }

      if (containsAny(lower, ["困る", "迷う", "わからない", "悩む"])) {
        setFace("troubled");
        memory.mood = "troubled";
        memory.currentNeed = "guidance";
        memory.lastBotQuestion = "どこで一番止まってる？";
        saveMemory();

        return pick([
          `${callName}それ、簡単に決められないやつだね…。\n一緒に整理していこうか。\nどこで一番止まってる？`,
          `${callName}悩みが大きいと、何から考えればいいか分からなくなるよね。\n今いちばん困ってる一点だけ出すなら何？`,
          `${callName}うん、そこ迷うの自然だよ。\n答えを急がなくていいから、まず気持ちから並べてみよっか。`
        ]);
      }

      if (containsAny(lower, ["癒して", "安心したい", "甘えたい"])) {
        setFace("healing");
        memory.mood = "healing";
        memory.currentNeed = "connection";
        memory.lastBotQuestion = "今日はどんなふうに過ごしたい？";
        saveMemory();

        return pick([
          `${callName}いいよ😊\n今日は少し守られる側でいよう。\n無理にちゃんとしなくて大丈夫。`,
          `${callName}うん、今日は安心する方を優先しようか。\nここでは力抜いていいよ。`,
          `${callName}そういう日、あるよね。\n今日はがんばる日じゃなくて、ほどく日でもいいと思うよ。`
        ]);
      }

      if (containsAny(lower, ["嬉しい", "好き", "よかった", "助かった"])) {
        setFace("happy");
        memory.mood = "happy";
        memory.currentNeed = "connection";
        memory.lastBotQuestion = "それ、どんな時にそう思えたの？";
        saveMemory();

        return pick([
          `${callName}それ聞けてちょっと嬉しい😊\n少しでも気持ちが軽くなってたらいいな。`,
          `${callName}ふふ、そういうのいいね。\nちゃんと気持ちがやわらいだ感じする。`,
          `${callName}よかった。\nそういう瞬間って、意外と大事なんだよね。`
        ]);
      }

      if (seemsAnswerToPrevious && memory.lastBotQuestion) {
        setFace(memory.mood || "normal");
        saveMemory();

        if (memory.currentFeeling === "sad") {
          return pick([
            `${callName}うん…その流れだったんだね。\nそれなら気持ちが沈むのも自然だと思う。\nそのあと、一人で抱え込んでた？`,
            `${callName}そっか…ちゃんとつながった。\nそれ、心の中でじわじわ効いてた感じかもしれないね。\n今もまだ残ってる？`
          ]);
        }

        if (memory.currentFeeling === "anxious") {
          return pick([
            `${callName}なるほど…それが不安の中心なんだね。\n分かると少し整理しやすくなる。\n一番悪い想像までいくと、何が怖い？`,
            `${callName}うん、その部分が引っかかってたのか。\nそれなら落ち着かないのも無理ないよ。\n今すぐできることはありそう？`
          ]);
        }

        if (memory.currentFeeling === "tired") {
          return pick([
            `${callName}そっか…そこが一番重かったんだね。\nそれはかなり消耗すると思う。\n今、少し休めそう？`,

          ]);
        }

        if (memory.currentFeeling === "angry") {
          return pick([
            `${callName}うん、それは引っかかるよね。\n怒るの当然だと思う。\n本当はどうしてほしかった？`,
            `${callName}なるほど…そこか。\nその嫌さ、ちゃんと言葉にできてるの大事だよ。\nまだモヤモヤ残ってる？`
          ]);
        }
      }

      setFace("normal");
      memory.mood = "normal";
      memory.lastBotQuestion = "もう少し詳しく話せそう？";
      saveMemory();

      return pick([
        `${callName}うん、ちゃんと聞いてるよ。\nもう少し詳しく話せそう？`,
        `${callName}なるほど…。\nその続き、もう少し聞いてもいい？`,

    async function generateGPTReply(userText) {
      const lower = userText.toLowerCase();
      rememberUserInfo(userText, lower);
      analyzeContext(userText);

      const recentHistory = memory.chatHistory.slice(-12).map(item => ({

      const messages = [

        throw new Error("GPT API error");

      const data = await res.json();

    function applyEmotionFromReply(text) {
      let mood = "normal";
      let cleaned = text;

      const tags = ["happy", "healing", "worried", "sympathy", "troubled", "irritated", "panic", "exhausted", "normal"];

      for (const tag of tags) {
        const pattern = new RegExp(`^\\[${tag}\\]\\s*`, "i");
        if (pattern.test(cleaned)) {
          mood = tag;
          cleaned = cleaned.replace(pattern, "");
          break;
        }
      }

      memory.mood = mood;
      saveMemory();

      // GPT ONでも確実に画像切替
      setTimeout(() => {
        setFace(mood);
      }, 10);

      return cleaned;
    }

    function getVoiceStyleByMood(mood) {
      switch (mood) {
        case "happy":
          return { rate: 0.97, pitch: 1.18 };
        case "healing":
          return { rate: 0.87, pitch: 1.12 };
        case "sympathy":
          return { rate: 0.86, pitch: 1.06 };
        case "exhausted":
          return { rate: 0.84, pitch: 1.02 };
        case "panic":
          return { rate: 0.91, pitch: 1.10 };
        case "irritated":
          return { rate: 0.90, pitch: 0.98 };
        case "troubled":
          return { rate: 0.88, pitch: 1.03 };
        default:
          return { rate: 0.92, pitch: 1.08 };
      }
    }

    async function speakText(text, isWelcome = false) {
      if (!voiceEnabled) return;

      const cleanText = text
        .replace(/\n/g, "。")
        .replace(/😊|♡|✨|😌|😢|🥺|😳|💦|💭/g, "")
        .replace(/…/g, "、")
        .trim();

      if (!cleanText) return;

      const engine = voiceEngineSelect.value || voiceEngine || "standard";

      if (
        engine === "eleven" &&
        elevenVoiceEnabled &&
        sessionSecrets.elevenApiKey
      ) {
        try {
          setStatus("Eleven音声で話してるよ…");
          startSpeakingAnimation();

          const autoVoiceId = getAutoVoiceIdByMood();
          const currentVoiceId = voiceIdInput.value.trim() || sessionSecrets.voiceId || autoVoiceId;

          const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${currentVoiceId}`, {
            method: "POST",
            headers: {
              "xi-api-key": sessionSecrets.elevenApiKey,
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              text: cleanText,
              model_id: "eleven_multilingual_v2",
              voice_settings: {
                stability: 0.55,
                similarity_boost: 0.78
              }
            })
          });

          if (!res.ok) {
            throw new Error("ElevenLabs error");
          }

          const blob = await res.blob();
          const audioUrl = URL.createObjectURL(blob);
          const audio = new Audio(audioUrl);

          audio.onended = () => {
            stopSpeakingAnimation();
            setStatus("準備OK");
            URL.revokeObjectURL(audioUrl);
          };

          audio.onerror = () => {
            stopSpeakingAnimation();
            setStatus("Eleven音声エラー → 標準音声へ");
            URL.revokeObjectURL(audioUrl);
            fallbackSpeech(cleanText, isWelcome);
          };

          await audio.play();
          return;

        } catch (e) {
          console.error("Eleven音声失敗", e);
          stopSpeakingAnimation();
          setStatus("Eleven音声失敗 → 標準音声へ");
          fallbackSpeech(cleanText, isWelcome);
          return;
        }
      }

      fallbackSpeech(cleanText, isWelcome);
    }

    function fallbackSpeech(cleanText, isWelcome = false) {
      if (!("speechSynthesis" in window)) {
        setStatus("この環境では音声非対応");
        return;
      }

      try {
        const synth = window.speechSynthesis;
        synth.cancel();

        const delay = isWelcome ? 600 : 220;

        setTimeout(() => {
          try {
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = "ja-JP";

            const voiceStyle = getVoiceStyleByMood(memory.mood);
            utterance.rate = voiceStyle.rate;
            utterance.pitch = voiceStyle.pitch;
            utterance.volume = 1.0;

            const voices = synth.getVoices();
            let preferredVoice =
              voices.find(v => v.lang && v.lang.includes("ja") && v.name.includes("Google")) ||
              voices.find(v => v.lang && v.lang.includes("ja"));

            if (preferredVoice) {
              utterance.voice = preferredVoice;
            }

            utterance.onstart = () => {
              startSpeakingAnimation();
              setStatus("話してるよ…");
            };

            utterance.onend = () => {
              stopSpeakingAnimation();
              setStatus("準備OK");
            };

            utterance.onerror = () => {
              stopSpeakingAnimation();
              setStatus("音声再生できませんでした");
            };

            synth.speak(utterance);
          } catch (err) {
            stopSpeakingAnimation();
            setStatus("音声エラー");
          }
        }, delay);

      } catch (e) {
        stopSpeakingAnimation();
        setStatus("音声エラー");
      }
    }

    function stopVoiceInput() {
      try {
        if (recognition) recognition.stop();
      } catch (e) {}
      isListening = false;
      micBtn.classList.remove("listening");
      setStatus("マイク停止");
    }

    function startVoiceInput() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

      if (!SpeechRecognition) {
        alert("この環境ではマイク入力が使えません。\n\nおすすめ:\n・Chromeで開く\n・GitHub Pagesで開く\n・HTTPSで開く");
        return;
      }

      if (isListening) {
        stopVoiceInput();
        return;
      }

      try {
        recognition = new SpeechRecognition();
        recognition.lang = "ja-JP";
        recognition.interimResults = false;
        recognition.continuous = false;
        recognition.maxAlternatives = 1;

        isListening = true;
        micBtn.classList.add("listening");
        setStatus("🎤 聞き取り中…話してください");

        recognition.onresult = (event) => {
          const transcript = event.results[0][0].transcript || "";
          userInput.value = transcript.trim();
          setStatus("音声入力OK → 送信中");
          setTimeout(() => {
            sendMessage();
          }, 350);
        };

        recognition.onerror = (event) => {
          if (event.error === "not-allowed") {
            setStatus("マイク許可が必要です");
            alert("マイクが拒否されています。\n\nChromeの設定でこのページのマイクを許可してください。");
          } else if (event.error === "no-speech") {
            setStatus("声が聞こえなかったみたい");
          } else if (event.error === "audio-capture") {
            setStatus("マイクが使えません");
          } else if (event.error === "network") {
            setStatus("音声認識ネットワークエラー");
          } else {
            setStatus("マイク入力失敗");
          }

          isListening = false;
          micBtn.classList.remove("listening");
        };

        recognition.onend = () => {
          isListening = false;
          micBtn.classList.remove("listening");
          if (statusBar.textContent.includes("聞き取り中")) {
            setStatus("準備OK");
          }
        };

        recognition.start();
      } catch (e) {
        isListening = false;
        micBtn.classList.remove("listening");
        setStatus("マイク起動失敗");
      }
    }

    function clamp(n, min, max) {
      return Math.max(min, Math.min(max, n));
    }

    function countMatches(text, words) {
      let score = 0;
      words.forEach(word => {
        if (text.includes(word)) score += 1;
      });
      return score;
    }

    function analyzeMentalState(text) {
      const lower = text.toLowerCase();

      const fatigueWords = ["疲れた", "しんどい", "きつい", "無理", "へとへと", "だるい", "消耗", "限界", "疲れる"];
      const anxietyWords = ["不安", "こわい", "怖い", "心配", "落ち着かない", "緊張", "どうしよう", "焦る"];
      const enduranceWords = ["頑張", "我慢", "大丈夫", "無理して", "耐え", "気を使", "ちゃんとしなきゃ"];
      const lonelinessWords = ["ひとり", "一人", "孤独", "寂しい", "さみしい", "分かってもらえない", "誰にも言えない"];
      const recoveryWords = ["落ち着いた", "安心", "少し楽", "眠れた", "休めた", "大丈夫そう", "軽くなった", "回復"];

      let fatigue = 18 + countMatches(lower, fatigueWords) * 14;
      let anxiety = 14 + countMatches(lower, anxietyWords) * 14;
      let endurance = 16 + countMatches(lower, enduranceWords) * 14;
      let loneliness = 10 + countMatches(lower, lonelinessWords) * 16;
      let recovery = 18 + countMatches(lower, recoveryWords) * 16;

      if (containsAny(lower, ["泣きたい", "つらい", "苦しい"])) {
        fatigue += 12;
        anxiety += 10;
      }

      if (containsAny(lower, ["イライラ", "むかつく", "腹立つ"])) {
        endurance += 8;
      }

      if (containsAny(lower, ["寝れない", "眠れない"])) {
        fatigue += 12;
        anxiety += 8;
        recovery -= 8;
      }

      fatigue = clamp(fatigue, 5, 95);
      anxiety = clamp(anxiety, 5, 95);
      endurance = clamp(endurance, 5, 95);
      loneliness = clamp(loneliness, 5, 95);
      recovery = clamp(recovery, 5, 95);

      const dominant = Math.max(fatigue, anxiety, endurance, loneliness, recovery);

      let animal = "🐱";
      let animalTitle = "安心不足ぎみのネコタイプ";
      let animalDesc = "ひとりで抱えやすく、安心できる距離感が必要な状態です。";

      if (dominant === fatigue) {
        animal = "🐢";
        animalTitle = "回復が必要なカメタイプ";
        animalDesc = "今は前に進むより、まず減らさないことが大事な状態です。";
      } else if (dominant === anxiety) {
        animal = "🐰";
        animalTitle = "気を張りやすいウサギタイプ";
        animalDesc = "頭と気持ちが休みにくく、警戒モードが続きやすい状態です。";
      } else if (dominant === endurance) {
        animal = "🐶";
        animalTitle = "がんばりすぎのイヌタイプ";
        animalDesc = "人に合わせたり、ちゃんとしようとしすぎて消耗しやすい流れです。";
      } else if (dominant === loneliness) {
        animal = "🐱";
        animalTitle = "安心を求めるネコタイプ";
        animalDesc = "解決より先に、わかってもらえる安心感が必要な状態です。";
      } else if (dominant === recovery) {
        animal = "🐬";
        animalTitle = "少し軽さが戻るイルカタイプ";
        animalDesc = "しんどさはありつつも、少しずつ回復の流れが出てきています。";
      }

      const summary = buildAnalysisSummary({ fatigue, anxiety, endurance, loneliness, recovery, animalTitle });
      const advice = buildActionAdvice({ fatigue, anxiety, endurance, loneliness, recovery });
      const cbt = buildCBTHints({ fatigue, anxiety, endurance, loneliness, recovery });

      return {
        fatigue,
        anxiety,
        endurance,
        loneliness,
        recovery,
        animal,
        animalTitle,
        animalDesc,
        summary,
        advice,
        cbt
      };
    }

      const notes = [];

      if (result.fatigue >= 70) {

      } else if (result.anxiety >= 70) {

      } else if (result.endurance >= 70) {

      } else if (result.loneliness >= 65) {

      } else if (result.recovery >= 60) {

      } else {

    function getWeeklyComment(weekly) {
      if (weekly.length < 2) return "まだ比較できるほど履歴がありません。";

      const first = weekly[0];
      const last = weekly[weekly.length - 1];

      const fatigueDiff = (last.fatigue || 0) - (first.fatigue || 0);
      const anxietyDiff = (last.anxiety || 0) - (first.anxiety || 0);
      const recoveryDiff = (last.recovery || 0) - (first.recovery || 0);

      if (fatigueDiff > 15 && recoveryDiff < -10) {
        return "今週は疲れが増えていて、回復する時間が足りていない流れが見えます。";
      }

      if (anxietyDiff > 15) {
        return "今週は気を張る場面が増えて、不安が高まりやすい流れが見えます。";
      }

      if (recoveryDiff > 10) {
        return "今週は少しずつ回復の流れが出てきています。";

      return "今週は大きく崩れすぎず、ゆるやかな波の中にいる状態です。";

      const past = getPastAnalysis(compareDepth);
      const weekly = getWeeklyHistory();

      const compareTitle = compareDepth === 1 ? "前回比較" : `${compareDepth}回前と比較`;

      const compareHtml = past ? `
        <div class="glass-card">
          <div class="sub-title">📈 ${compareTitle}</div>
          ${diffText("疲労", result.fatigue, past.fatigue || 0)}
          ${diffText("不安", result.anxiety, past.anxiety || 0)}
          ${diffText("我慢", result.endurance, past.endurance || 0)}
          ${diffText("孤独", result.loneliness, past.loneliness || 0)}
          ${diffText("回復", result.recovery, past.recovery || 0)}
        </div>
      ` : `
        <div class="glass-card">
          <div class="sub-title">📈 比較</div>
          <div class="compare-line">まだ比較できる履歴が少ないので、あと少し話すと比較できるようになります。</div>
        </div>
      `;

      const weeklyHtml = weekly.length >= 2 ? `
        <div class="glass-card">
          <div class="sub-title">📅 今週のこころの流れ</div>

          <div class="weekly-block">
            <div class="weekly-row">
              <div class="weekly-label">疲労</div>
              ${createMiniBars(weekly.map(d => d.fatigue || 0), "#ff9a9a")}
            </div>

            <div class="weekly-row">
              <div class="weekly-label">不安</div>
              ${createMiniBars(weekly.map(d => d.anxiety || 0), "#b39cff")}
            </div>

            <div class="weekly-row">
              <div class="weekly-label">回復力</div>
              ${createMiniBars(weekly.map(d => d.recovery || 0), "#7fe1ad")}
            </div>
          </div>

          <div class="weekly-note">左 → 右 で最近の流れです</div>
          <div class="analysis-text" style="margin-top:10px;">${getWeeklyComment(weekly)}</div>
        </div>
      ` : `
        <div class="glass-card">
          <div class="sub-title">📅 今週のこころの流れ</div>
          <div class="analysis-text">まだ履歴が少ないので、分析を重ねると変化が見えるようになります。</div>
        </div>
      `;

      analysisContent.innerHTML = `
        <div class="glass-card">
          <div class="section-title">今日のこころの地図</div>

          <div class="animal-hero">
            <div class="animal-emoji">${result.animal}</div>
            <div class="animal-name">${result.animalTitle}</div>
            <div class="animal-sub">${result.animalDesc}</div>
          </div>
        </div>

        <div class="glass-card">
          <div class="sub-title">📊 今のバランス（棒グラフ）</div>
          ${createBarRow("疲労", result.fatigue, "#ff9a9a")}
          ${createBarRow("不安", result.anxiety, "#b39cff")}
          ${createBarRow("我慢", result.endurance, "#ffc17a")}
          ${createBarRow("孤独", result.loneliness, "#87d6ff")}
          ${createBarRow("回復力", result.recovery, "#7fe1ad")}
        </div>

        <div class="glass-card">
          <div class="sub-title">🥧 今のこころ配分（円グラフ）</div>
          <div class="pie-wrap">
            <canvas id="pieChart" width="300" height="300"></canvas>
            <div class="pie-legend">
              <div class="legend-item"><span class="legend-dot" style="background:#ff9a9a;"></span>疲労</div>
              <div class="legend-item"><span class="legend-dot" style="background:#b39cff;"></span>不安</div>
              <div class="legend-item"><span class="legend-dot" style="background:#ffc17a;"></span>我慢</div>
              <div class="legend-item"><span class="legend-dot" style="background:#87d6ff;"></span>孤独</div>
              <div class="legend-item"><span class="legend-dot" style="background:#7fe1ad;"></span>回復力</div>
            </div>
          </div>
        </div>

        <div class="glass-card">
          <div class="sub-title">📝 わかりやすい解説</div>
          <div class="analysis-text">${result.summary.replace(/\n/g, "<br>")}</div>
        </div>

        <div class="glass-card">
          <div class="sub-title">🌱 今日の行動アドバイス</div>
          ${renderAdviceList(result.advice)}
        </div>

        <div class="glass-card">
          <div class="sub-title">💭 気持ちの整理</div>
          ${renderCBTList(result.cbt)}
        </div>

        ${compareHtml}
        ${weeklyHtml}
      `;

      drawPieChart(result);
    }

    function drawPieChart(result) {
      const canvas = document.getElementById("pieChart");
      if (!canvas) return;

      const ctx = canvas.getContext("2d");
      const values = [
        result.fatigue,
        result.anxiety,
        result.endurance,
        result.loneliness,
        result.recovery
      ];
      const colors = ["#ff9a9a", "#b39cff", "#ffc17a", "#87d6ff", "#7fe1ad"];
      const total = values.reduce((a, b) => a + b, 0);

      const w = canvas.width;
      const h = canvas.height;
      const cx = w / 2;
      const cy = h / 2;
      const radius = 110;

      ctx.clearRect(0, 0, w, h);

      let startAngle = -Math.PI / 2;

      values.forEach((value, i) => {
        const sliceAngle = (value / total) * Math.PI * 2;

        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, radius, startAngle, startAngle + sliceAngle);
        ctx.closePath();
        ctx.fillStyle = colors[i];
        ctx.fill();

        startAngle += sliceAngle;
      });

      // 中央白丸
      ctx.beginPath();
      ctx.arc(cx, cy, 50, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(20,20,35,0.85)";
      ctx.fill();

      ctx.fillStyle = "white";
      ctx.font = "bold 18px sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("こころ", cx, cy - 8);
      ctx.font = "13px sans-serif";
      ctx.fillText("配分", cx, cy + 14);
    }

    function analyzeCurrentConversation(moveToTab = true) {
      const userOnlyText = memory.chatHistory
        .filter(item => item.role === "user")
        .map(item => item.content)
        .slice(-8)
        .join(" ");

      if (!userOnlyText.trim()) {
        analysisContent.innerHTML = `
          <div class="glass-card">
            <div class="sub-title">📊 まだ分析できません</div>
            <div class="analysis-text">先に少し会話すると分析できるようになります。</div>
          </div>
        `;
        if (moveToTab) switchMainTab("analysis");
        return;
      }

      const result = analyzeMentalState(userOnlyText);
      saveAnalysisHistory(result);
      renderAnalysisPanel(result);

      if (moveToTab) {
        switchMainTab("analysis");
      }
    }

    settingsModal.addEventListener("click", (e) => {
      if (e.target === settingsModal) {
        closeSettings();
      }
    });
  </script>
</body>
