<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI 固定版</title>

<style>
html,body{
  margin:0;
  height:100%;
  overflow:hidden; /* ← これが超重要 */
  background:#08121f;
  font-family:sans-serif;
}

/* ===== 全体固定 ===== */
.app{
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* ===== 画像（固定） ===== */
.top{
  height:28%;
  flex-shrink:0;
  display:flex;
  justify-content:center;
  align-items:center;
}
.top img{
  width:90%;
  height:100%;
  object-fit:cover;
  border-radius:20px;
}

/* ===== チャット（ここだけスクロール） ===== */
#chatBox{
  height:42%;
  overflow-y:auto;
  padding:8px;
}

/* ===== メッセージ ===== */
.message{
  max-width:70%;
  padding:8px;
  border-radius:14px;
  margin:4px;
  font-size:12px;
}
.user{
  background:#ff4f8b;
  margin-left:auto;
}
.bot{
  background:#444;
}

/* ===== 入力（固定） ===== */
.input{
  height:12%;
  display:flex;
  align-items:center;
  padding:6px;
  background:#111;
}

input{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:none;
  font-size:13px;
}

button{
  margin-left:5px;
  padding:10px;
  border:none;
  border-radius:10px;
}

/* ===== スタンプ ===== */
#stampPanel{
  display:none;
  height:10%;
  background:#222;
  overflow-x:auto;
  white-space:nowrap;
}

/* ===== タブ ===== */
.tabs{
  height:8%;
  display:flex;
  background:#222;
}

.tab{
  flex:1;
  text-align:center;
  padding:8px;
  font-size:12px;
}
</style>
</head>

<body>

<div class="app">

<div class="top">
<img src="girl-normal.jpg">
</div>

<div id="chatBox"></div>

<div id="stampPanel"></div>

<div class="input">
<button onclick="toggleStamp()">😊</button>
<button onclick="startVoice()">🎤</button>
<input id="userInput" placeholder="話しかけて...">
<button onclick="sendMessage()">送信</button>
</div>

<div class="tabs">
<div class="tab">会話</div>
<div class="tab">分析</div>
<div class="tab">未来</div>
<div class="tab">設定</div>
</div>

</div>

<script>

function addMessage(text,type){
  const div=document.createElement("div");
  div.className="message "+type;
  div.textContent=text;
  chatBox.appendChild(div);
  chatBox.scrollTop=chatBox.scrollHeight;
}

function sendMessage(){
  const text=userInput.value;
  if(!text) return;

  addMessage(text,"user");
  userInput.value="";

  setTimeout(()=>{
    addMessage("ちゃんと聞いてるよ","bot");
  },700);
}

/* ===== スタンプ ===== */
const stamps=["😊","😢","😡","😍","😆","😭"];

function toggleStamp(){
  const panel=document.getElementById("stampPanel");

  panel.style.display = panel.style.display==="block" ? "none":"block";
  panel.innerHTML="";

  stamps.forEach(s=>{
    const btn=document.createElement("button");
    btn.textContent=s;

    btn.onclick=()=>{
      addMessage(s,"user");
      panel.style.display="none";
    };

    panel.appendChild(btn);
  });
}

/* ===== 音声 ===== */
function startVoice(){
  try{
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recog = new SpeechRecognition();

    recog.lang="ja-JP";

    recog.onresult=(e)=>{
      userInput.value = e.results[0][0].transcript;
      sendMessage();
    };

    recog.start();

  }catch{
    alert("音声使えない");
  }
}

</script>

</body>
</html>
