<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI</title>

<style>
body{
  margin:0;
  background:#09111f;
  font-family:sans-serif;
  color:white;
  height:100vh;
  overflow:hidden;
}

/* ===== 画像 ===== */
.top{
  position:fixed;
  top:0;
  width:100%;
  height:180px;
}

.top img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-bottom-left-radius:20px;
  border-bottom-right-radius:20px;
}

/* ===== チャット ===== */
#chatBox{
  position:fixed;
  top:180px;
  bottom:110px;
  width:100%;
  overflow-y:auto;
  padding:10px;
}

/* ===== 吹き出し ===== */
.message{
  max-width:75%;
  padding:10px 12px;
  border-radius:16px;
  margin:6px 0;
  font-size:14px;
  line-height:1.6;
  animation:fade .2s;
}

@keyframes fade{
  from{opacity:0; transform:translateY(5px);}
  to{opacity:1;}
}

.user{
  background:#ff4f8b;
  margin-left:auto;
  box-shadow:0 4px 12px rgba(255,79,139,.3);
}

.bot{
  background:#444;
  box-shadow:0 4px 12px rgba(0,0,0,.3);
}

.time{
  font-size:10px;
  opacity:.6;
  margin-top:2px;
}

.name{
  font-size:11px;
  opacity:.7;
  margin-bottom:2px;
}

/* ===== 入力 ===== */
.input{
  position:fixed;
  bottom:60px;
  width:100%;
  display:flex;
  gap:6px;
  padding:6px;
  background:#111;
}

input{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:none;
  font-size:14px;
}

button{
  padding:10px;
  border-radius:10px;
  border:none;
}

/* スタンプ */
.stamp-btn{
  width:40px;
}

/* ===== タブ ===== */
.tabs{
  position:fixed;
  bottom:0;
  width:100%;
  height:50px;
  display:flex;
  background:#222;
}

.tab{
  flex:1;
  text-align:center;
  line-height:50px;
  font-size:13px;
}
</style>
</head>

<body>

<!-- 画像 -->
<div class="top">
  <img id="mainGirl" src="girl-normal.jpg">
</div>

<!-- チャット -->
<div id="chatBox"></div>

<!-- 入力 -->
<div class="input">
  <button class="stamp-btn" onclick="openStamp()">😊</button>
  <input id="userInput" placeholder="話しかけて…">
  <button onclick="sendMessage()">送信</button>
</div>

<!-- タブ -->
<div class="tabs">
  <div class="tab">会話</div>
  <div class="tab">分析</div>
  <div class="tab">未来</div>
  <div class="tab">設定</div>
</div>

<script>

/* ===== 記憶 ===== */
let memory = JSON.parse(localStorage.getItem("memory") || "{}");

if(!memory.history) memory.history=[];
if(!memory.personality) memory.personality={
  type:"優しい",
  trust:0
};

/* ===== 表情 ===== */
const faces={
  normal:"girl-normal.jpg",
  happy:"girl-happy.png",
  worried:"girl-worried.png",
  sympathy:"girl-sympathy.png",
  troubled:"girl-troubled.png",
  healing:"girl-healing.png",
  irritated:"girl-irritated.png",
  panic:"girl-panic.png",
  exhausted:"girl-exhausted.png"
};

function setFace(t){
  mainGirl.src = faces[t] || faces.normal;
}

/* ===== 時間 ===== */
function now(){
  const d=new Date();
  return d.getHours()+":"+String(d.getMinutes()).padStart(2,"0");
}

/* ===== メッセージ ===== */
function addMessage(text,type){
  const div=document.createElement("div");
  div.className="message "+type;

  if(type==="bot"){
    div.innerHTML=`
      <div class="name">美咲</div>
      ${text}
      <div class="time">${now()}</div>
    `;
  }else{
    div.innerHTML=`
      ${text}
      <div class="time">${now()}</div>
    `;
  }

  chatBox.appendChild(div);
  chatBox.scrollTop=chatBox.scrollHeight;
}

/* ===== 送信 ===== */
function sendMessage(){
  const t=userInput.value;
  if(!t) return;

  addMessage(t,"user");

  memory.history.push(t);
  memory.personality.trust++;

  const r=generateReply(t);

  setTimeout(()=>{
    addMessage(r,"bot");
  },300);

  userInput.value="";
  save();
}

/* ===== スタンプ ===== */
function openStamp(){
  const list=["😊","😢","😡","🥺","😴"];
  const s = list[Math.floor(Math.random()*list.length)];
  sendMessageWithText(s);
}

function sendMessageWithText(t){
  userInput.value=t;
  sendMessage();
}

/* ===== 保存 ===== */
function save(){
  localStorage.setItem("memory", JSON.stringify(memory));
}

/* ===== AI（強化版） ===== */
let lastReply="";

function generateReply(t){

  let mood="normal";
  let reply="";

  const trust = memory.personality.trust;

  if(t.includes("疲れ")){
    mood="exhausted";
    reply="ちょっと無理してる感じあるね…";
    if(trust>5) reply+="最近ずっと頑張ってる気がするよ";
    reply+=" 少し力抜けそう？";
  }

  else if(t.includes("楽しい")){
    mood="happy";
    reply="いいね、それ。どの瞬間が一番よかった？";
  }

  else if(t.includes("こんにちは")){
    mood="happy";
    reply="こんにちは。来てくれてちょっと嬉しいな";
  }

  else{
    mood="normal";
    reply="ちゃんと聞いてるよ。もう少し教えてくれる？";
  }

  /* ===== 被り防止 ===== */
  if(reply===lastReply){
    reply+=" もう少しだけ知りたいな";
  }

  /* ===== 性格変化 ===== */
  if(trust>10){
    reply = "ねえ、"+reply;
  }

  setFace(mood);
  lastReply=reply;

  return reply;
}

</script>

</body>
</html>
