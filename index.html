<script>

// ===== 🔥① 音声アンロック（常駐）=====
let unlocked=false;
document.body.addEventListener("click",()=>{
  if(unlocked) return;
  const a=new Audio();
  a.muted=true;
  a.play().catch(()=>{});
  unlocked=true;
  console.log("音声アンロックOK");
});

// ===== 変数 =====
let chatBox, girl, modal, userInput;
let nameInput, imageInput, apiKeyInput, promptInput, imageFile;
let elevenApiKeyInput, voiceIdInput;

let chatLog=[];

let settings={
  name:localStorage.getItem("name")||"ピピ",
  image:localStorage.getItem("image")||"",
  apiKey:localStorage.getItem("apiKey")||"",
  elevenApiKey:localStorage.getItem("elevenApiKey")||"",
  voiceId:localStorage.getItem("voiceId")||"",
  prompt:localStorage.getItem("prompt")||"優しく話す"
};

// ===== 初期化 =====
window.addEventListener("DOMContentLoaded",()=>{

  chatBox=document.getElementById("chatBox");
  girl=document.getElementById("girl");
  modal=document.getElementById("modal");
  userInput=document.getElementById("userInput");

  nameInput=document.getElementById("nameInput");
  imageInput=document.getElementById("imageInput");
  apiKeyInput=document.getElementById("apiKeyInput");
  promptInput=document.getElementById("promptInput");
  imageFile=document.getElementById("imageFile");

  elevenApiKeyInput=document.getElementById("elevenApiKeyInput");
  voiceIdInput=document.getElementById("voiceIdInput");

  girl.src=settings.image || "https://cdn.pixabay.com/photo/2017/01/31/13/14/animal-2023924_1280.png";

  userInput.addEventListener("keypress",e=>{
    if(e.key==="Enter") sendMessage();
  });

});

// ===== 表示 =====
function addMessage(text,type){
  const row=document.createElement("div");
  row.className="row "+type;

  const bubble=document.createElement("div");
  bubble.className="bubble";
  bubble.textContent=text;

  row.appendChild(bubble);
  chatBox.appendChild(row);
  chatBox.scrollTop=chatBox.scrollHeight;
}

// ===== 🔥③ 音声（完全安定版）=====
async function speak(text){

  if(!text) return;

  // speech一旦停止
  if("speechSynthesis" in window){
    speechSynthesis.cancel();
  }

  const useEleven =
    settings.elevenApiKey &&
    settings.voiceId &&
    settings.elevenApiKey.length > 10;

  if(useEleven){
    try{
      const res = await fetch(
        `https://api.elevenlabs.io/v1/text-to-speech/${settings.voiceId}`,
        {
          method:"POST",
          headers:{
            "xi-api-key":settings.elevenApiKey,
            "Content-Type":"application/json",
            "Accept":"audio/mpeg"
          },
          body:JSON.stringify({
            text:text,
            model_id:"eleven_multilingual_v2"
          })
        }
      );

      if(res.ok){
        const blob=await res.blob();
        const url=URL.createObjectURL(blob);

        const audio=new Audio(url);
        audio.volume=1;

        await audio.play().catch(()=>{ throw new Error(); });

        audio.onended=()=>URL.revokeObjectURL(url);
        return;
      }

    }catch(e){
      console.log("Eleven失敗 → fallback");
    }
  }

  // fallback（確実に鳴る）
  if("speechSynthesis" in window){
    const u=new SpeechSynthesisUtterance(text);
    u.lang="ja-JP";
    speechSynthesis.speak(u);
  }
}

// ===== AI =====
async function aiReply(text){

  if(!settings.apiKey) return "APIキー未設定";

  try{
    const res=await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+settings.apiKey
      },
      body:JSON.stringify({
        model:"gpt-4o-mini",
        messages:[
          {role:"system",content:`あなたは${settings.name}。${settings.prompt}`},
          ...chatLog.slice(-20),
          {role:"user",content:text}
        ]
      })
    });

    const data=await res.json();
    return data.choices?.[0]?.message?.content || "エラー";

  }catch(e){
    return "通信エラー";
  }
}

// ===== 🔥② 送信（音対策フル）=====
async function sendMessage(){

  const text=userInput.value.trim();
  if(!text) return;

  // 🔥 AudioContext解放（最強）
  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    await ctx.resume();
  }catch(e){}

  // 🔥 ダミー音
  const unlock=new Audio();
  unlock.src="data:audio/mp3;base64,//uQxAAAAAAAAAAAA";
  unlock.muted=true;
  unlock.play().catch(()=>{});

  chatLog.push({role:"user",content:text});
  addMessage(text,"user");
  userInput.value="";

  const reply=await aiReply(text);

  chatLog.push({role:"assistant",content:reply});
  addMessage(reply,"bot");

  // 🔥 遅延が重要
  setTimeout(()=>{
    speak(reply);
  },200);
}

// ===== 分析 =====
async function analyze(){

  if(chatLog.length===0){
    alert("会話がないよ");
    return;
  }

  addMessage("🧠 分析中…","bot");

  const reply=await aiReply("会話を分析して");
  addMessage(reply,"bot");
  speak(reply);
}

// ===== 設定 =====
function saveSettings(){

  settings.name=nameInput.value;
  settings.apiKey=apiKeyInput.value;
  settings.prompt=promptInput.value;
  settings.elevenApiKey=elevenApiKeyInput.value;
  settings.voiceId=voiceIdInput.value;

  if(imageInput.value.trim()){
    settings.image=imageInput.value.trim();
  }

  localStorage.setItem("name",settings.name);
  localStorage.setItem("apiKey",settings.apiKey);
  localStorage.setItem("prompt",settings.prompt);
  localStorage.setItem("image",settings.image);
  localStorage.setItem("elevenApiKey",settings.elevenApiKey);
  localStorage.setItem("voiceId",settings.voiceId);

  girl.src=settings.image;
  closeSettings();
}

function openSettings(){ modal.classList.add("show"); }
function closeSettings(){ modal.classList.remove("show"); }

// ===== 音声入力 =====
function startVoice(){
  const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SpeechRecognition) return;

  const recog=new SpeechRecognition();
  recog.lang="ja-JP";

  recog.onresult=(e)=>{
    userInput.value=e.results[0][0].transcript;
    sendMessage();
  };

  recog.start();
}

</script>
