<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ピピAI 完全版</title>

<style>
*{ box-sizing:border-box; }

html,body{
  height:100%;
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(#2b314d,#09111f);
  color:white;
}

.app{
  display:flex;
  flex-direction:column;
  height:100vh;
}

.top{
  height:35vh;
}
.top img{
  width:100%;
  height:100%;
  object-fit:cover;
}

#chatBox{
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

.row{ display:flex; margin:6px 0; }
.row.user{ justify-content:flex-end; }
.row.bot{ justify-content:flex-start; }

.bubble{
  padding:12px 16px;
  border-radius:16px;
  max-width:75%;
  white-space:pre-wrap;
}

.user .bubble{ background:#ff4f8b; }
.bot .bubble{ background:#444; }

.input-area{
  display:flex;
  gap:6px;
  padding:8px;
  background:#111;
}

#userInput{
  flex:1;
  padding:14px;
  border:none;
  border-radius:10px;
}

button{
  width:60px;
  height:55px;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="app">

  <div class="top">
    <img id="girl">
  </div>

  <div id="chatBox"></div>

  <div class="input-area">
    <input id="userInput" placeholder="話してみて">
    <button onclick="sendMessage()">送信</button>
    <button onclick="startVoice()">🎤</button>
    <button onclick="openSettings()">⚙</button>
  </div>

</div>

<div class="modal" id="modal">
  <div class="box">
    OpenAI APIKey<input id="apiKeyInput">
    Eleven APIKey<input id="elevenApiKeyInput">
    VoiceID<input id="voiceIdInput">
    <button onclick="saveSettings()">保存</button>
  </div>
</div>

<script>

// ===== 🔥① 音声アンロック =====
let unlocked=false;
document.body.addEventListener("click",()=>{
  if(unlocked) return;
  const a=new Audio();
  a.muted=true;
  a.play().catch(()=>{});
  unlocked=true;
  console.log("音声アンロックOK");
});

// ===== 変数 =====
let chatBox,userInput,girl;

let settings={
  apiKey:localStorage.getItem("apiKey")||"",
  elevenApiKey:localStorage.getItem("elevenApiKey")||"",
  voiceId:localStorage.getItem("voiceId")||""
};

let chatLog=[];

// ===== 初期化 =====
window.onload=()=>{
  chatBox=document.getElementById("chatBox");
  userInput=document.getElementById("userInput");
  girl=document.getElementById("girl");

  girl.src="https://cdn.pixabay.com/photo/2017/01/31/13/14/animal-2023924_1280.png";
};

// ===== 表示 =====
function addMessage(text,type){
  const row=document.createElement("div");
  row.className="row "+type;

  const bubble=document.createElement("div");
  bubble.className="bubble";
  bubble.textContent=text;

  row.appendChild(bubble);
  chatBox.appendChild(row);
  chatBox.scrollTop=chatBox.scrollHeight;
}

// ===== 🔥③ 音声（完全版）=====
async function speak(text){

  if(!text) return;

  const useEleven =
    settings.elevenApiKey &&
    settings.voiceId &&
    settings.elevenApiKey.length > 10;

  if(useEleven){
    try{
      const res = await fetch(
        `https://api.elevenlabs.io/v1/text-to-speech/${settings.voiceId}`,
        {
          method:"POST",
          headers:{
            "xi-api-key":settings.elevenApiKey,
            "Content-Type":"application/json",
            "Accept":"audio/mpeg"
          },
          body:JSON.stringify({
            text:text,
            model_id:"eleven_multilingual_v2"
          })
        }
      );

      if(res.ok){
        const blob=await res.blob();
        const url=URL.createObjectURL(blob);

        const audio=new Audio(url);
        audio.volume=1;

        await audio.play();
        return;
      }

    }catch(e){
      console.log("Eleven失敗");
    }
  }

  // fallback
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang="ja-JP";
  speechSynthesis.speak(u);
}

// ===== AI =====
async function aiReply(text){

  if(!settings.apiKey) return "APIキー未設定";

  const res=await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+settings.apiKey
    },
    body:JSON.stringify({
      model:"gpt-4o-mini",
      messages:[{role:"user",content:text}]
    })
  });

  const data=await res.json();
  return data.choices?.[0]?.message?.content || "エラー";
}

// ===== 🔥② 送信（音対応）=====
async function sendMessage(){

  const text=userInput.value.trim();
  if(!text) return;

  // 🔥 音許可
  const unlock=new Audio();
  unlock.src="data:audio/mp3;base64,//uQxAAAAAAAAAAAA";
  unlock.play().catch(()=>{});

  addMessage(text,"user");
  userInput.value="";

  const reply=await aiReply(text);

  addMessage(reply,"bot");

  setTimeout(()=>{
    speak(reply);
  },150);
}

// ===== 設定 =====
function saveSettings(){
  settings.apiKey=document.getElementById("apiKeyInput").value;
  settings.elevenApiKey=document.getElementById("elevenApiKeyInput").value;
  settings.voiceId=document.getElementById("voiceIdInput").value;

  localStorage.setItem("apiKey",settings.apiKey);
  localStorage.setItem("elevenApiKey",settings.elevenApiKey);
  localStorage.setItem("voiceId",settings.voiceId);

  alert("保存OK");
}

function openSettings(){
  document.getElementById("modal").style.display="block";
}

// ===== 音声入力 =====
function startVoice(){
  const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SpeechRecognition) return;

  const recog=new SpeechRecognition();
  recog.lang="ja-JP";

  recog.onresult=(e)=>{
    userInput.value=e.results[0][0].transcript;
    sendMessage();
  };

  recog.start();
}

</script>

</body>
</html>
