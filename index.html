<script>

// ===== 🔥 最強音アンロック =====
let audioUnlocked = false;

async function unlockAudio() {
  try {
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const ctx = new AudioContext();

    if (ctx.state === "suspended") {
      await ctx.resume();
    }

    const buffer = ctx.createBuffer(1, 1, 22050);
    const source = ctx.createBufferSource();
    source.buffer = buffer;
    source.connect(ctx.destination);
    source.start(0);

    audioUnlocked = true;
    console.log("音アンロック成功");
  } catch (e) {
    console.log("アンロック失敗");
  }
}

// ===== クリックで必ず解除 =====
document.addEventListener("click", unlockAudio);
document.addEventListener("touchstart", unlockAudio);


// ===== 送信 =====
async function sendMessage() {

  // 🔥 毎回ここで確実に解除
  await unlockAudio();

  const text = userInput.value.trim();
  if (!text) return;

  if (window.speechSynthesis) {
    window.speechSynthesis.cancel();
  }

  addMessage(text, "user");
  userInput.value = "";

  const typing = addMessage("…入力中", "bot");

  let reply = "";

  try {
    reply = generateLocalReply(text); // GPT無しでもOK
  } catch (e) {
    reply = "エラー";
  }

  typing.remove();

  addMessage(reply, "bot");

  // 🔥 即再生（遅延なし）
  await speakText(reply);
}


// ===== 🔥 音声再生（完全版）=====
async function speakText(text) {

  if (!text) return;

  const clean = text
    .replace(/\n/g, "。")
    .replace(/[😊✨😌😢🥺💦]/g, "")
    .trim();

  try {

    // ===== Eleven =====
    if (sessionSecrets?.elevenApiKey && sessionSecrets?.voiceId) {

      const res = await fetch(
        `https://api.elevenlabs.io/v1/text-to-speech/${sessionSecrets.voiceId}`,
        {
          method: "POST",
          headers: {
            "xi-api-key": sessionSecrets.elevenApiKey,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            text: clean,
            model_id: "eleven_multilingual_v2"
          })
        }
      );

      if (res.ok) {
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);

        const audio = new Audio(url);

        audio.volume = 1;
        audio.muted = false;

        await audio.play();

        return;
      }
    }

  } catch (e) {
    console.log("Eleven失敗");
  }

  // ===== fallback（これが本命）=====
  if ("speechSynthesis" in window) {

    const synth = window.speechSynthesis;
    synth.cancel();

    const u = new SpeechSynthesisUtterance(clean);
    u.lang = "ja-JP";
    u.volume = 1;

    u.onstart = () => {
      setStatus("話してるよ…");
    };

    u.onend = () => {
      setStatus("準備OK");
    };

    u.onerror = () => {
      setStatus("音声再生できませんでした");
    };

    synth.speak(u);
  }
}

</script>
