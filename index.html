<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ピピAI 完全版</title>

<style>
*{ box-sizing:border-box; }

body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(#2b314d,#09111f);
  color:white;
}

.app{
  display:flex;
  flex-direction:column;
  height:100vh;
}

.top{
  height:45vh;
  display:flex;
  justify-content:center;
  align-items:center;
}
.top img{
  width:95%;
  max-width:500px;
  border-radius:20px;
}

#chatBox{
  flex:1;
  overflow:auto;
  padding:10px;
}

.message{
  margin:8px;
  padding:14px;
  border-radius:14px;
  max-width:80%;
  font-size:16px;
  word-break:break-word;
}

.user{ background:#ff4f8b; margin-left:auto; }
.bot{ background:#444; }

.input-area{
  display:flex;
  gap:8px;
  padding:8px;
}

#userInput{
  flex:1;
  min-width:0;
  padding:16px;
  font-size:18px;
  border:none;
  border-radius:10px;
}

.input-area button{
  width:70px;
  height:60px;
  font-size:18px;
  border:none;
  border-radius:10px;
}

.mic{ background:#5f9bff; }

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.modal.show{ display:flex; }

.box{
  width:90%;
  max-width:400px;
  max-height:85vh;
  overflow-y:auto;
  background:#222;
  padding:20px;
  border-radius:12px;
}

textarea{
  width:100%;
  height:120px;
}
</style>
</head>

<body>

<div class="app">

  <div class="top">
    <img id="girl" src="girl-normal.jpg">
  </div>

  <div id="chatBox"></div>

  <div class="input-area">
    <input id="userInput" placeholder="話してみて">
    <button onclick="sendMessage()">送信</button>
    <button class="mic" onclick="startVoice()">🎤</button>
    <button onclick="openSettings()">⚙</button>
  </div>

</div>

<!-- モーダル -->
<div class="modal" id="modal">
  <div class="box">

    あなたの名前<br>
    <input id="userNameInput"><br><br>

    キャラ名<br>
    <input id="aiNameInput"><br><br>

    OpenAI APIKey<br>
    <input id="apiKeyInput"><br><br>

    Eleven APIKey<br>
    <input id="elevenApiKeyInput"><br><br>

    VoiceID<br>
    <input id="voiceIdInput"><br><br>

    プロンプト<br>
    <textarea id="promptInput"></textarea><br><br>

    <button onclick="saveSettings()">保存</button>
    <button onclick="closeSettings()">閉じる</button>

  </div>
</div>

<script>

// ===== DOM =====
const modal = document.getElementById("modal");
const chatBox = document.getElementById("chatBox");
const girl = document.getElementById("girl");

// ===== 表情 =====
const faceImages={
  normal:"girl-normal.jpg",
  happy:"girl-happy.png",
  sad:"girl-sad.png",
  angry:"girl-angry.png",
  surprised:"girl-surprised.png",
  tired:"girl-tired.png",
  love:"girl-love.png",
  thinking:"girl-thinking.png",
  confused:"girl-confused.png"
};

function setFace(type){
  girl.src = faceImages[type] || faceImages.normal;
}

function detectEmotion(text){
  if(/嬉しい|楽しい|最高|好き/.test(text)) return "happy";
  if(/悲しい|つらい|泣/.test(text)) return "sad";
  if(/怒|イライラ/.test(text)) return "angry";
  if(/びっくり|えっ/.test(text)) return "surprised";
  if(/疲れた|眠い/.test(text)) return "tired";
  if(/悩|どうしよう/.test(text)) return "thinking";
  return "normal";
}

// ===== データ =====
let memory={
  userName:localStorage.getItem("userName")||"",
  aiName:localStorage.getItem("aiName")||"ピピ",
  prompt:localStorage.getItem("customPrompt")||"優しい女性AI"
};

let sessionSecrets={
  apiKey:localStorage.getItem("apiKey")||""
};

let chatHistory=JSON.parse(localStorage.getItem("chatHistory")||"[]");

// ===== 初期 =====
window.onload=()=>{
  userNameInput.value=memory.userName;
  aiNameInput.value=memory.aiName;
  apiKeyInput.value=sessionSecrets.apiKey;
  promptInput.value=memory.prompt;
};

// ===== UI =====
function openSettings(){ modal.classList.add("show"); }
function closeSettings(){ modal.classList.remove("show"); }

// ===== 保存 =====
function saveSettings(){
  memory.userName=userNameInput.value.trim();
  memory.aiName=aiNameInput.value.trim()||"ピピ";
  memory.prompt=promptInput.value.trim();
  sessionSecrets.apiKey=apiKeyInput.value.trim();

  localStorage.setItem("userName",memory.userName);
  localStorage.setItem("aiName",memory.aiName);
  localStorage.setItem("customPrompt",memory.prompt);
  localStorage.setItem("apiKey",sessionSecrets.apiKey);

  alert("保存OK🔥");
  closeSettings();
}

// ===== 表示 =====
function addMessage(text,type){
  const div=document.createElement("div");
  div.className="message "+type;
  div.textContent=text;
  chatBox.appendChild(div);
  chatBox.scrollTop=chatBox.scrollHeight;
}

// ===== GPT =====
async function sendMessage(){

  const text=userInput.value.trim();
  if(!text)return;

  addMessage(text,"user");
  userInput.value="";
  setFace(detectEmotion(text));

  chatHistory.push({role:"user",content:text});

  try{
    const res=await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+sessionSecrets.apiKey
      },
      body:JSON.stringify({
        model:"gpt-4o-mini",
        messages:[
          {
            role:"system",
            content:`${memory.prompt}
必ず最初に[happy]など感情タグを付ける。
あなたの名前は${memory.aiName}。
相手は${memory.userName||"ユーザー"}。`
          },
          ...chatHistory
        ]
      })
    });

    const data=await res.json();
    let reply=data.choices?.[0]?.message?.content||"エラー";

    // 表情タグ解析
    let mood="normal";
    const match=reply.match(/^\[(.*?)\]/);
    if(match){
      mood=match[1];
      reply=reply.replace(/^\[.*?\]/,"");
    }

    setFace(mood);
    addMessage(reply,"bot");

    chatHistory.push({role:"assistant",content:reply});
    localStorage.setItem("chatHistory",JSON.stringify(chatHistory));

  }catch(e){
    addMessage("通信エラー","bot");
  }
}

// ===== 音声入力 =====
function startVoice(){
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SpeechRecognition){
    alert("音声入力非対応");
    return;
  }

  const recog = new SpeechRecognition();
  recog.lang="ja-JP";

  recog.onresult=(e)=>{
    userInput.value=e.results[0][0].transcript;
    sendMessage();
  };

  recog.start();
}

// Enter送信
userInput.addEventListener("keypress",e=>{
  if(e.key==="Enter")sendMessage();
});

</script>

</body>
</html>
