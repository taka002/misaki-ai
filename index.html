<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ピピAI 完全版</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(#2b314d,#09111f);
  color:white;
}
.app{
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* 🔥 画像エリア追加 */
.top{
  height:35vh;
  display:flex;
  justify-content:center;
  align-items:center;
}
.top img{
  width:90%;
  max-width:400px;
  border-radius:20px;
}

/* チャット */
#chatBox{
  flex:1;
  overflow:auto;
  padding:10px;
}
.message{
  margin:8px;
  padding:12px;
  border-radius:12px;
  max-width:80%;
}
.user{
  background:#ff4f8b;
  margin-left:auto;
}
.bot{
  background:#444;
}

/* 入力 */
.input-area{
  display:flex;
}
input{
  flex:1;
  padding:10px;
}
button{
  padding:10px;
}

/* モーダル */
.modal{
  position:fixed;
  inset:0;
  background:#0008;
  display:none;
  align-items:center;
  justify-content:center;
}
.modal.show{display:flex;}
.box{
  background:#222;
  padding:20px;
}
</style>
</head>

<body>

<div class="app">

<!-- 🔥 画像 -->
<div class="top">
<img id="girl" src="girl-normal.jpg">
</div>

<div id="chatBox"></div>

<div class="input-area">
<input id="userInput">
<button onclick="sendMessage()">送信</button>
<button onclick="openSettings()">⚙</button>
</div>

</div>

<!-- 設定 -->
<div class="modal" id="modal">
<div class="box">

OpenAI APIKey<br>
<input id="apiKeyInput"><br><br>

Eleven APIKey<br>
<input id="elevenApiKeyInput"><br><br>

VoiceID<br>
<input id="voiceIdInput"><br><br>

<button onclick="saveSettings()">保存</button>
<button onclick="closeSettings()">閉じる</button>

</div>
</div>

<script>

// ===== 画像 =====
const faceImages={
  normal:"girl-normal.jpg",
  happy:"girl-happy.png",
  sympathy:"girl-sympathy.png",
  worried:"girl-worried.png",
  troubled:"girl-troubled.png",
  healing:"girl-healing.png",
  irritated:"girl-irritated.png",
  panic:"girl-panic.png",
  exhausted:"girl-exhausted.png"
};

function setFace(type){
  girl.src=faceImages[type]||faceImages.normal;
}

// ===== 保存 =====
let sessionSecrets={
  apiKey:localStorage.getItem("apiKey")||"",
  elevenApiKey:localStorage.getItem("elevenApiKey")||"",
  voiceId:localStorage.getItem("voiceId")||""
};

let chatHistory=JSON.parse(localStorage.getItem("chatHistory")||"[]");

apiKeyInput.value=sessionSecrets.apiKey;
elevenApiKeyInput.value=sessionSecrets.elevenApiKey;
voiceIdInput.value=sessionSecrets.voiceId;

// ===== UI =====
function openSettings(){
  modal.classList.add("show");
}
function closeSettings(){
  modal.classList.remove("show");
}
function saveSettings(){
  sessionSecrets.apiKey=apiKeyInput.value.trim();
  sessionSecrets.elevenApiKey=elevenApiKeyInput.value.trim();
  sessionSecrets.voiceId=voiceIdInput.value.trim();

  localStorage.setItem("apiKey",sessionSecrets.apiKey);
  localStorage.setItem("elevenApiKey",sessionSecrets.elevenApiKey);
  localStorage.setItem("voiceId",sessionSecrets.voiceId);

  alert("保存OK🔥");
  closeSettings();
}

// ===== 表示 =====
function addMessage(text,type){
  const div=document.createElement("div");
  div.className="message "+type;
  div.textContent=text;
  chatBox.appendChild(div);
  chatBox.scrollTop=chatBox.scrollHeight;
}

// ===== 感情判定（重要） =====
function detectEmotion(text){
  if(/嬉しい|楽しい|最高|好き/.test(text))return "happy";
  if(/悲しい|つらい|泣/.test(text))return "sympathy";
  if(/不安|怖い|心配/.test(text))return "worried";
  if(/疲れた|しんどい|無理/.test(text))return "exhausted";
  if(/イライラ|ムカつく/.test(text))return "irritated";
  return "normal";
}

// ===== GPT =====
async function sendMessage(){

  const text=userInput.value.trim();
  if(!text)return;

  addMessage(text,"user");
  userInput.value="";

  setFace(detectEmotion(text)); // 🔥 ユーザー側

  if(!sessionSecrets.apiKey){
    addMessage("APIキー入れて","bot");
    return;
  }

  chatHistory.push({role:"user",content:text});

  try{
    const res=await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+sessionSecrets.apiKey
      },
      body:JSON.stringify({
        model:"gpt-4o-mini",
        messages:[
          {
            role:"system",
            content:"あなたはピピという優しい女性AI。返答の最初に[happy]など感情タグを付ける"
          },
          ...chatHistory
        ]
      })
    });

    const data=await res.json();
    let reply=data.choices?.[0]?.message?.content||"エラー";

    // 🔥 表情タグ解析
    let mood="normal";
    const match=reply.match(/^\[(.*?)\]/);
    if(match){
      mood=match[1];
      reply=reply.replace(/^\[.*?\]/,"");
    }

    setFace(mood);

    addMessage(reply,"bot");

    chatHistory.push({role:"assistant",content:reply});
    localStorage.setItem("chatHistory",JSON.stringify(chatHistory));

    speak(reply);

  }catch(e){
    addMessage("通信エラー","bot");
  }
}

// ===== Enter =====
userInput.addEventListener("keypress",e=>{
  if(e.key==="Enter")sendMessage();
});

// ===== 音声 =====
function speak(text){
  if(!("speechSynthesis" in window))return;
  const u=new SpeechSynthesisUtterance(text);
  u.lang="ja-JP";
  speechSynthesis.speak(u);
}

</script>

</body>
</html>
