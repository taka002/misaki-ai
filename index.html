<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI 最終進化版</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  transition:0.5s;
}

/* ===== 背景 ===== */
.morning{background:#2c3e50;}
.day{background:#09111f;}
.night{background:#1a1a2e;}

/* ===== ロック ===== */
#lock{
 position:fixed; inset:0;
 display:flex; align-items:center; justify-content:center;
 background:black; color:white; z-index:10;
}

/* ===== レイアウト ===== */
.app{
 display:flex;
 flex-direction:column;
 height:100dvh;
}

/* ===== キャラ ===== */
.top{
 height:140px;
 flex-shrink:0;
}
.top img{
 width:100%;
 height:100%;
 object-fit:cover;
 border-radius:15px;
}

/* ===== チャット ===== */
.chat-area{
 flex:1;
 display:flex;
 flex-direction:column;
 min-height:0;
}

#chatBox{
 flex:1;
 overflow-y:auto;
 padding:10px;
 display:flex;
 flex-direction:column;
}

/* ===== 吹き出し ===== */
.msg{
 max-width:75%;
 padding:10px;
 border-radius:15px;
 margin:6px 0;
}

.user{
 background:#ff4f8b;
 align-self:flex-end;
}

.bot{
 background:#444;
}

/* 時刻 */
.time{
 font-size:10px;
 opacity:0.6;
 margin-top:3px;
}

/* ===== 入力 ===== */
.input{
 display:flex;
}
input{
 flex:1;
 padding:10px;
}
button{
 padding:10px;
}

/* ===== タブ ===== */
.tabs{
 display:flex;
 background:#222;
}
.tab{
 flex:1;
 padding:10px;
 text-align:center;
}

/* ===== スタンプ ===== */
#stampPanel{
 position:fixed;
 bottom:60px;
 left:0;
 right:0;
 background:#222;
 display:none;
 padding:10px;
}

.stamp{
 font-size:28px;
 padding:6px;
}

/* ===== パネル ===== */
.panel{display:none;}
.panel.active{display:block;}
</style>
</head>

<body>

<div id="lock" onclick="unlock()">タップで開始</div>

<div class="app">

<div class="top">
<img id="girl" src="girl-normal.jpg">
</div>

<!-- 会話 -->
<div id="chatPanel" class="panel active">
<div class="chat-area">

<div id="chatBox"></div>

<div class="input">
<input id="input">
<button onclick="send()">送信</button>
<button onclick="toggleStamp()">😊</button>
</div>

</div>
</div>

<!-- 設定 -->
<div id="settingsPanel" class="panel">
<div style="padding:10px;">
AI名前<input id="aiName"><br><br>

性格
<select id="personality">
<option value="soft">優しい</option>
<option value="cool">さっぱり</option>
<option value="teasing">小悪魔</option>
</select><br><br>

<button onclick="save()">保存</button>
</div>
</div>

<!-- タブ -->
<div class="tabs">
<div class="tab" onclick="switchTab('chat')">会話</div>
<div class="tab" onclick="switchTab('settings')">設定</div>
</div>

</div>

<!-- スタンプ -->
<div id="stampPanel">
<span class="stamp" onclick="sendStamp('😊')">😊</span>
<span class="stamp" onclick="sendStamp('🥺')">🥺</span>
<span class="stamp" onclick="sendStamp('💤')">💤</span>
<span class="stamp" onclick="sendStamp('❤️')">❤️</span>
</div>

<script>

/* ===== ロック ===== */
function unlock(){
 lock.style.display="none";
}

/* ===== 背景 ===== */
function bg(){
 let h=new Date().getHours();
 document.body.className=
 h<6?"night":h<12?"morning":h<18?"day":"night";
}
setInterval(bg,60000); bg();

/* ===== 記憶 ===== */
let mem={
 aiName:localStorage.getItem("aiName")||"美咲",
 personality:localStorage.getItem("personality")||"soft",
 history:JSON.parse(localStorage.getItem("history")||"[]"),
 level:parseInt(localStorage.getItem("level")||"1"),
 context:{}
};

aiName.value=mem.aiName;
personality.value=mem.personality;

/* ===== 保存 ===== */
function save(){
 localStorage.setItem("aiName",aiName.value);
 localStorage.setItem("personality",personality.value);
 mem.aiName=aiName.value;
 mem.personality=personality.value;
}

/* ===== タブ ===== */
function switchTab(t){
 document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
 if(t==="chat") chatPanel.classList.add("active");
 if(t==="settings") settingsPanel.classList.add("active");
}

/* ===== 時刻 ===== */
function now(){
 let d=new Date();
 return d.getHours()+":"+String(d.getMinutes()).padStart(2,"0");
}

/* ===== スタンプ ===== */
function toggleStamp(){
 stampPanel.style.display = stampPanel.style.display==="block"?"none":"block";
}
function sendStamp(s){
 add(s,"user");
 stampPanel.style.display="none";
}

/* ===== 記憶分析 ===== */
function analyze(t){
 if(t.includes("疲")) mem.context="疲れ";
 if(t.includes("不安")) mem.context="不安";

 mem.level++;
 localStorage.setItem("level",mem.level);
}

/* ===== 関係性進化 ===== */
function relationPrefix(){
 if(mem.level<5) return "";
 if(mem.level<15) return "ねぇ、";
 return "ねぇさ、";
}

/* ===== 返答 ===== */
function reply(t){

 analyze(t);

 let intro = relationPrefix();

 if(Math.random()<0.2) return "そっか…";

 if(t.includes("疲")){
  return intro + (mem.level>10
   ? "無理してるでしょ…ちょっと心配なんだけど"
   : "無理してる感じあるね…少し休めそう？");
 }

 if(t.includes("不安")){
  return intro + "それ気になるよね…どこが一番引っかかる？";
 }

 return intro + "それ、もう少し教えてくれる？";
}

/* ===== 表示 ===== */
function add(text,type){
 const d=document.createElement("div");
 d.className="msg "+type;
 d.innerHTML=text+`<div class="time">${now()}</div>`;
 chatBox.appendChild(d);
 chatBox.scrollTop=chatBox.scrollHeight;
}

/* ===== 送信 ===== */
function send(){
 let t=input.value;
 if(!t) return;

 add(t,"user");

 let r=reply(t);

 add(mem.aiName+"："+r,"bot");

 mem.history.push(t);
 localStorage.setItem("history",JSON.stringify(mem.history));

 input.value="";
}

</script>

</body>
</html>
