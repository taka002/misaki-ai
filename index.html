<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ピピAI 安定版</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(#2b314d,#09111f);
  color:white;
}

.app{
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* 上 */
.top{
  flex:0 0 35%;
  display:flex;
  justify-content:center;
  align-items:center;
}
.top img{
  width:90%;
  border-radius:20px;
}

/* チャット */
#chatBox{
  flex:1;
  overflow-y:auto;
  padding:10px;
}

.row{display:flex;margin:6px 0;}
.user{justify-content:flex-end;}
.bot{justify-content:flex-start;}

.bubble{
  padding:12px;
  border-radius:16px;
  max-width:70%;
}

.user .bubble{background:#ff4f8b;}
.bot .bubble{background:#444;}

/* 入力 */
.input-area{
  display:flex;
  padding:8px;
  gap:6px;
  background:#111;
}

#userInput{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
}

button{
  width:60px;
  border:none;
  border-radius:10px;
}

/* モーダル */
.modal{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.6);
}

.modal.show{display:flex;}

.box{
  width:90%;
  max-width:400px;
  background:#222;
  padding:20px;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="app">

  <div class="top">
    <img src="girl-normal.jpg">
  </div>

  <div id="chatBox"></div>

  <div class="input-area">
    <input id="userInput" placeholder="話してみて">
    <button onclick="sendMessage()">送信</button>
    <button onclick="openSettings()">⚙</button>
  </div>

</div>

<!-- 設定 -->
<div class="modal" id="modal">
  <div class="box">

    キャラ名<br>
    <input id="nameInput"><br><br>

    プロンプト<br>
    <textarea id="promptInput"></textarea><br><br>

    <button onclick="save()">保存</button>
    <button onclick="closeSettings()">閉じる</button>

  </div>
</div>

<script>

// ===== データ =====
let settings={
  name:localStorage.getItem("name")||"ピピ",
  prompt:localStorage.getItem("prompt")||"優しく話す"
};

// ===== 初期 =====
window.onload=()=>{
  nameInput.value=settings.name;
  promptInput.value=settings.prompt;
};

// ===== 保存 =====
function save(){
  settings.name=nameInput.value;
  settings.prompt=promptInput.value;

  localStorage.setItem("name",settings.name);
  localStorage.setItem("prompt",settings.prompt);

  alert("保存OK");
}

// ===== UI =====
function openSettings(){
  modal.classList.add("show");
}
function closeSettings(){
  modal.classList.remove("show");
}

// ===== 表示 =====
function addMessage(text,type){
  const row=document.createElement("div");
  row.className="row "+type;

  const bubble=document.createElement("div");
  bubble.className="bubble";
  bubble.textContent=text;

  row.appendChild(bubble);
  chatBox.appendChild(row);

  chatBox.scrollTop=chatBox.scrollHeight;
}

// ===== ローカルAI =====
function reply(text){

  if(/疲れ/.test(text)) return "大丈夫？無理しないでね";
  if(/こんにちは/.test(text)) return "こんにちは😊";

  return "うん、聞いてるよ";
}

// ===== 音声 =====
function speak(text){
  const u=new SpeechSynthesisUtterance(text);
  u.lang="ja-JP";
  speechSynthesis.speak(u);
}

// ===== 送信 =====
function sendMessage(){

  const text=userInput.value.trim();
  if(!text)return;

  addMessage(text,"user");
  userInput.value="";

  const r=reply(text);

  setTimeout(()=>{
    addMessage(r,"bot");
    speak(r);
  },300);
}

userInput.addEventListener("keypress",e=>{
  if(e.key==="Enter")sendMessage();
});

</script>

</body>
</html>
