<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ピピAI 完全版</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(#2b314d,#09111f);
  color:white;
}
.app{
  display:flex;
  flex-direction:column;
  height:100vh;
}
#chatBox{
  flex:1;
  overflow:auto;
  padding:10px;
}
.message{
  margin:8px;
  padding:12px;
  border-radius:12px;
  max-width:80%;
}
.user{
  background:#ff4f8b;
  margin-left:auto;
}
.bot{
  background:#444;
}
.input-area{
  display:flex;
}
input{
  flex:1;
  padding:10px;
  font-size:16px;
}
button{
  padding:10px;
  font-size:16px;
}
.modal{
  position:fixed;
  inset:0;
  background:#0008;
  display:none;
  align-items:center;
  justify-content:center;
}
.modal.show{display:flex;}
.box{
  background:#222;
  padding:20px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="app">

<div id="chatBox"></div>

<div class="input-area">
<input id="userInput" placeholder="話してみて">
<button onclick="sendMessage()">送信</button>
<button onclick="openSettings()">⚙</button>
</div>

</div>

<!-- 設定 -->
<div class="modal" id="modal">
<div class="box">

OpenAI APIKey<br>
<input id="apiKeyInput"><br><br>

Eleven APIKey<br>
<input id="elevenApiKeyInput"><br><br>

VoiceID<br>
<input id="voiceIdInput"><br><br>

<button onclick="saveSettings()">保存</button>
<button onclick="closeSettings()">閉じる</button>

</div>
</div>

<script>

// ===== 保存データ =====
let sessionSecrets = {
  apiKey: localStorage.getItem("apiKey") || "",
  elevenApiKey: localStorage.getItem("elevenApiKey") || "",
  voiceId: localStorage.getItem("voiceId") || ""
};

// 会話履歴（超重要）
let chatHistory = JSON.parse(localStorage.getItem("chatHistory") || "[]");

// 初期反映
apiKeyInput.value = sessionSecrets.apiKey;
elevenApiKeyInput.value = sessionSecrets.elevenApiKey;
voiceIdInput.value = sessionSecrets.voiceId;

// ===== UI =====
function openSettings(){
  modal.classList.add("show");

  apiKeyInput.value = sessionSecrets.apiKey;
  elevenApiKeyInput.value = sessionSecrets.elevenApiKey;
  voiceIdInput.value = sessionSecrets.voiceId;
}

function closeSettings(){
  modal.classList.remove("show");
}

// ===== 保存 =====
function saveSettings(){
  sessionSecrets.apiKey = apiKeyInput.value.trim();
  sessionSecrets.elevenApiKey = elevenApiKeyInput.value.trim();
  sessionSecrets.voiceId = voiceIdInput.value.trim();

  localStorage.setItem("apiKey", sessionSecrets.apiKey);
  localStorage.setItem("elevenApiKey", sessionSecrets.elevenApiKey);
  localStorage.setItem("voiceId", sessionSecrets.voiceId);

  alert("保存OK🔥");
  closeSettings();
}

// ===== メッセージ表示 =====
function addMessage(text,type){
  const div=document.createElement("div");
  div.className="message "+type;
  div.textContent=text;
  chatBox.appendChild(div);
  chatBox.scrollTop=chatBox.scrollHeight;
}

// ===== GPT =====
async function sendMessage(){

  const text=userInput.value.trim();
  if(!text)return;

  addMessage(text,"user");
  userInput.value="";

  if(!sessionSecrets.apiKey){
    addMessage("⚠ APIキーを設定してね","bot");
    return;
  }

  // 履歴追加
  chatHistory.push({role:"user",content:text});

  try{
    const res=await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+sessionSecrets.apiKey
      },
      body:JSON.stringify({
        model:"gpt-4o-mini",
        messages:[
          {
            role:"system",
            content:"あなたはピピという優しい女性AI。自然で人間らしい会話をする"
          },
          ...chatHistory
        ]
      })
    });

    const data=await res.json();
    const reply=data.choices?.[0]?.message?.content || "エラー";

    addMessage(reply,"bot");

    // 履歴保存
    chatHistory.push({role:"assistant",content:reply});
    localStorage.setItem("chatHistory",JSON.stringify(chatHistory));

    speak(reply);

  }catch(e){
    addMessage("通信エラー","bot");
  }
}

// Enter送信
userInput.addEventListener("keypress",e=>{
  if(e.key==="Enter")sendMessage();
});

// ===== 音声 =====
function speak(text){
  if(!("speechSynthesis" in window))return;

  const u=new SpeechSynthesisUtterance(text);
  u.lang="ja-JP";
  speechSynthesis.speak(u);
}

</script>

</body>
</html>
