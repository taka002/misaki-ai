<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ピピAI</title>

<style>
body{margin:0;background:#0b132b;color:#fff;font-family:sans-serif;}
.app{display:flex;flex-direction:column;height:100vh;}
.top img{width:100%;height:30vh;object-fit:cover;}
#chatBox{flex:1;overflow:auto;padding:10px;}
.row{display:flex;margin:6px 0;}
.user{justify-content:flex-end;}
.bubble{padding:10px;border-radius:12px;max-width:75%;}
.user .bubble{background:#ff4f8b;}
.bot .bubble{background:#333;}
.input{display:flex;padding:8px;background:#111;}
input{flex:1;padding:10px;border-radius:8px;border:none;}
button{margin-left:5px;}
</style>
</head>

<body>

<div class="app">

<div class="top">
<img id="girl" src="https://cdn.pixabay.com/photo/2017/01/31/13/14/animal-2023924_1280.png">
</div>

<div id="chatBox"></div>

<div class="input">
<input id="userInput">
<button onclick="send()">送信</button>
<button onclick="analyze()">🧠</button>
</div>

</div>

<script>

const chatBox=document.getElementById("chatBox");
const input=document.getElementById("userInput");
const girl=document.getElementById("girl");

let apiKey=localStorage.getItem("apiKey")||"";

// ===== 表示 =====
function add(text,type){
  const row=document.createElement("div");
  row.className="row "+type;

  const b=document.createElement("div");
  b.className="bubble";
  b.textContent=text;

  row.appendChild(b);
  chatBox.appendChild(row);
  chatBox.scrollTop=999999;
}

// ===== 音声（ローカル）=====
function speak(t){
  if(!speechSynthesis) return;

  const u=new SpeechSynthesisUtterance(t);
  u.lang="ja-JP";

  speechSynthesis.cancel();
  setTimeout(()=>speechSynthesis.speak(u),100);
}

// ===== AI =====
async function ask(text){

  const res=await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+apiKey
    },
    body:JSON.stringify({
      model:"gpt-4o-mini",
      messages:[
        {role:"system",content:"①出来事②思考③感情(%)④歪み⑤反証⑥考え⑦行動で答える"},
        {role:"user",content:text}
      ]
    })
  });

  const d=await res.json();
  return d.choices?.[0]?.message?.content||"エラー";
}

// ===== 送信 =====
async function send(){

  const t=input.value;
  if(!t) return;

  add(t,"user");
  input.value="";

  const r=await ask(t);

  add(r,"bot");
  speak(r);

  parse(r);
}

// ===== 分析 =====
async function analyze(){
  const r=await ask("分析して");
  add(r,"bot");
  speak(r);
  parse(r);
}

// ===== データ処理 =====
let emo=JSON.parse(localStorage.getItem("emo")||"[]");
let dis=JSON.parse(localStorage.getItem("dis")||"{}");

function parse(t){

  // 感情
  const m=t.match(/(\d+)%/);
  if(m){
    const s=parseInt(m[1]);
    emo.push(s);
    localStorage.setItem("emo",JSON.stringify(emo));

    if(s>70) girl.src="https://cdn.pixabay.com/photo/2016/11/29/09/32/cat-1866475_1280.jpg";
    else if(s>40) girl.src="https://cdn.pixabay.com/photo/2017/01/31/13/14/animal-2023924_1280.png";
    else girl.src="https://cdn.pixabay.com/photo/2016/02/10/16/37/cat-1192026_1280.jpg";
  }

  // 歪み
  const d=t.split("④")[1]?.split("⑤")[0];
  if(d){
    dis[d]=(dis[d]||0)+1;
    localStorage.setItem("dis",JSON.stringify(dis));
  }
}

</script>

</body>
</html>
