<script>

const chatBox=document.getElementById("chatBox");
const girl=document.getElementById("girl");
const modal=document.getElementById("modal");

let chatLog=[];

let settings={
  name:localStorage.getItem("name")||"ピピ",
  image:localStorage.getItem("image")||"girl-normal.jpg",
  apiKey:localStorage.getItem("apiKey")||"",
  prompt:localStorage.getItem("prompt")||"優しく話す"
};

window.onload=()=>{
  girl.src=settings.image;
};

// ===== 音声初期化（超重要） =====
document.body.addEventListener("click",()=>{
  speechSynthesis.getVoices();
},{once:true});

// ===== 保存 =====
function saveSettings(){
  settings.name=nameInput.value;
  settings.image=imageInput.value;
  settings.apiKey=apiKeyInput.value;
  settings.prompt=promptInput.value;

  localStorage.setItem("name",settings.name);
  localStorage.setItem("image",settings.image);
  localStorage.setItem("apiKey",settings.apiKey);
  localStorage.setItem("prompt",settings.prompt);

  girl.src=settings.image;
  closeSettings();
}

function openSettings(){ modal.classList.add("show"); }
function closeSettings(){ modal.classList.remove("show"); }

// ===== 表示 =====
function addMessage(text,type){

  chatLog.push({role:type==="user"?"user":"assistant",content:text});

  const row=document.createElement("div");
  row.className="row "+type;

  const bubble=document.createElement("div");
  bubble.className="bubble";
  bubble.textContent=text;

  row.appendChild(bubble);
  chatBox.appendChild(row);

  chatBox.scrollTop=chatBox.scrollHeight;
}

// ===== 🔊 音声 =====
function speak(text){
  if(!("speechSynthesis" in window)) return;

  speechSynthesis.cancel();

  const u=new SpeechSynthesisUtterance(text);
  u.lang="ja-JP";

  speechSynthesis.speak(u);
}

// ===== AI会話 =====
async function aiReply(text){

  if(!settings.apiKey){
    return "APIキー未設定です";
  }

  try{
    const res=await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+settings.apiKey
      },
      body:JSON.stringify({
        model:"gpt-4o-mini",
        messages:[
          {
            role:"system",
            content:`あなたは${settings.name}です。
性格:${settings.prompt}
自然に会話してください`
          },
          ...chatLog.slice(-20),
          {role:"user",content:text}
        ]
      })
    });

    const data=await res.json();

    if(!data.choices){
      console.log(data);
      return "APIエラー：" + (data.error?.message || "不明");
    }

    return data.choices[0].message.content;

  }catch(e){
    return "通信エラー。もう一回試して";
  }
}

// ===== 送信 =====
async function sendMessage(){

  const text=userInput.value.trim();
  if(!text) return;

  addMessage(text,"user");
  userInput.value="";

  const reply=await aiReply(text);

  addMessage(reply,"bot");
  speak(reply);
}

// ===== 🧠 分析 =====
async function analyze(){

  if(!settings.apiKey){
    alert("APIキー入れてください");
    return;
  }

  if(chatLog.length===0){
    alert("会話がないよ");
    return;
  }

  addMessage("分析中…","bot");

  try{
    const res=await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+settings.apiKey
      },
      body:JSON.stringify({
        model:"gpt-4o-mini",
        messages:[
          {
            role:"system",
            content:`
以下を作成：
①会話まとめ
②感情分析
③認知の歪み
④5カラム（出来事・思考・感情・反証・新しい考え）
⑤具体的行動
⑥今日の一言

わかりやすく優しく`
          },
          ...chatLog.slice(-20)
        ]
      })
    });

    const data=await res.json();

    if(!data.choices){
      console.log(data);
      addMessage("分析失敗：" + (data.error?.message || "不明"),"bot");
      return;
    }

    addMessage(data.choices[0].message.content,"bot");

  }catch(e){
    addMessage("分析エラー（通信）","bot");
  }
}

// ===== 音声入力 =====
function startVoice(){
  const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;

  if(!SpeechRecognition){
    alert("音声入力非対応");
    return;
  }

  const recog=new SpeechRecognition();
  recog.lang="ja-JP";

  recog.onresult=(e)=>{
    userInput.value=e.results[0][0].transcript;
    sendMessage();
  };

  recog.start();
}

userInput.addEventListener("keypress",e=>{
  if(e.key==="Enter") sendMessage();
});

</script>
