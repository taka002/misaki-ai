<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ピピAI 完全版</title>

<style>
*{ box-sizing:border-box; }

body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(#2b314d,#09111f);
  color:white;
}

.app{
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* 画像 */
.top{
  height:45vh;
  display:flex;
  justify-content:center;
  align-items:center;
}
.top img{
  width:95%;
  max-width:500px;
  border-radius:20px;
}

/* チャット */
#chatBox{
  flex:1;
  overflow:auto;
  padding:10px;
}

.message{
  margin:8px;
  padding:14px;
  border-radius:14px;
  max-width:75%;
  font-size:16px;
  word-break:break-word;
}

.user{ background:#ff4f8b; margin-left:auto; }
.bot{ background:#444; }

/* 入力 */
.input-area{
  display:flex;
  gap:6px;
  padding:6px;
}

#userInput{
  flex:1;
  min-width:0;
  padding:14px;
  font-size:16px;
  border:none;
  border-radius:10px;
}

.input-area button{
  flex:0 0 auto;
  width:60px;
  height:55px;
  font-size:16px;
  border:none;
  border-radius:10px;
}

.mic{ background:#5f9bff; }

/* モーダル */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.modal.show{ display:flex; }

.box{
  width:90%;
  max-width:400px;
  max-height:85vh;
  overflow-y:auto;
  background:#222;
  padding:20px;
  border-radius:12px;
}

textarea{
  width:100%;
  height:120px;
}
</style>
</head>

<body>

<div class="app">

  <div class="top">
    <img id="girl" src="girl-normal.jpg">
  </div>

  <div id="chatBox"></div>

  <div class="input-area">
    <input id="userInput" placeholder="話してみて">
    <button onclick="sendMessage()">送信</button>
    <button class="mic" onclick="startVoice()">🎤</button>
    <button onclick="openSettings()">⚙</button>
  </div>

</div>

<!-- モーダル -->
<div class="modal" id="modal">
  <div class="box">

    キャラ名<br>
    <input id="aiNameInput"><br><br>

    OpenAI APIKey<br>
    <input id="apiKeyInput"><br><br>

    Eleven APIKey<br>
    <input id="elevenApiKeyInput"><br><br>

    VoiceID<br>
    <input id="voiceIdInput"><br><br>

    プロンプト<br>
    <textarea id="promptInput"></textarea><br><br>

    <button onclick="saveSettings()">保存</button>
    <button onclick="closeSettings()">閉じる</button>

  </div>
</div>

<script>

// ===== DOM =====
const modal = document.getElementById("modal");
const chatBox = document.getElementById("chatBox");
const girl = document.getElementById("girl");

// ===== 表情 =====
const faceImages={
  normal:"girl-normal.jpg",
  happy:"girl-happy.png",
  sad:"girl-sad.png",
  angry:"girl-angry.png"
};

function setFace(type){
  girl.src = faceImages[type] || faceImages.normal;
}

// ===== データ =====
let memory={
  aiName:localStorage.getItem("aiName")||"ピピ",
  prompt:localStorage.getItem("customPrompt")||"優しい女性AI"
};

let sessionSecrets={
  apiKey:localStorage.getItem("apiKey")||"",
  elevenApiKey:localStorage.getItem("elevenApiKey")||"",
  voiceId:localStorage.getItem("voiceId")||""
};

let chatHistory=[];

// ===== 初期 =====
window.onload=()=>{
  aiNameInput.value=memory.aiName;
  apiKeyInput.value=sessionSecrets.apiKey;
  elevenApiKeyInput.value=sessionSecrets.elevenApiKey;
  voiceIdInput.value=sessionSecrets.voiceId;
  promptInput.value=memory.prompt;
};

// ===== UI =====
function openSettings(){ modal.classList.add("show"); }
function closeSettings(){ modal.classList.remove("show"); }

// ===== 保存 =====
function saveSettings(){

  memory.aiName=aiNameInput.value.trim();
  memory.prompt=promptInput.value.trim();

  sessionSecrets.apiKey=apiKeyInput.value.trim();
  sessionSecrets.elevenApiKey=elevenApiKeyInput.value.trim();
  sessionSecrets.voiceId=voiceIdInput.value.trim();

  localStorage.setItem("aiName",memory.aiName);
  localStorage.setItem("customPrompt",memory.prompt);
  localStorage.setItem("apiKey",sessionSecrets.apiKey);
  localStorage.setItem("elevenApiKey",sessionSecrets.elevenApiKey);
  localStorage.setItem("voiceId",sessionSecrets.voiceId);

  alert("保存OK🔥");
  closeSettings();
}

// ===== 表示 =====
function addMessage(text,type){
  const div=document.createElement("div");
  div.className="message "+type;
  div.textContent=text;
  chatBox.appendChild(div);
  chatBox.scrollTop=chatBox.scrollHeight;
}

// ===== 音声 =====
async function speak(text){

  // Eleven優先
  if(sessionSecrets.elevenApiKey && sessionSecrets.voiceId){
    try{
      const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${sessionSecrets.voiceId}`,{
        method:"POST",
        headers:{
          "xi-api-key":sessionSecrets.elevenApiKey,
          "Content-Type":"application/json"
        },
        body:JSON.stringify({
          text:text
        })
      });

      if(res.ok){
        const blob = await res.blob();
        new Audio(URL.createObjectURL(blob)).play();
        return;
      }

    }catch(e){
      console.log("Eleven失敗");
    }
  }

  // fallback（必ず喋る）
  const u=new SpeechSynthesisUtterance(text);
  u.lang="ja-JP";
  speechSynthesis.speak(u);
}

// ===== ローカルAI（超重要） =====
function localReply(text){

  if(/疲れ|しんど/.test(text)) return "大丈夫？無理しないでね";
  if(/こんにちは/.test(text)) return "こんにちは😊";
  if(/ありがとう/.test(text)) return "どういたしまして";
  
  return "うん、聞いてるよ";
}

// ===== GPT =====
async function sendMessage(){

  const text=userInput.value.trim();
  if(!text)return;

  addMessage(text,"user");
  userInput.value="";

  // APIない → ローカル返答
  if(!sessionSecrets.apiKey){
    const reply=localReply(text);
    addMessage(reply,"bot");
    speak(reply);
    return;
  }

  try{
    const res=await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+sessionSecrets.apiKey
      },
      body:JSON.stringify({
        model:"gpt-4o-mini",
        messages:[
          {role:"system",content:memory.prompt},
          {role:"user",content:text}
        ]
      })
    });

    const data=await res.json();
    const reply=data.choices?.[0]?.message?.content || localReply(text);

    addMessage(reply,"bot");
    speak(reply);

  }catch(e){
    // 通信失敗 → ローカル
    const reply=localReply(text);
    addMessage(reply,"bot");
    speak(reply);
  }
}

// ===== 音声入力 =====
function startVoice(){
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SpeechRecognition){
    alert("音声入力非対応");
    return;
  }

  const recog = new SpeechRecognition();
  recog.lang="ja-JP";

  recog.onresult=(e)=>{
    userInput.value=e.results[0][0].transcript;
    sendMessage();
  };

  recog.start();
}

// Enter送信
userInput.addEventListener("keypress",e=>{
  if(e.key==="Enter")sendMessage();
});

</script>

</body>
</html>
