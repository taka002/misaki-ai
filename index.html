<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI 完全安定版</title>

<style>
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:sans-serif;
  background:#08121f;
  color:white;
}

/* 上画像 */
.top{
  position:fixed;
  top:0;
  width:100%;
  height:28%;
  display:flex;
  justify-content:center;
}
.top img{
  width:90%;
  height:100%;
  object-fit:cover;
  border-radius:20px;
}

/* チャット */
#chatBox{
  position:fixed;
  top:28%;
  bottom:110px;
  width:100%;
  overflow-y:auto;
  padding:10px;
}

/* メッセージ */
.message{
  max-width:75%;
  padding:10px;
  border-radius:14px;
  margin:6px;
}
.user{
  background:#ff4f8b;
  margin-left:auto;
}
.bot{
  background:#444;
}

/* 入力 */
.input{
  position:fixed;
  bottom:50px;
  width:100%;
  height:60px;
  display:flex;
  padding:6px;
  background:#111;
}
input{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:none;
}
button{
  width:60px;
  margin-left:5px;
}

/* タブ */
.tabs{
  position:fixed;
  bottom:0;
  width:100%;
  height:50px;
  display:flex;
  background:#222;
}
.tab{
  flex:1;
  text-align:center;
  padding:10px;
  font-size:12px;
}

/* 設定 */
#settingsPanel{
  display:none;
  position:fixed;
  top:10%;
  left:5%;
  width:90%;
  max-height:80vh;
  overflow-y:auto;
  background:#222;
  padding:15px;
  border-radius:10px;
  z-index:999;
}
textarea{
  width:100%;
}
</style>
</head>

<body>

<div class="top">
<img src="girl-normal.jpg" onerror="this.src='https://via.placeholder.com/300'">
</div>

<div id="chatBox"></div>

<div class="input">
<button onclick="startVoice()">🎤</button>
<input id="userInput" placeholder="話しかけて...">
<button onclick="sendMessage()">送信</button>
</div>

<div class="tabs">
<div class="tab">会話</div>
<div class="tab">分析</div>
<div class="tab">未来</div>
<div class="tab" onclick="toggleSettings()">設定</div>
</div>

<!-- 設定 -->
<div id="settingsPanel">

<h3>設定</h3>

名前<br>
<input id="userName"><br><br>

AI<br>
<select id="aiMode">
<option value="local">ローカル</option>
<option value="gpt">ChatGPT</option>
<option value="gemini">Gemini</option>
</select><br><br>

GPT APIキー<br>
<input id="gptKey"><br><br>

Gemini APIキー<br>
<input id="geminiKey"><br><br>

音声<br>
<select id="voiceMode">
<option value="off">OFF</option>
<option value="native">スマホ音声</option>
<option value="eleven">Eleven</option>
</select><br><br>

Eleven APIキー<br>
<input id="elevenKey"><br><br>

Voice ID<br>
<input id="voiceId"><br><br>

性格<br>
<textarea id="personality">優しく寄り添う女性</textarea><br><br>

<button onclick="saveSettings()">保存</button>
<button onclick="toggleSettings()">閉じる</button>

</div>

<script>

const chatBox = document.getElementById("chatBox");
const userInput = document.getElementById("userInput");

/* ===== 設定 ===== */
function toggleSettings(){
  const panel = document.getElementById("settingsPanel");
  panel.style.display = panel.style.display === "none" ? "block" : "none";
}

function saveSettings(){
  localStorage.setItem("userName", userName.value);
  localStorage.setItem("aiMode", aiMode.value);
  localStorage.setItem("voiceMode", voiceMode.value);
  localStorage.setItem("personality", personality.value);
  localStorage.setItem("gptKey", gptKey.value);
  localStorage.setItem("geminiKey", geminiKey.value);
  localStorage.setItem("elevenKey", elevenKey.value);
  localStorage.setItem("voiceId", voiceId.value);
  alert("保存したよ");
}

/* ===== 初期 ===== */
window.onload=()=>{

  userName.value = localStorage.getItem("userName") || "";
  aiMode.value = localStorage.getItem("aiMode") || "local";
  voiceMode.value = localStorage.getItem("voiceMode") || "native";
  personality.value = localStorage.getItem("personality") || "";

  gptKey.value = localStorage.getItem("gptKey") || "";
  geminiKey.value = localStorage.getItem("geminiKey") || "";
  elevenKey.value = localStorage.getItem("elevenKey") || "";
  voiceId.value = localStorage.getItem("voiceId") || "";

  const name = userName.value || "あなた";
  const hour = new Date().getHours();

  let greet = hour < 11 ? "おはよう" : hour < 18 ? "こんにちは" : "おかえり";

  const msg = `${name}、${greet}`;

  addMessage(msg,"bot");
  speak(msg);
};

/* ===== メモリ ===== */
function saveMemory(role,text){
  let memory = JSON.parse(localStorage.getItem("memory") || "[]");
  memory.push({role,text});
  if(memory.length > 20) memory.shift();
  localStorage.setItem("memory", JSON.stringify(memory));
}

function getMemoryText(){
  const memory = JSON.parse(localStorage.getItem("memory") || "[]");
  return memory.map(m => m.role + ":" + m.text).join("\n");
}

/* ===== メッセージ ===== */
function addMessage(text,type){

  const div=document.createElement("div");
  div.className="message "+type;

  const now = new Date();
  const time = now.getHours().toString().padStart(2,"0") + ":" +
               now.getMinutes().toString().padStart(2,"0");

  div.innerHTML = `
    <div>${text}</div>
    <div style="font-size:10px;opacity:0.6;text-align:right;">${time}</div>
  `;

  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;

  saveMemory(type,text);
}

/* ===== 音声 ===== */
function speak(text){

  const mode = localStorage.getItem("voiceMode");

  if(mode==="off") return;

  try{
    speechSynthesis.cancel();
    const msg=new SpeechSynthesisUtterance(text);
    msg.lang="ja-JP";
    speechSynthesis.speak(msg);
  }catch(e){
    console.log("音声エラー", e);
  }
}

/* ===== Eleven ===== */
async function playEleven(text){

  const key = localStorage.getItem("elevenKey");
  const voiceId = localStorage.getItem("voiceId");

  if(!key || !voiceId) return;

  const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`,{
    method:"POST",
    headers:{
      "xi-api-key":key,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({ text:text })
  });

  const blob = await res.blob();
  const url = URL.createObjectURL(blob);
  new Audio(url).play();
}

/* ===== AI ===== */
async function replyAI(text){

  try{

    const mode = localStorage.getItem("aiMode");

    if(mode==="gpt"){
      await callGPT(text);
      return;
    }

    if(mode==="gemini"){
      await callGemini(text);
      return;
    }

    let reply="ちゃんと聞いてるよ";

    if(text.includes("疲")){
      reply="疲れてるね…今日はどんな一日だった？";
    }

    showReply(reply);

  }catch(e){
    showReply("うまく話せなかった、ごめんね");
  }
}

/* ===== GPT ===== */
async function callGPT(text){

  const key = localStorage.getItem("gptKey");
  if(!key){
    showReply("APIキー入れてね");
    return;
  }

  try{
    const res = await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+key
      },
      body:JSON.stringify({
        model:"gpt-4o-mini",
        messages:[
          {role:"system",content:localStorage.getItem("personality")},
          {role:"system",content:getMemoryText()},
          {role:"user",content:text}
        ]
      })
    });

    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content || "エラー";

    showReply(reply);

  }catch(e){
    showReply("通信エラー");
  }
}

/* ===== Gemini ===== */
async function callGemini(text){

  const key = localStorage.getItem("geminiKey");
  if(!key){
    showReply("APIキー入れてね");
    return;
  }

  try{
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${key}`,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({
        contents:[{parts:[{text:text}]}]
      })
    });

    const data = await res.json();
    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "エラー";

    showReply(reply);

  }catch(e){
    showReply("通信エラー");
  }
}

/* ===== 返信 ===== */
function showReply(reply){

  const typing=document.createElement("div");
  typing.className="message bot";
  typing.textContent="…";
  chatBox.appendChild(typing);
  chatBox.scrollTop = chatBox.scrollHeight;

  setTimeout(()=>{
    if(typing && typing.parentNode) typing.remove();

    addMessage(reply,"bot");

    setTimeout(()=>{
      speak(reply);
    },200);

  },500);
}

/* ===== 送信 ===== */
function sendMessage(){

  const text=userInput.value;
  if(!text) return;

  addMessage(text,"user");
  userInput.value="";

  replyAI(text);
}

/* ===== 音声入力 ===== */
function startVoice(){

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if(!SpeechRecognition){
    alert("Chromeで開いてね");
    return;
  }

  const r = new SpeechRecognition();
  r.lang="ja-JP";

  r.onresult=(e)=>{
    const text=e.results[0][0].transcript;
    userInput.value=text;
    sendMessage();
  };

  r.start();
}

</script>

</body>
</html>
