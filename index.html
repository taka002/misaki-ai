<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI 最終版</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#09111f;
  color:white;
}

/* ===== 全体 ===== */
.app{
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* ===== キャラ ===== */
.top{
  height:170px; /* ← 顔が全部見えるサイズ */
  display:flex;
  justify-content:center;
  align-items:center;
  padding-top:10px;
}

.top img{
  width:92%;
  height:100%;
  object-fit:contain; /* ← 切れない */
  object-position:top; /* ← 顔優先 */
  border-radius:16px;
  background:#000;
}

/* ===== メイン ===== */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
  min-height:0;
}

/* ===== パネル ===== */
.panel{
  display:none;
  flex:1;
}

.panel.active{
  display:flex;
  flex-direction:column;
}

/* ===== チャット ===== */
#chatBox{
  flex:1;
  overflow-y:auto;
  padding:10px;
}

/* ===== メッセージ ===== */
.message{
  max-width:80%;
  padding:12px;
  border-radius:16px;
  margin:6px 0;
  line-height:1.6;
}

.user{
  background:#ff4f8b;
  margin-left:auto;
}

.bot{
  background:#444;
}

.time{
  font-size:10px;
  opacity:0.6;
  margin-top:4px;
}

/* ===== 入力 ===== */
.input{
  display:flex;
  gap:6px;
  padding:8px;
  background:#111;
}

input{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:none;
}

button{
  padding:12px;
  border-radius:10px;
  border:none;
}

/* ===== タブ ===== */
.tabs{
  display:flex;
  background:#222;
}

.tab{
  flex:1;
  text-align:center;
  padding:12px;
}

/* ===== 分析・未来 ===== */
.card{
  padding:15px;
}
</style>
</head>

<body>

<div class="app">

<!-- キャラ -->
<div class="top">
<img id="mainGirl" src="girl-normal.jpg">
</div>

<!-- メイン -->
<div class="main">

<!-- 会話 -->
<div id="chatPanel" class="panel active">
  <div id="chatBox"></div>

  <div class="input">
    <input id="userInput" placeholder="話しかけて…">
    <button onclick="sendMessage()">送信</button>
  </div>
</div>

<!-- 分析 -->
<div id="analysisPanel" class="panel">
  <div class="card" id="analysisContent">まだデータが少ないよ</div>
</div>

<!-- 未来 -->
<div id="futurePanel" class="panel">
  <div class="card" id="futureContent">会話すると未来が見えてくるよ</div>
</div>

</div>

<!-- タブ -->
<div class="tabs">
  <div class="tab" onclick="switchTab('chat')">会話</div>
  <div class="tab" onclick="switchTab('analysis')">分析</div>
  <div class="tab" onclick="switchTab('future')">未来</div>
</div>

</div>

<script>

/* ===== 状態 ===== */
let memory={
  chatHistory:[],
  lastReply:"",
  mood:"normal"
};

/* ===== タブ ===== */
function switchTab(tab){
  document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));

  if(tab==="chat") chatPanel.classList.add("active");
  if(tab==="analysis") analyze();
  if(tab==="future") future();
}

/* ===== 時間 ===== */
function getTime(){
  const d=new Date();
  return d.getHours()+":"+String(d.getMinutes()).padStart(2,"0");
}

/* ===== メッセージ追加 ===== */
function addMessage(text,type){

  const div=document.createElement("div");
  div.className="message "+type;

  div.innerHTML=`
    ${text}
    <div class="time">${getTime()}</div>
  `;

  chatBox.appendChild(div);
  chatBox.scrollTop=chatBox.scrollHeight;
}

/* ===== 表情 ===== */
function setFace(type){
  mainGirl.src="girl-"+type+".png";
}

/* ===== 送信 ===== */
function sendMessage(){
  const text=userInput.value;
  if(!text) return;

  addMessage(text,"user");
  memory.chatHistory.push(text);

  const reply=generateReply(text);

  setTimeout(()=>{
    addMessage(reply,"bot");
  },300);

  userInput.value="";
}

/* ===== AI人格（強化版） ===== */
function generateReply(text){

  const t=text.toLowerCase();

  function has(words){
    return words.some(w=>t.includes(w));
  }

  let reply="";

  if(has(["疲れ","しんど","無理","限界"])){
    setFace("exhausted");
    reply="ちょっと無理してる感じあるね…今日は少し力抜けそう？";
  }

  else if(has(["不安","怖い","心配"])){
    setFace("worried");
    reply="それ気になるよね…どこが一番引っかかってる？";
  }

  else if(has(["寂しい","つらい"])){
    setFace("sympathy");
    reply="そっか…それはしんどいね。今ひとりで抱えてる感じ？";
  }

  else if(has(["イライラ","むかつく"])){
    setFace("irritated");
    reply="それはイラッとするね…何が一番嫌だった？";
  }

  else if(has(["嬉しい","楽しい"])){
    setFace("happy");
    reply="いいね、それ。どの瞬間が一番よかった？";
  }

  else{
    setFace("normal");
    reply="ちゃんと聞いてるよ。もう少し教えてくれる？";
  }

  /* 同じ返答防止 */
  if(reply===memory.lastReply){
    reply+=" 少し違う角度で聞くね、どんな感じ？";
  }

  memory.lastReply=reply;

  return reply;
}

/* ===== 分析 ===== */
function analyze(){
  const text=memory.chatHistory.join("");

  let fatigue = text.includes("疲") ? "高い" : "普通";
  let anxiety = text.includes("不安") ? "あり" : "少なめ";

  analysisContent.innerHTML=`
    疲労：${fatigue}<br>
    不安：${anxiety}
  `;

  analysisPanel.classList.add("active");
}

/* ===== 未来 ===== */
function future(){

  futureContent.innerHTML=`
    このままだと少し消耗しそう<br><br>
    A：休む → 回復ルート<br>
    B：続ける → 負担増
  `;

  futurePanel.classList.add("active");
}

</script>

</body>
</html>
