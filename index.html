<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ピピAI 完全版</title>

<style>
*{ box-sizing:border-box; }

html,body{
  height:100%;
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(#2b314d,#09111f);
  color:white;
}

.app{
  display:flex;
  flex-direction:column;
  height:100vh;
  overflow:hidden;
}

/* ===== 画像 ===== */
.top{
  height:35vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:10px;
}

.top img{
  max-height:100%;
  max-width:100%;
  border-radius:20px;
  object-fit:contain;
  animation: float 5s ease-in-out infinite;
}

@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-5px);}
  100%{transform:translateY(0);}
}

/* ===== チャット ===== */
#chatBox{
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

.row{ display:flex; margin:6px 0; }
.row.user{ justify-content:flex-end; }
.row.bot{ justify-content:flex-start; }

.bubble{
  padding:12px 16px;
  border-radius:16px;
  max-width:75%;
}

.user .bubble{
  background:#ff4f8b;
  border-bottom-right-radius:4px;
}

.bot .bubble{
  background:#444;
  border-bottom-left-radius:4px;
}

/* ===== 入力 ===== */
.input-area{
  display:flex;
  gap:6px;
  padding:8px;
  background:#111;
}

#userInput{
  flex:1;
  min-width:0;
  padding:14px;
  border:none;
  border-radius:10px;
  font-size:16px;
}

.input-area button{
  width:60px;
  height:55px;
  border:none;
  border-radius:10px;
}

.mic{ background:#5f9bff; }

/* ===== モーダル ===== */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal.show{ display:flex; }

.box{
  width:90%;
  max-width:420px;
  max-height:85vh;
  overflow:auto;
  background:#222;
  padding:20px;
  border-radius:12px;
}

input,textarea{
  width:100%;
  margin-bottom:10px;
  padding:10px;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="app">

  <div class="top">
    <img id="girl">
  </div>

  <div id="chatBox"></div>

  <div class="input-area">
    <input id="userInput" placeholder="話してみて">
    <button onclick="sendMessage()">送信</button>
    <button class="mic" onclick="startVoice()">🎤</button>
    <button onclick="openSettings()">⚙</button>
  </div>

</div>

<!-- ✅ フル設定（これだけ使う） -->
<div class="modal" id="modal">
  <div class="box">

    キャラ名
    <input id="nameInput">

    画像URL
    <input id="imageInput">

    OpenAI APIKey
    <input id="apiKeyInput">

    Eleven APIKey
    <input id="elevenApiKeyInput">

    VoiceID
    <input id="voiceIdInput">

    プロンプト
    <textarea id="promptInput"></textarea>

    <button onclick="saveSettings()">保存</button>
    <button onclick="closeSettings()">閉じる</button>

  </div>
</div>

<script>

// ===== DOM =====
const chatBox=document.getElementById("chatBox");
const girl=document.getElementById("girl");
const modal=document.getElementById("modal");

// ===== 設定 =====
let settings={
  name:localStorage.getItem("name")||"ピピ",
  image:localStorage.getItem("image")||"girl-normal.jpg",
  apiKey:localStorage.getItem("apiKey")||"",
  elevenApiKey:localStorage.getItem("elevenApiKey")||"",
  voiceId:localStorage.getItem("voiceId")||"",
  prompt:localStorage.getItem("prompt")||"優しく話す"
};

// ===== 初期 =====
window.onload=()=>{
  girl.src=settings.image;

  nameInput.value=settings.name;
  imageInput.value=settings.image;
  apiKeyInput.value=settings.apiKey;
  elevenApiKeyInput.value=settings.elevenApiKey;
  voiceIdInput.value=settings.voiceId;
  promptInput.value=settings.prompt;
};

// ===== 保存 =====
function saveSettings(){
  settings.name=nameInput.value;
  settings.image=imageInput.value;
  settings.apiKey=apiKeyInput.value;
  settings.elevenApiKey=elevenApiKeyInput.value;
  settings.voiceId=voiceIdInput.value;
  settings.prompt=promptInput.value;

  localStorage.setItem("name",settings.name);
  localStorage.setItem("image",settings.image);
  localStorage.setItem("apiKey",settings.apiKey);
  localStorage.setItem("elevenApiKey",settings.elevenApiKey);
  localStorage.setItem("voiceId",settings.voiceId);
  localStorage.setItem("prompt",settings.prompt);

  girl.src=settings.image;

  alert("保存OK🔥");
  closeSettings();
}

// ===== UI =====
function openSettings(){ modal.classList.add("show"); }
function closeSettings(){ modal.classList.remove("show"); }

// ===== 表示 =====
function addMessage(text,type){
  const row=document.createElement("div");
  row.className="row "+type;

  const bubble=document.createElement("div");
  bubble.className="bubble";
  bubble.textContent=text;

  row.appendChild(bubble);
  chatBox.appendChild(row);

  chatBox.scrollTop=chatBox.scrollHeight;
}

// ===== 音声 =====
function speak(text){

  // Eleven優先
  if(settings.elevenApiKey && settings.voiceId){
    fetch(`https://api.elevenlabs.io/v1/text-to-speech/${settings.voiceId}`,{
      method:"POST",
      headers:{
        "xi-api-key":settings.elevenApiKey,
        "Content-Type":"application/json"
      },
      body:JSON.stringify({text})
    }).then(res=>res.blob())
      .then(blob=>new Audio(URL.createObjectURL(blob)).play())
      .catch(()=>fallbackSpeak(text));
  }else{
    fallbackSpeak(text);
  }
}

function fallbackSpeak(text){
  const u=new SpeechSynthesisUtterance(text);
  u.lang="ja-JP";
  speechSynthesis.speak(u);
}

// ===== ローカルAI =====
function localReply(text){
  if(/疲れ/.test(text)) return "大丈夫？無理しないでね";
  if(/こんにちは|こんばんは/.test(text)) return "こんにちは😊";
  return "うん、聞いてるよ";
}

// ===== 送信 =====
function sendMessage(){

  const text=userInput.value.trim();
  if(!text) return;

  addMessage(text,"user");
  userInput.value="";

  const reply=localReply(text);

  setTimeout(()=>{
    addMessage(reply,"bot");
    speak(reply);
  },400);
}

// ===== 音声入力 =====
function startVoice(){
  const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;

  if(!SpeechRecognition){
    alert("音声入力非対応");
    return;
  }

  const recog=new SpeechRecognition();
  recog.lang="ja-JP";

  recog.onresult=(e)=>{
    userInput.value=e.results[0][0].transcript;
    sendMessage();
  };

  recog.start();
}

userInput.addEventListener("keypress",e=>{
  if(e.key==="Enter") sendMessage();
});

</script>

</body>
</html>
