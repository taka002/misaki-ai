<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STEP1 画像表示</title>

<style>
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:#08121f;
}

.app{
  height:100vh;
  display:flex;
  flex-direction:column;
}

.top{
  height:35%;
  display:flex;
  justify-content:center;
  align-items:center;
}

.top img{
  width:90%;
  height:100%;
  object-fit:cover;
  border-radius:20px;
  background:#222;
}

#chatBox{
  height:45%;
  overflow-y:auto;
  padding:10px;
}

.input{
  height:12%;
  display:flex;
  padding:6px;
  background:#111;
}

input{
  flex:1;
  min-width:0;
  padding:10px;
  border-radius:10px;
  border:none;
}

button{
  width:60px;
  margin-left:5px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="app">

<div class="top">
<img src="face_normal.jpg"
onerror="this.src='https://via.placeholder.com/300x200'">
</div>

<div id="chatBox"></div>

<div class="input">
<input id="userInput" placeholder="話しかけて...">
<button onclick="sendMessage()">送信</button>
</div>

</div>

<script>
function sendMessage(){
  const text=userInput.value;
  if(!text) return;

  const div=document.createElement("div");
  div.textContent=text;
  div.style.color="white";
  chatBox.appendChild(div);

  userInput.value="";
}
</script>

</body>
</html>
