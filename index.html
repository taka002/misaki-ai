<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ピピAI 完全版</title>

<style>
*{ box-sizing:border-box; }

html,body{
  height:100%;
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(#2b314d,#09111f);
  color:white;
}

.app{
  display:flex;
  flex-direction:column;
  height:100vh;
  overflow:hidden;
}

.top{
  height:35vh;
  width:100%;
  overflow:hidden;
}

.top img{
  width:100%;
  height:100%;
  object-fit:cover;
}

#chatBox{
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

.row{ display:flex; margin:6px 0; }
.row.user{ justify-content:flex-end; }
.row.bot{ justify-content:flex-start; }

.bubble{
  padding:12px 16px;
  border-radius:16px;
  max-width:75%;
  white-space:pre-wrap;
}

.user .bubble{ background:#ff4f8b; }
.bot .bubble{ background:#444; }

.input-area{
  display:flex;
  gap:6px;
  padding:8px;
  background:#111;
}

#userInput{
  flex:1;
  padding:14px;
  border:none;
  border-radius:10px;
}

.input-area button{
  width:60px;
  height:55px;
  border:none;
  border-radius:10px;
}

.mic{ background:#5f9bff; }

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal.show{ display:flex; }

.box{
  width:90%;
  max-width:420px;
  max-height:85vh;
  overflow:auto;
  background:#222;
  padding:20px;
  border-radius:12px;
}

input,textarea{
  width:100%;
  margin-bottom:10px;
  padding:10px;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="app">

  <div class="top">
    <img id="girl">
  </div>

  <div id="chatBox"></div>

  <div class="input-area">
    <input id="userInput" placeholder="話してみて">
    <button onclick="sendMessage()">送信</button>
    <button onclick="startVoice()">🎤</button>
    <button onclick="analyze()">🧠</button>
  </div>

</div>

<script>

let chatBox, girl, userInput;

let chatLog=[];

let settings={
  name:"ピピ",
  image:"",
  apiKey:""
};

window.addEventListener("DOMContentLoaded",()=>{

  chatBox=document.getElementById("chatBox");
  girl=document.getElementById("girl");
  userInput=document.getElementById("userInput");

  girl.src="https://cdn.pixabay.com/photo/2017/01/31/13/14/animal-2023924_1280.png";

  // 🔥 音声準備
  speechSynthesis.onvoiceschanged = () => {
    speechSynthesis.getVoices();
  };

});

// ===== 表示 =====
function addMessage(text,type){
  const row=document.createElement("div");
  row.className="row "+type;

  const bubble=document.createElement("div");
  bubble.className="bubble";
  bubble.textContent=text;

  row.appendChild(bubble);
  chatBox.appendChild(row);
}

// ===== 🔥 音声 =====
function speak(text){

  if(!text) return;

  const u=new SpeechSynthesisUtterance(text);

  u.lang="ja-JP";
  u.rate=1;
  u.pitch=1;

  const voices=speechSynthesis.getVoices();
  const ja=voices.find(v=>v.lang.includes("ja"));
  if(ja) u.voice=ja;

  setTimeout(()=>{
    speechSynthesis.speak(u);
  },150);
}

// ===== AI（仮）=====
async function aiReply(text){
  return "こんにちは😊 今はテスト音声です";
}

// ===== 送信 =====
async function sendMessage(){

  const text=userInput.value.trim();
  if(!text) return;

  // 🔥 音声アンロック
  const unlock = new SpeechSynthesisUtterance(" ");
  speechSynthesis.speak(unlock);
  speechSynthesis.cancel();

  addMessage(text,"user");
  userInput.value="";

  const reply=await aiReply(text);

  addMessage(reply,"bot");

  speak(reply);
}

// ===== 音声入力 =====
function startVoice(){
  const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SpeechRecognition) return;

  const recog=new SpeechRecognition();
  recog.lang="ja-JP";

  recog.onresult=(e)=>{
    userInput.value=e.results[0][0].transcript;
    sendMessage();
  };

  recog.start();
}

// ===== 分析 =====
function analyze(){
  speak("分析機能は後で追加できます");
}

</script>

</body>
</html>
