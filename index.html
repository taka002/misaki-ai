<script>

let chatBox, girl, modal, userInput;
let nameInput, imageInput, apiKeyInput, promptInput, imageFile;
let elevenApiKeyInput, voiceIdInput;

let chatLog=[];

let settings={
  name:localStorage.getItem("name")||"ピピ",
  image:localStorage.getItem("image")||"",
  apiKey:localStorage.getItem("apiKey")||"",
  elevenApiKey:localStorage.getItem("elevenApiKey")||"",
  voiceId:localStorage.getItem("voiceId")||"",
  prompt:localStorage.getItem("prompt")||"優しく話す",
  rebuttal:localStorage.getItem("rebuttal")||"本当にそう？別の見方は？"
};

// ===== 歪み記録 =====
let distortionDB=JSON.parse(localStorage.getItem("distortions")||"{}");

function saveDistortion(text){
  if(!text) return;
  if(!distortionDB[text]) distortionDB[text]=0;
  distortionDB[text]++;
  localStorage.setItem("distortions",JSON.stringify(distortionDB));
}

window.addEventListener("DOMContentLoaded",()=>{

  chatBox=document.getElementById("chatBox");
  girl=document.getElementById("girl");
  modal=document.getElementById("modal");
  userInput=document.getElementById("userInput");

  nameInput=document.getElementById("nameInput");
  imageInput=document.getElementById("imageInput");
  apiKeyInput=document.getElementById("apiKeyInput");
  promptInput=document.getElementById("promptInput");
  imageFile=document.getElementById("imageFile");

  elevenApiKeyInput=document.getElementById("elevenApiKeyInput");
  voiceIdInput=document.getElementById("voiceIdInput");

  girl.src=settings.image || "https://cdn.pixabay.com/photo/2017/01/31/13/14/animal-2023924_1280.png";

  userInput.addEventListener("keypress",e=>{
    if(e.key==="Enter") sendMessage();
  });

});

// ===== 表示 =====
function addMessage(text,type){

  const row=document.createElement("div");
  row.className="row "+type;

  const bubble=document.createElement("div");
  bubble.className="bubble";

  // 🔥 分析カード
  if(type==="bot" && text.includes("①")){

    const container=document.createElement("div");
    container.className="analysis";

    const items=[
      {icon:"🐱",title:"出来事"},
      {icon:"🧠",title:"自動思考"},
      {icon:"🐰",title:"感情"},
      {icon:"🐍",title:"認知の歪み"},
      {icon:"🔍",title:"反証"},
      {icon:"🌱",title:"バランス思考"},
      {icon:"🐾",title:"行動"}
    ];

    const parts=text.split(/①|②|③|④|⑤|⑥|⑦/);

    items.forEach((item,i)=>{
      if(!parts[i+1]) return;

      const body=parts[i+1].trim();

      if(i===3) saveDistortion(body);

      const card=document.createElement("div");
      card.className="card";

      card.innerHTML=`
        <div class="card-title">${item.icon} ${item.title}</div>
        <div class="card-body">${body}</div>
      `;

      container.appendChild(card);
    });

    bubble.appendChild(container);

  }else{

    const pre=document.createElement("pre");
    pre.textContent=text;
    bubble.appendChild(pre);

  }

  row.appendChild(bubble);
  chatBox.appendChild(row);
  chatBox.scrollTop=chatBox.scrollHeight;
}

// ===== 音声 =====
async function speak(text){

  if(!text) return;

  if(settings.elevenApiKey && settings.voiceId){
    try{
      const res = await fetch(
        `https://api.elevenlabs.io/v1/text-to-speech/${settings.voiceId}`,
        {
          method:"POST",
          headers:{
            "xi-api-key":settings.elevenApiKey,
            "Content-Type":"application/json",
            "Accept":"audio/mpeg"
          },
          body:JSON.stringify({
            text:text,
            model_id:"eleven_multilingual_v2"
          })
        }
      );

      if(res.ok){
        const blob=await res.blob();
        const url=URL.createObjectURL(blob);
        const audio=new Audio(url);
        audio.play();
        return;
      }

    }catch(e){}
  }

  const u=new SpeechSynthesisUtterance(text);
  u.lang="ja-JP";
  speechSynthesis.speak(u);
}

// ===== AI =====
async function aiReply(text, isAnalyze=false){

  if(!settings.apiKey) return "APIキー未設定";

  let systemPrompt = settings.prompt;

  // 🔥 分析モードだけ①〜⑦
  if(isAnalyze){
    systemPrompt = `
認知再構成を行う

①出来事
②自動思考
③感情
④認知の歪み
⑤反証（${settings.rebuttal}）
⑥バランス思考
⑦行動

必ず①〜⑦で出力
`;
  }

  const res=await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+settings.apiKey
    },
    body:JSON.stringify({
      model:"gpt-4o-mini",
      messages:[
        {role:"system",content:systemPrompt},
        ...chatLog.slice(-20),
        {role:"user",content:text}
      ]
    })
  });

  const data=await res.json();
  return data.choices?.[0]?.message?.content || "エラー";
}

// ===== 送信 =====
async function sendMessage(){

  const text=userInput.value.trim();
  if(!text) return;

  chatLog.push({role:"user",content:text});
  addMessage(text,"user");
  userInput.value="";

  const reply=await aiReply(text,false);

  chatLog.push({role:"assistant",content:reply});
  addMessage(reply,"bot");
  speak(reply);
}

// ===== 分析 =====
async function analyze(){

  if(chatLog.length===0){
    alert("会話がないよ");
    return;
  }

  addMessage("🧠 分析中…","bot");

  const reply=await aiReply("この会話を分析",true);

  addMessage(reply,"bot");
  speak(reply);
}

// ===== 設定 =====
function saveSettings(){

  settings.name=nameInput.value;
  settings.apiKey=apiKeyInput.value;
  settings.prompt=promptInput.value;
  settings.elevenApiKey=elevenApiKeyInput.value;
  settings.voiceId=voiceIdInput.value;

  settings.rebuttal = promptInput.value || settings.rebuttal;

  if(imageInput.value.trim()){
    settings.image=imageInput.value.trim();
  }

  localStorage.setItem("name",settings.name);
  localStorage.setItem("apiKey",settings.apiKey);
  localStorage.setItem("prompt",settings.prompt);
  localStorage.setItem("image",settings.image);
  localStorage.setItem("elevenApiKey",settings.elevenApiKey);
  localStorage.setItem("voiceId",settings.voiceId);
  localStorage.setItem("rebuttal",settings.rebuttal);

  girl.src=settings.image;
  closeSettings();
}

function openSettings(){ modal.classList.add("show"); }
function closeSettings(){ modal.classList.remove("show"); }

// ===== 音声入力（🔥修正済）=====
function startVoice(){

  const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SpeechRecognition) return;

  const recog=new SpeechRecognition();
  recog.lang="ja-JP";

  recog.onresult=(e)=>{
    userInput.value=e.results[0][0].transcript;
    sendMessage();
  };

  recog.start();
}

</script>
