<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ピピAI 完全版</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(#2b314d,#09111f);
  color:white;
}
.app{
  display:flex;
  flex-direction:column;
  height:100vh;
}
.top{
  height:35vh;
  display:flex;
  justify-content:center;
  align-items:center;
}
.top img{
  width:90%;
  max-width:400px;
  border-radius:20px;
}
#chatBox{
  flex:1;
  overflow:auto;
  padding:10px;
}
.message{
  margin:8px;
  padding:12px;
  border-radius:12px;
  max-width:80%;
}
.user{background:#ff4f8b;margin-left:auto;}
.bot{background:#444;}
.input-area{display:flex;}
input{flex:1;padding:10px;}
button{padding:10px;}
.modal{
  position:fixed;
  inset:0;
  background:#0008;
  display:none;
  align-items:center;
  justify-content:center;
}
.modal.show{display:flex;}
.box{
  background:#222;
  padding:20px;
}
</style>
</head>

<body>

<div class="app">

<div class="top">
<img id="girl" src="girl-normal.jpg">
</div>

<div id="chatBox"></div>

<div class="input-area">
<input id="userInput" placeholder="話してみて">
<button onclick="sendMessage()">送信</button>
<button onclick="openSettings()">⚙</button>
</div>

</div>

<div class="modal" id="modal">
<div class="box">

あなたの名前<br>
<input id="userNameInput"><br><br>

キャラの名前<br>
<input id="aiNameInput"><br><br>

OpenAI APIKey<br>
<input id="apiKeyInput"><br><br>

<button onclick="saveSettings()">保存</button>
<button onclick="closeSettings()">閉じる</button>

</div>
</div>

<script>

// ===== 名前保存 =====
let memory={
  userName:localStorage.getItem("userName")||"",
  aiName:localStorage.getItem("aiName")||"ピピ"
};

// ===== 画像 =====
const faceImages={
  normal:"girl-normal.jpg",
  happy:"girl-happy.png",
  sympathy:"girl-sympathy.png",
  worried:"girl-worried.png",
  exhausted:"girl-exhausted.png"
};

function setFace(type){
  girl.src=faceImages[type]||faceImages.normal;
}

// ===== API =====
let sessionSecrets={
  apiKey:localStorage.getItem("apiKey")||""
};

// 履歴
let chatHistory=JSON.parse(localStorage.getItem("chatHistory")||"[]");

// 初期
userNameInput.value=memory.userName;
aiNameInput.value=memory.aiName;
apiKeyInput.value=sessionSecrets.apiKey;

// ===== UI =====
function openSettings(){
  modal.classList.add("show");
}
function closeSettings(){
  modal.classList.remove("show");
}

function saveSettings(){
  memory.userName=userNameInput.value.trim();
  memory.aiName=aiNameInput.value.trim()||"ピピ";

  sessionSecrets.apiKey=apiKeyInput.value.trim();

  localStorage.setItem("userName",memory.userName);
  localStorage.setItem("aiName",memory.aiName);
  localStorage.setItem("apiKey",sessionSecrets.apiKey);

  alert("保存OK🔥");
  closeSettings();
}

// ===== 表示 =====
function addMessage(text,type){
  const div=document.createElement("div");
  div.className="message "+type;
  div.textContent=text;
  chatBox.appendChild(div);
  chatBox.scrollTop=chatBox.scrollHeight;
}

// ===== GPT =====
async function sendMessage(){

  const text=userInput.value.trim();
  if(!text)return;

  addMessage(text,"user");
  userInput.value="";

  if(!sessionSecrets.apiKey){
    addMessage("APIキー入れて","bot");
    return;
  }

  chatHistory.push({role:"user",content:text});

  const userName=memory.userName?memory.userName+"さん":"";
  const aiName=memory.aiName;

  try{
    const res=await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+sessionSecrets.apiKey
      },
      body:JSON.stringify({
        model:"gpt-4o-mini",
        messages:[
          {
            role:"system",
            content:`
あなたは「${aiName}」という優しい女性です。

ルール:
・自然な会話
・AIっぽくしない
・やさしい
・時々 ${userName} を呼ぶ
・一言で終わらない
・会話を続ける
・感情タグを最初につける

タグ:
[happy][sympathy][worried][exhausted][normal]
`
          },
          ...chatHistory
        ]
      })
    });

    const data=await res.json();
    let reply=data.choices?.[0]?.message?.content||"エラー";

    // 感情タグ処理
    let mood="normal";
    const match=reply.match(/^\[(.*?)\]/);
    if(match){
      mood=match[1];
      reply=reply.replace(/^\[.*?\]/,"");
    }

    setFace(mood);

    addMessage(reply,"bot");

    chatHistory.push({role:"assistant",content:reply});
    localStorage.setItem("chatHistory",JSON.stringify(chatHistory));

    speak(reply);

  }catch(e){
    addMessage("通信エラー","bot");
  }
}

// ===== Enter =====
userInput.addEventListener("keypress",e=>{
  if(e.key==="Enter")sendMessage();
});

// ===== 音声 =====
function speak(text){
  if(!("speechSynthesis" in window))return;
  const u=new SpeechSynthesisUtterance(text);
  u.lang="ja-JP";
  speechSynthesis.speak(u);
}

</script>

</body>
</html>
