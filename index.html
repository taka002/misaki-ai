<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI 安定版</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#09111f;
  color:white;
}

/* ===== 全体 ===== */
.app{
  display:flex;
  flex-direction:column;
  height:100dvh;
  overflow:hidden;
}

/* ===== 上：画像 ===== */
.top{
  height:120px;
  flex-shrink:0;
}
.top img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:15px;
}

/* ===== 中央 ===== */
.chat-area{
  flex:1;
  display:flex;
  flex-direction:column;
  min-height:0;
}

/* スクロールはここだけ */
#chatBox{
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

/* ===== 吹き出し ===== */
.msg{
  max-width:75%;
  padding:10px;
  border-radius:15px;
  margin:6px 0;
}

.user{
  background:#ff4f8b;
  align-self:flex-end;
}

.bot{
  background:#444;
}

/* 時刻 */
.time{
  font-size:10px;
  opacity:0.6;
  margin-top:3px;
}

/* ===== 入力 ===== */
.input{
  flex-shrink:0;
  display:flex;
  gap:6px;
  padding:6px;
  background:#111;
}

input{
  flex:1;
  min-width:0;
  padding:10px;
  border-radius:10px;
  border:none;
}

button{
  flex-shrink:0;
  padding:10px;
  border:none;
  border-radius:10px;
}

/* ===== タブ ===== */
.tabs{
  flex-shrink:0;
  display:flex;
  height:50px;
  background:#222;
}

.tab{
  flex:1;
  text-align:center;
  line-height:50px;
}

/* ===== 設定 ===== */
.panel{display:none;}
.panel.active{display:block;}
</style>
</head>

<body>

<div class="app">

<!-- 画像 -->
<div class="top">
<img src="girl-normal.jpg">
</div>

<!-- 会話 -->
<div id="chatPanel" class="panel active">
<div class="chat-area">

<div id="chatBox"></div>

<div class="input">
<input id="input">
<button onclick="send()">送信</button>
</div>

</div>
</div>

<!-- 設定 -->
<div id="settingsPanel" class="panel">
<div style="padding:10px;">
名前<input id="name"><br><br>
<button onclick="save()">保存</button>
</div>
</div>

<!-- タブ -->
<div class="tabs">
<div class="tab" onclick="switchTab('chat')">会話</div>
<div class="tab" onclick="switchTab('settings')">設定</div>
</div>

</div>

<script>

/* ===== 状態 ===== */
let memory={
  name:localStorage.getItem("name")||"美咲",
  history:JSON.parse(localStorage.getItem("history")||"[]")
};

name.value=memory.name;

/* ===== タブ ===== */
function switchTab(tab){
  document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
  if(tab==="chat") chatPanel.classList.add("active");
  if(tab==="settings") settingsPanel.classList.add("active");
}

/* ===== 保存 ===== */
function save(){
  memory.name=name.value;
  localStorage.setItem("name",memory.name);
}

/* ===== 時刻 ===== */
function now(){
  let d=new Date();
  return d.getHours()+":"+String(d.getMinutes()).padStart(2,"0");
}

/* ===== 表示 ===== */
function add(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;
  div.innerHTML=text+`<div class="time">${now()}</div>`;
  chatBox.appendChild(div);
  chatBox.scrollTop=chatBox.scrollHeight;
}

/* ===== AI ===== */
function reply(t){

  if(t.includes("疲")){
    return "ちょっと無理してる感じあるね…少し休めそう？";
  }

  if(t.includes("不安")){
    return "それ気になるよね…どこが一番引っかかる？";
  }

  return "ちゃんと聞いてるよ、もう少し教えて？";
}

/* ===== 送信 ===== */
function send(){
  let t=input.value;
  if(!t) return;

  add(t,"user");

  let r=reply(t);
  add(memory.name+"："+r,"bot");

  memory.history.push(t);
  localStorage.setItem("history",JSON.stringify(memory.history));

  input.value="";
}

</script>

</body>
</html>
